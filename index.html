                                    <th class="p-3 md:p-4 min-w-[150px]">Diễn giải</th>
                                    <th class="p-3 md:p-4 text-right w-28 md:w-32 whitespace-nowrap">Số tiền</th>
                                    <th class="p-3 md:p-4 text-center w-24 md:w-28">Hóa đơn</th>
                                    <th class="p-3 md:p-4 w-16 text-center">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-100 text-xs md:text-sm">
            `;

            if(state.actuals.length === 0) html += `<tr><td colspan="6" class="p-8 text-center text-gray-400">Chưa có khoản chi nào được ghi nhận.</td></tr>`;

            const sortedActuals = [...state.actuals].sort((a,b) => new Date(b.date) - new Date(a.date));

            sortedActuals.forEach(act => {
                const cat = CATEGORIES.find(c => c.id === act.catId);
                const hasNotes = act.notes && act.notes.trim() !== '';
                const invCount = state.invoices.filter(i => i.expenseId === act.id).length;

                const invoiceBtn = invCount > 0 
                    ? `<button type="button" onclick="window.viewActualDetails(${act.id}); event.stopPropagation();" class="bg-green-50 text-green-700 py-1 px-2 rounded-lg text-[10px] md:text-xs whitespace-nowrap hover:bg-green-100 border border-green-200 transition font-medium"><i class="fa-solid fa-check md:mr-1"></i><span class="hidden md:inline">Đã có</span> (${invCount})</button>`
                    : `<button type="button" onclick="window.openUploadModal(${act.id}); event.stopPropagation();" class="bg-gray-50 text-gray-600 hover:bg-indigo-50 hover:text-indigo-700 hover:border-indigo-200 border border-gray-200 transition py-1 px-2 rounded-lg text-[10px] md:text-xs whitespace-nowrap font-medium ${state.role !== 'admin' ? 'hidden' : ''}"><i class="fa-solid fa-arrow-up-from-bracket md:mr-1"></i><span class="hidden md:inline">Thêm HĐ</span></button>`;

                html += `
                    <tr class="hover:bg-gray-50 transition cursor-pointer" onclick="window.viewActualDetails(${act.id})">
                        <td class="p-3 md:p-4 text-gray-600 whitespace-nowrap">${window.formatDate(act.date)}</td>
                        <td class="p-3 md:p-4 font-medium whitespace-nowrap"><i class="fa-solid ${cat.icon} text-gray-400 mr-1 md:mr-2"></i><span class="hidden sm:inline">${cat.name.substring(3)}</span></td>
                        <td class="p-3 md:p-4 text-gray-800 break-words">
                            ${act.desc}
                            ${hasNotes ? `<i class="fa-solid fa-file-lines text-blue-400 ml-1" title="Có ghi chú/hình ảnh"></i>` : ''}
                        </td>
                        <td class="p-3 md:p-4 text-right">
                            ${act.currency === 'SGD' ? `<div class="font-bold text-gray-800 whitespace-nowrap">${window.formatSGD(act.originalAmount)}</div><div class="text-[10px] md:text-xs text-gray-400 font-medium whitespace-nowrap">~ ${window.formatMoney(act.amount)}</div>` : `<div class="font-bold text-gray-800 whitespace-nowrap">${window.formatMoney(act.amount)}</div>`}
                        </td>
                        <td class="p-3 md:p-4 text-center">${invoiceBtn}</td>
                        <td class="p-3 md:p-4 text-center" onclick="event.stopPropagation()">
                            <button type="button" onclick="window.deleteActual(${act.id})" class="text-red-400 hover:text-red-600 transition p-1 ${state.role !== 'admin' ? 'hidden' : ''}" title="Xóa">
                                <i class="fa-solid fa-trash pointer-events-none"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });

            html += `
                            </tbody>
                            <tfoot class="bg-gray-50 border-t border-gray-200 sticky bottom-0 z-10 shadow-[0_-2px_4px_rgba(0,0,0,0.05)]">
                                <tr>
                                    <td colspan="3" class="p-3 md:p-4 text-right font-bold text-gray-600 uppercase text-xs md:text-sm">Tổng chi thực tế:</td>
                                    <td class="p-3 md:p-4 text-right font-bold text-indigo-700 text-base md:text-lg whitespace-nowrap">${window.formatMoney(totalActual)}</td>
                                    <td colspan="2"></td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>
                </div>
            `;
            container.innerHTML = html;
        }

        window.viewActualDetails = function(id) {
            const act = state.actuals.find(a => a.id == id);
            if (!act) return;
            const cat = CATEGORIES.find(c => c.id == act.catId);

            const invoices = state.invoices.filter(i => i.expenseId == id);
            let invoiceHtml = '';
            if (invoices.length > 0) {
                invoiceHtml = `<h4 class="font-bold text-gray-800 mb-2 mt-4 flex justify-between items-center">
                    <span><i class="fa-solid fa-file-invoice text-blue-500 mr-2"></i>Chứng từ tải lên</span>
                    <button type="button" onclick="window.openUploadModal(${act.id})" class="text-xs bg-blue-50 text-blue-600 px-2 py-1 rounded hover:bg-blue-100 ${state.role !== 'admin' ? 'hidden' : ''}">+ Thêm hóa đơn</button>
                </h4><div class="flex flex-wrap gap-3">`;
                invoices.forEach(inv => {
                    invoiceHtml += `
                        <div class="relative group border rounded-lg overflow-hidden w-24 h-24 shadow-sm">
                            <a href="${inv.dataUrl}" target="_blank"><img src="${inv.dataUrl}" class="w-full h-full object-cover cursor-pointer hover:opacity-80"></a>
                            <button type="button" onclick="window.deleteInvoice(${inv.id});" class="absolute top-1 right-1 bg-red-50 text-red-600 w-6 h-6 rounded-full opacity-0 group-hover:opacity-100 transition flex items-center justify-center hover:bg-red-100 ${state.role !== 'admin' ? 'hidden' : ''}"><i class="fa-solid fa-xmark text-xs"></i></button>
                        </div>`;
                });
                invoiceHtml += `</div>`;
            } else {
                invoiceHtml = `
                    <div class="mt-4 bg-gray-50 border border-dashed border-gray-300 rounded-xl p-4 text-center">
                        <p class="text-xs text-gray-500 mb-2">Chưa có hóa đơn nào được tải lên cho mục này.</p>
                        <button type="button" onclick="window.openUploadModal(${act.id})" class="bg-white border border-gray-300 text-gray-700 px-3 py-1.5 rounded-lg text-xs font-medium hover:bg-gray-100 shadow-sm ${state.role !== 'admin' ? 'hidden' : ''}"><i class="fa-solid fa-upload mr-1"></i> Tải Hóa đơn lên</button>
                    </div>
                `;
            }

            const notesHtml = (act.notes && act.notes.trim() !== '') ? `<h4 class="font-bold text-gray-800 mb-2 mt-4"><i class="fa-solid fa-file-lines text-yellow-500 mr-2"></i>Ghi chú</h4><div class="bg-yellow-50 p-3 rounded-lg border border-yellow-100 text-sm overflow-hidden">${act.notes}</div>` : '';

            const m = `
                <div class="p-0 flex flex-col max-h-[85vh]">
                    <div class="p-3 md:p-4 border-b bg-gray-50 flex justify-between items-center rounded-t-xl sticky top-0 z-10">
                        <h3 class="text-base md:text-lg font-bold text-indigo-700 flex items-center">
                            <i class="fa-solid ${cat.icon} mr-2"></i> Chi tiết khoản chi
                        </h3>
                        <div class="flex space-x-2 items-center">
                            <button type="button" onclick="window.openActualModal(${act.id})" class="text-indigo-600 hover:bg-indigo-100 px-3 py-1 rounded transition text-sm font-bold ${state.role !== 'admin' ? 'hidden' : ''}"><i class="fa-solid fa-pen mr-1"></i>Sửa</button>
                            <button type="button" onclick="window.closeModal()" class="text-gray-400 hover:text-gray-600 border-l pl-2"><i class="fa-solid fa-xmark text-xl"></i></button>
                        </div>
                    </div>
                    <div class="p-4 md:p-6 overflow-y-auto">
                        <div class="mb-4">
                            <p class="text-xs text-gray-500 mb-1"><i class="fa-regular fa-calendar mr-1"></i> Ngày chi: <strong>${window.formatDate(act.date)}</strong></p>
                            <h4 class="text-lg font-bold text-gray-800 break-words">${act.desc}</h4>
                        </div>
                        <div class="bg-indigo-50 p-4 rounded-xl border border-indigo-100 flex justify-between items-center mb-4">
                            <span class="text-sm font-medium text-gray-600">Số tiền thanh toán:</span>
                            <span class="font-bold text-xl md:text-2xl text-indigo-700">
                                ${act.currency === 'SGD' ? `${window.formatSGD(act.originalAmount)} <span class="text-sm text-gray-500">(~${window.formatMoney(act.amount)})</span>` : window.formatMoney(act.amount)}
                            </span>
                        </div>
                        ${notesHtml}
                        ${invoiceHtml}
                    </div>
                </div>
            `;
            window.openModal(m);
        }

        window.openActualModal = function(id = null) {
            if(!window.checkAuth()) return;
            let catOptions = CATEGORIES.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            
            let act = { date: new Date().toISOString().split('T')[0], catId: 1, desc: '', currency: 'VND', originalAmount: '', notes: '' };
            if (id) {
                const found = state.actuals.find(a => a.id == id);
                if (found) act = found;
                catOptions = CATEGORIES.map(c => `<option value="${c.id}" ${c.id == act.catId ? 'selected' : ''}>${c.name}</option>`).join('');
            }

            const m = `
                <div class="p-4 md:p-6 max-h-[85vh] flex flex-col">
                    <h3 class="text-lg md:text-xl font-bold mb-4 sticky top-0 bg-white z-10 pb-2 border-b">${id ? 'Sửa khoản chi' : 'Ghi nhận chi phí thực tế'}</h3>
                    <div class="space-y-4 overflow-y-auto pr-1">
                        <div class="flex flex-col sm:flex-row gap-3">
                            <div class="w-full sm:w-1/2">
                                <label class="block text-xs md:text-sm font-medium text-gray-700 mb-1">Ngày chi</label>
                                <input type="date" id="inpActDate" value="${act.date}" class="block w-full rounded-md border-gray-300 shadow-sm p-2 border text-sm">
                            </div>
                            <div class="w-full sm:w-1/2">
                                <label class="block text-xs md:text-sm font-medium text-gray-700 mb-1">Hạng mục</label>
                                <select id="inpActCatId" class="block w-full rounded-md border-gray-300 shadow-sm p-2 border text-sm">${catOptions}</select>
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs md:text-sm font-medium text-gray-700 mb-1">Diễn giải chi tiết</label>
                            <input type="text" id="inpActDesc" value="${act.desc}" placeholder="VD: Trả tiền taxi ra sân bay" class="block w-full rounded-md border-gray-300 shadow-sm p-2 border text-sm">
                        </div>
                        <div class="flex flex-col sm:flex-row gap-3">
                            <div class="w-full sm:w-1/3">
                                <label class="block text-xs md:text-sm font-medium text-gray-700 mb-1">Loại tiền</label>
                                <select id="inpActCurrency" class="block w-full rounded-md border-gray-300 shadow-sm p-2 border text-sm">
                                    <option value="VND" ${act.currency === 'VND' ? 'selected' : ''}>VNĐ</option>
                                    <option value="SGD" ${act.currency === 'SGD' ? 'selected' : ''}>SGD (Đô Sing)</option>
                                </select>
                            </div>
                            <div class="w-full sm:w-2/3">
                                <label class="block text-xs md:text-sm font-medium text-gray-700 mb-1">Số tiền</label>
                                <input type="number" id="inpActAmount" value="${act.originalAmount}" class="block w-full rounded-md border-gray-300 shadow-sm p-2 border text-lg font-bold text-indigo-700">
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs md:text-sm font-medium text-gray-700 mb-1">Ghi chú & Hình chụp <span class="text-indigo-600">(Bấm Ctrl+V để dán)</span></label>
                            <div id="inpActNotes" contenteditable="true" class="block w-full min-h-[80px] max-h-[250px] overflow-y-auto rounded-md border border-gray-300 shadow-sm p-2 focus:border-indigo-500 outline-none text-sm bg-white">${act.notes || ''}</div>
                        </div>
                    </div>
                    <div class="mt-4 pt-4 border-t flex justify-end space-x-3 sticky bottom-0 bg-white">
                        <button type="button" onclick="${id ? `window.viewActualDetails(${id})` : 'window.closeModal()'}" class="px-4 py-2 border rounded-md text-gray-600 hover:bg-gray-50 text-sm">Hủy</button>
                        <button type="button" onclick="window.saveActual(${id ? id : 'null'})" class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 text-sm">Lưu</button>
                    </div>
                </div>
            `;
            window.openModal(m);
            setTimeout(() => window.setupPasteHandler('inpActNotes'), 50);
        }

        window.saveActual = function(id) {
            const date = document.getElementById('inpActDate').value;
            const catId = parseInt(document.getElementById('inpActCatId').value);
            const desc = document.getElementById('inpActDesc').value.trim();
            const currency = document.getElementById('inpActCurrency').value;
            const originalAmount = parseFloat(document.getElementById('inpActAmount').value) || 0;
            const notes = document.getElementById('inpActNotes').innerHTML;
            
            if(!desc || originalAmount <= 0) { window.showToast("Vui lòng nhập Diễn giải và Số tiền!", "error"); return; }

            const rate = state.trip.exchangeRate || 18500;
            const amount = currency === 'SGD' ? originalAmount * rate : originalAmount;

            if (id) {
                const act = state.actuals.find(a => a.id == id);
                if (act) { act.date=date; act.catId=catId; act.desc=desc; act.currency=currency; act.originalAmount=originalAmount; act.amount=amount; act.notes=notes; }
            } else {
                state.actuals.push({ id: Date.now(), catId, desc, amount, date, currency, originalAmount, notes });
            }
            window.saveLocalState();
            window.closeModal(); window.showToast('Đã lưu khoản chi!'); 
            if(id) window.viewActualDetails(id); else window.renderTab();
        }

        window.deleteActual = function(id) {
            if(!window.checkAuth()) return;
            window.showConfirm('Bạn có chắc chắn muốn xóa khoản chi này? Các hình ảnh gắn kèm cũng sẽ bị xóa.', () => {
                state.actuals = state.actuals.filter(a => a.id != id);
                state.invoices = state.invoices.filter(i => i.expenseId != id);
                window.showToast('Đã xóa', 'success'); 
                window.saveLocalState();
                window.renderTab();
            });
        }

        // ==========================================
        // 11. MODULE: INVOICES & MINH CHỨNG
        // ==========================================
        window.renderInvoices = function(container) {
            let html = `
                <div class="flex flex-col sm:flex-row sm:justify-between items-start sm:items-center mb-6 gap-4">
                    <div>
                        <h2 class="text-xl md:text-2xl font-bold text-gray-800">Quản lý Hóa đơn, Minh chứng</h2>
                        <p class="text-xs md:text-sm text-gray-500">Lưu trữ hình ảnh hóa đơn gắn với chi phí thực tế.</p>
                    </div>
                    <button type="button" onclick="window.openUploadModal()" class="w-full sm:w-auto bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-indigo-700 transition shadow-sm ${state.role !== 'admin' ? 'hidden' : ''}">
                        <i class="fa-solid fa-upload mr-2"></i>Upload Hóa đơn
                    </button>
                </div>
                
                <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
            `;

            if(state.invoices.length === 0) {
                html += `<div class="col-span-full text-center py-10 bg-white rounded-xl border border-dashed border-gray-300 text-gray-500 text-sm md:text-base mx-4">Chưa có hóa đơn nào được tải lên.</div>`;
            }

            state.invoices.forEach(inv => {
                const expense = state.actuals.find(a => a.id === inv.expenseId);
                const expDesc = expense ? expense.desc : 'Đã xóa khoản chi';
                const imageSrc = inv.dataUrl || 'https://via.placeholder.com/300x400.png?text=PDF/Image+Document';

                html += `
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden flex flex-col w-full group">
                        <div class="h-32 md:h-40 bg-gray-100 relative overflow-hidden">
                            <img src="${imageSrc}" class="w-full h-full object-cover cursor-pointer hover:scale-105 transition duration-300" alt="Hóa đơn" onclick="window.viewActualDetails(${inv.expenseId})">
                            <div class="absolute inset-0 bg-black bg-opacity-40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition pointer-events-none"></div>
                            
                            <div class="absolute top-2 right-2 flex space-x-1 opacity-100 md:opacity-0 md:group-hover:opacity-100 transition z-10">
                                <a href="${imageSrc}" download="${inv.filename}" class="bg-white text-gray-800 w-7 h-7 rounded-full shadow-md flex items-center justify-center hover:bg-gray-100" title="Tải xuống"><i class="fa-solid fa-download text-xs"></i></a>
                                ${state.role === 'admin' ? `<button type="button" onclick="window.deleteInvoice(${inv.id})" class="bg-red-50 text-red-600 w-7 h-7 rounded-full shadow-md flex items-center justify-center hover:bg-red-100" title="Xóa"><i class="fa-solid fa-trash text-xs"></i></button>` : ''}
                            </div>
                        </div>
                        <div class="p-2 md:p-3 flex-1 flex flex-col cursor-pointer" onclick="window.viewActualDetails(${inv.expenseId})">
                            <p class="text-[10px] text-gray-500 mb-1"><i class="fa-regular fa-calendar mr-1"></i>${window.formatDate(inv.date)}</p>
                            <h4 class="font-bold text-xs text-gray-800 line-clamp-2 mb-1" title="${expDesc}">${expDesc}</h4>
                        </div>
                    </div>
                `;
            });

            html += `</div>`;
            container.innerHTML = html;
        }

        window.openUploadModal = function(prefillExpId = null) {
            if(!window.checkAuth()) return;
            let actOptions = state.actuals.map(a => `<option value="${a.id}" ${prefillExpId == a.id ? 'selected' : ''}>${a.desc} - ${window.formatMoney(a.amount)}</option>`).join('');
            if(state.actuals.length === 0) { window.showToast("Vui lòng ghi nhận chi phí thực tế trước khi tải hóa đơn!", "error"); return; }

            const m = `
                <div class="p-4 md:p-6">
                    <h3 class="text-lg md:text-xl font-bold mb-4">Tải lên hóa đơn</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs md:text-sm font-medium text-gray-700 mb-1">Gắn với khoản chi</label>
                            <select id="inpInvExpId" class="block w-full rounded-md border-gray-300 shadow-sm p-2 md:p-3 border focus:border-indigo-500 text-sm md:text-base font-medium text-indigo-700">${actOptions}</select>
                        </div>
                        <div>
                            <label class="block text-xs md:text-sm font-medium text-gray-700 mb-1">Chọn file ảnh từ máy</label>
                            <input type="file" id="inpInvFile" accept="image/*" class="block w-full text-xs md:text-sm text-gray-500 file:mr-2 md:file:mr-4 file:py-2 file:px-3 md:file:px-4 file:rounded-md file:border-0 file:text-xs md:file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 border p-1 rounded-md">
                        </div>
                    </div>
                    <div class="mt-6 flex justify-end space-x-3">
                        <button type="button" onclick="${prefillExpId ? `window.viewActualDetails(${prefillExpId})` : 'window.closeModal()'}" class="px-4 py-2 border rounded-md text-gray-600 hover:bg-gray-50 text-sm md:text-base">Hủy</button>
                        <button type="button" onclick="window.saveInvoice(${prefillExpId ? prefillExpId : 'null'})" class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 text-sm md:text-base"><i class="fa-solid fa-cloud-arrow-up mr-2"></i>Upload</button>
                    </div>
                </div>
            `;
            window.openModal(m);
        }

        window.saveInvoice = function(prefillExpId) {
            const expId = parseInt(document.getElementById('inpInvExpId').value);
            const fileInput = document.getElementById('inpInvFile');
            if(fileInput.files.length === 0) { window.showToast("Vui lòng chọn 1 file ảnh!", "error"); return; }

            window.resizeImage(fileInput.files[0], 1200, (resizedDataUrl) => {
                state.invoices.push({
                    id: Date.now(), expenseId: expId, filename: fileInput.files[0].name,
                    dataUrl: resizedDataUrl, date: new Date().toISOString().split('T')[0]
                });
                window.showToast('Đã upload hóa đơn thành công!'); 
                window.saveLocalState();
                if (prefillExpId) { window.viewActualDetails(prefillExpId); } 
                else { window.closeModal(); window.renderTab(); }
            });
        }

        window.deleteInvoice = function(id) {
            if(!window.checkAuth()) return;
            window.showConfirm('Xóa minh chứng hóa đơn này?', () => {
                const inv = state.invoices.find(i=>i.id == id);
                const actId = inv ? inv.expenseId : null;
                state.invoices = state.invoices.filter(i => i.id != id);
                window.showToast('Đã xóa hóa đơn', 'success'); 
                window.saveLocalState();
                
                if (document.getElementById('modal-overlay').classList.contains('hidden') === false) {
                     window.closeModal(); setTimeout(() => { if(actId) window.viewActualDetails(actId); else window.renderTab(); }, 100); 
                } else { window.renderTab(); }
            });
        }

        // ==========================================
        // 12. MODULE: REPORT & EXPORT
        // ==========================================
        window.renderExport = function(container) {
            let html = `
                <div class="mb-6">
                    <h2 class="text-xl md:text-2xl font-bold text-gray-800">Báo cáo & Xuất file</h2>
                    <p class="text-xs md:text-sm text-gray-500">Tạo tài liệu tự động để gửi nhà trường / nhà tài trợ.</p>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 md:gap-6">
                    <div class="bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-200 text-center hover:shadow-md transition flex flex-col">
                        <i class="fa-solid fa-file-excel text-4xl md:text-5xl text-green-600 mb-3 md:mb-4"></i>
                        <h3 class="font-bold text-base md:text-lg mb-1 md:mb-2">Bảng tính Excel</h3>
                        <p class="text-xs md:text-sm text-gray-500 mb-4 flex-1">Bảng chi tiết dự toán và thực tế phân theo sheet.</p>
                        <button type="button" onclick="window.exportExcel()" class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 text-sm md:text-base">Xuất Excel</button>
                    </div>
                    <div class="bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-200 text-center hover:shadow-md transition flex flex-col">
                        <i class="fa-solid fa-file-pdf text-4xl md:text-5xl text-red-600 mb-3 md:mb-4"></i>
                        <h3 class="font-bold text-base md:text-lg mb-1 md:mb-2">Báo cáo PDF</h3>
                        <p class="text-xs md:text-sm text-gray-500 mb-4 flex-1">Thuyết minh tài chính kèm biểu đồ, hóa đơn A4.</p>
                        <button type="button" onclick="window.generateAndExportPDF()" class="w-full bg-red-600 text-white py-2 rounded-lg hover:bg-red-700 text-sm md:text-base">Tạo PDF</button>
                    </div>
                    <div class="bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-200 text-center hover:shadow-md transition flex flex-col sm:col-span-2 md:col-span-1">
                        <i class="fa-solid fa-file-word text-4xl md:text-5xl text-blue-600 mb-3 md:mb-4"></i>
                        <h3 class="font-bold text-base md:text-lg mb-1 md:mb-2">Báo cáo Word</h3>
                        <p class="text-xs md:text-sm text-gray-500 mb-4 flex-1">Xuất bản nháp thuyết minh để tùy chỉnh văn bản.</p>
                        <button type="button" onclick="window.exportWord()" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 text-sm md:text-base">Xuất Word</button>
                    </div>
                </div>
            `;
            container.innerHTML = html;
        }

        let hiddenReportChartInstance = null;
        let hiddenReportPieChartInstance = null;

        window.generateChartImagesForReport = function(callback) {
            const canvasBar = document.getElementById('hiddenReportChart'); const ctxBar = canvasBar.getContext('2d');
            ctxBar.fillStyle = 'white'; ctxBar.fillRect(0, 0, canvasBar.width, canvasBar.height);
            const canvasPie = document.getElementById('hiddenReportPieChart'); const ctxPie = canvasPie.getContext('2d');
            ctxPie.fillStyle = 'white'; ctxPie.fillRect(0, 0, canvasPie.width, canvasPie.height);

            const labels = CATEGORIES.map(c => c.name.substring(3)); 
            const estData = CATEGORIES.map(c => state.plans.filter(p => p.catId === c.id && p.selected).reduce((sum, p) => sum + p.total, 0));
            const actData = CATEGORIES.map(c => state.actuals.filter(a => a.catId === c.id).reduce((sum, a) => sum + a.amount, 0));
            const totalEst = estData.reduce((a, b) => a + b, 0); const totalAct = actData.reduce((a, b) => a + b, 0);

            if (hiddenReportChartInstance) hiddenReportChartInstance.destroy();
            hiddenReportChartInstance = new Chart(ctxBar, { type: 'bar', data: { labels: labels, datasets: [ { label: 'Dự toán', data: estData, backgroundColor: '#cbd5e1' }, { label: 'Thực tế', data: actData, backgroundColor: '#4f46e5' } ] }, options: { responsive: false, animation: false, plugins: { title: { display: true, text: 'BIỂU ĐỒ SO SÁNH DỰ TOÁN - THỰC TẾ THEO HẠNG MỤC', font: {size: 16} } } } });

            if (hiddenReportPieChartInstance) hiddenReportPieChartInstance.destroy();
            hiddenReportPieChartInstance = new Chart(ctxPie, { type: 'doughnut', data: { labels: ['Tổng Dự toán', 'Tổng Thực tế'], datasets: [{ data: [totalEst, totalAct], backgroundColor: ['#cbd5e1', '#4f46e5'], borderWidth: 1 }] }, options: { responsive: false, animation: false, plugins: { title: { display: true, text: 'TỶ LỆ TỔNG DỰ TOÁN & THỰC TẾ', font: {size: 16} } } } });

            setTimeout(() => { callback(canvasBar.toDataURL('image/png'), canvasPie.toDataURL('image/png')); }, 500);
        }

        window.buildReportHTML = function(barChartImg, pieChartImg) {
            const estimatedTotal = state.plans.filter(p => p.selected).reduce((sum, p) => sum + p.total, 0);
            const actualTotal = state.actuals.reduce((sum, a) => sum + a.amount, 0);
            
            let rating = ""; let percentStr = "";
            if (estimatedTotal > 0) {
                const percent = (actualTotal / estimatedTotal) * 100; percentStr = percent.toFixed(2) + "%";
                if (percent <= 95) rating = "Tuyệt vời (Tiết kiệm)."; else if (percent <= 100) rating = "Tốt (Đúng kế hoạch).";
                else if (percent <= 110) rating = "Khá (Vượt nhẹ)."; else rating = "Cần chú ý (Vượt nhiều).";
            }

            let tableRows = '';
            CATEGORIES.forEach(cat => {
                const catEst = state.plans.filter(p => p.catId === cat.id && p.selected).reduce((sum, p) => sum + p.total, 0);
                const catAct = state.actuals.filter(a => a.catId === cat.id).reduce((sum, a) => sum + a.amount, 0);
                const diff = catEst - catAct;
                tableRows += `<tr class="avoid-break"><td style="border: 1px solid #999; padding: 8px;">${cat.name}</td><td style="border: 1px solid #999; padding: 8px; text-align: right;">${catEst.toLocaleString()}</td><td style="border: 1px solid #999; padding: 8px; text-align: right;">${catAct.toLocaleString()}</td><td style="border: 1px solid #999; padding: 8px; text-align: right; color: ${diff < 0 ? '#cc0000' : '#006600'}; font-weight: bold;">${diff.toLocaleString()}</td></tr>`;
            });

            const appName = (state.trip.name || 'NTU BRIDGE 2026').toUpperCase();

            let timelineHtml = '';
            if (state.timeline && state.timeline.length > 0) {
                timelineHtml = `<div class="avoid-break" style="margin-top: 40px;"><h3 style="border-bottom: 2px solid #ccc; padding-bottom: 5px;">2. Lịch trình công tác / thi đấu</h3><table style="width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 11pt;"><thead><tr style="background-color: #f0f0f0;"><th style="border: 1px solid #999; padding: 8px; width: 15%; text-align: center;">Thời gian</th><th style="border: 1px solid #999; padding: 8px; width: 35%; text-align: left;">Hoạt động</th><th style="border: 1px solid #999; padding: 8px; width: 25%; text-align: left;">Địa điểm</th><th style="border: 1px solid #999; padding: 8px; width: 25%; text-align: left;">Ghi chú</th></tr></thead><tbody>`;
                const sortedTimeline = [...state.timeline].sort((a,b) => new Date(a.date + 'T' + (a.time||'00:00')) - new Date(b.date + 'T' + (b.time||'00:00')));
                let currentDate = '';
                sortedTimeline.forEach(t => {
                    const fd = window.formatDate(t.date); const isNew = fd !== currentDate; if (isNew) currentDate = fd;
                    timelineHtml += `<tr class="avoid-break"><td style="border: 1px solid #999; padding: 8px; text-align: center;">${isNew ? `<strong>${fd}</strong><br>` : ''}<span style="color: #4338ca;">${t.time || ''}</span></td><td style="border: 1px solid #999; padding: 8px; font-weight: bold;">${t.title}</td><td style="border: 1px solid #999; padding: 8px;">${t.location || ''}</td><td style="border: 1px solid #999; padding: 8px; font-style: italic;">${t.notes || ''}</td></tr>`;
                });
                timelineHtml += `</tbody></table></div>`;
            }

            let invoiceHtml = '';
            if (state.invoices.length > 0) {
                invoiceHtml = `<h3 style="margin-top: 40px; border-bottom: 2px solid #ccc; padding-bottom: 5px;">4. Phụ lục Hóa đơn / Chứng từ</h3>`;
                state.invoices.forEach((inv, index) => {
                    const expense = state.actuals.find(a => a.id === inv.expenseId);
                    const expDesc = expense ? expense.desc : 'Không xác định';
                    const expAmount = expense ? window.formatMoney(expense.amount) : '';
                    const date = window.formatDate(inv.date);
                    const breakClass = (index > 0 && index % 2 === 0) ? 'page-break' : '';

                    invoiceHtml += `
                        <div class="avoid-break ${breakClass}" style="margin-bottom: 30px; padding: 10px; border: 1px dashed #ccc;">
                            <p style="font-weight: bold; margin: 0 0 5px 0;">Chứng từ #${index + 1}: ${expDesc}</p>
                            <p style="margin: 0 0 10px 0; font-size: 12pt; color: #555;">Ngày chi: ${date} - Số tiền: ${expAmount}</p>
                            <div style="text-align: center;">
                                <img src="${inv.dataUrl}" style="max-width: 100%; max-height: 400px; border: 1px solid #eee;" alt="Hóa đơn">
                            </div>
                        </div>
                    `;
                });
            }

            return `
                <div class="report-content">
                    <div style="text-align: center; margin-bottom: 30px;"><h2 style="text-transform: uppercase; font-size: 20pt; margin: 0;">BÁO CÁO TÀI CHÍNH CHUYẾN ĐI</h2><h3 style="color: #4338ca; margin: 5px 0 0 0;">${appName}</h3></div>
                    <div style="margin-bottom: 20px;"><p><strong>Hành trình:</strong> ${state.trip.origin} - ${state.trip.destination}</p><p><strong>Số thành viên:</strong> ${state.trip.members} người</p><p><strong>Ngân sách cấp:</strong> ${state.trip.budget.toLocaleString()} VNĐ</p></div>
                    <h3 style="margin-top: 30px; border-bottom: 2px solid #ccc; padding-bottom: 5px;">1. Tổng hợp ngân sách</h3>
                    <table style="width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 12pt;">
                        <thead><tr style="background-color: #f0f0f0;"><th style="border: 1px solid #999; padding: 8px;">Hạng mục</th><th style="border: 1px solid #999; padding: 8px; text-align: right;">Dự toán</th><th style="border: 1px solid #999; padding: 8px; text-align: right;">Thực tế</th><th style="border: 1px solid #999; padding: 8px; text-align: right;">Chênh lệch</th></tr></thead>
                        <tbody>${tableRows}</tbody>
                        <tfoot><tr class="avoid-break" style="font-weight: bold; background-color: #e6e6e6;"><td style="border: 1px solid #999; padding: 8px;">TỔNG CỘNG</td><td style="border: 1px solid #999; padding: 8px; text-align: right;">${estimatedTotal.toLocaleString()}</td><td style="border: 1px solid #999; padding: 8px; text-align: right;">${actualTotal.toLocaleString()}</td><td style="border: 1px solid #999; padding: 8px; text-align: right; color: ${(estimatedTotal - actualTotal) < 0 ? '#cc0000' : '#006600'};">${(estimatedTotal - actualTotal).toLocaleString()}</td></tr></tfoot>
                    </table>
                    ${timelineHtml}
                    <div class="avoid-break page-break" style="margin-top: 30px;">
                        <h3 style="border-bottom: 2px solid #ccc; padding-bottom: 5px;">3. Đánh giá & Biểu đồ</h3>
                        <p><strong>Tỷ lệ tiêu hao:</strong> Đã sử dụng <strong>${percentStr}</strong> so với dự toán.</p><p><strong>Đánh giá kiểm soát:</strong> ${rating}</p>
                        <div style="text-align: center; margin-top: 30px;"><img src="${barChartImg}" style="max-width: 100%; height: auto; border: 1px solid #eee; margin-bottom: 30px;" alt="Bar Chart"><br><img src="${pieChartImg}" style="max-width: 50%; height: auto; border: 1px solid #eee;" alt="Pie Chart"></div>
                    </div>
                </div>`;
        }

        window.exportExcel = function() {
            try {
                const wb = XLSX.utils.book_new();
                const appName = (state.trip.name || 'NTU BRIDGE 2026').toUpperCase();
                const estData = [[`BẢNG DỰ TOÁN - ${appName}`], ['Hành trình:', state.trip.origin + ' - ' + state.trip.destination, '', 'Ngân sách:', state.trip.budget], [], ['Hạng mục', 'Mô tả', 'Đơn giá', 'SL', 'Thành tiền']];
                state.plans.filter(p=>p.selected).forEach(p => { estData.push([CATEGORIES.find(c => c.id === p.catId).name.substring(3), p.desc, p.unit, p.qty, p.total]); });
                XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(estData), "Dự toán (Đã duyệt)");
                const actData = [[`BẢNG THỰC TẾ - ${appName}`], [], ['Ngày', 'Hạng mục', 'Diễn giải', 'Số tiền']];
                state.actuals.forEach(a => { actData.push([a.date, CATEGORIES.find(c => c.id === a.catId).name.substring(3), a.desc, a.amount]); });
                XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(actData), "Thực tế");
                
                const safeFileName = appName.replace(/\s+/g, '_');
                XLSX.writeFile(wb, `BaoCao_TaiChinh_${safeFileName}.xlsx`); 
                window.showToast("Đã tải file Excel");
            } catch(e) { window.showToast("Lỗi xuất Excel!", "error"); }
        }

        window.generateAndExportPDF = function() {
            window.showToast("Đang tạo biểu đồ...", "info");
            window.generateChartImagesForReport((barChartImg, pieChartImg) => {
                const area = document.getElementById('report-render-area');
                area.innerHTML = window.buildReportHTML(barChartImg, pieChartImg); area.style.display = 'block'; 
                const safeFileName = (state.trip.name || 'NTU_Bridge_2026').replace(/\s+/g, '_');
                var opt = { margin: [15, 15, 15, 15], filename: `BaoCao_TaiChinh_${safeFileName}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, useCORS: true }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
                window.showToast("Đang tạo PDF, vui lòng đợi...", "info");
                html2pdf().set(opt).from(area).save().then(() => { area.style.display = 'none'; window.showToast("Tạo PDF thành công!", "success"); });
            });
        }

        window.exportWord = function() {
            window.generateChartImagesForReport((barChartImg, pieChartImg) => {
                const htmlContent = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><title>Word</title><style>body{font-family:'Times New Roman';} table{border-collapse:collapse; width:100%;} th,td{border:1px solid windowtext; padding:5px;} .page-break{mso-special-character:line-break; page-break-before:always;}</style></head><body>${window.buildReportHTML(barChartImg, pieChartImg)}</body></html>`;
                const blob = new Blob(['\ufeff', htmlContent], { type: 'application/msword' });
                const link = document.createElement('a'); link.href = URL.createObjectURL(blob); 
                const safeFileName = (state.trip.name || 'NTU_Bridge_2026').replace(/\s+/g, '_');
                link.download = `BaoCao_TaiChinh_${safeFileName}.doc`; 
                document.body.appendChild(link); link.click(); document.body.removeChild(link); window.showToast("Đã tải file Word");
            });
        }

        // ==========================================
        // 13. MODULE: SETTINGS
        // ==========================================
        window.renderSettings = function(container) {
            let html = `
                <div class="mb-6"><h2 class="text-xl md:text-2xl font-bold text-gray-800">Quản lý Dữ liệu</h2></div>

                <div class="bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-200 mb-4 md:mb-6">
                    <h3 class="font-bold text-base md:text-lg mb-2 md:mb-4 text-blue-700"><i class="fa-solid fa-share-nodes mr-2"></i>Chia sẻ & Cloud</h3>
                    <p class="text-xs md:text-sm text-gray-600 mb-4">Lưu trữ dữ liệu lên Máy chủ hoặc chia sẻ link trực tiếp cho đội thi.</p>
                    <div class="flex flex-wrap gap-3">
                        <button type="button" onclick="window.openShareModal()" class="w-full sm:w-auto bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 shadow-sm text-sm"><i class="fa-solid fa-link mr-2"></i>Tạo Link Chia Sẻ / Xem Nhóm</button>
                    </div>
                </div>

                <div class="bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-200 mb-4 md:mb-6 hidden">
                    <h3 class="font-bold text-base md:text-lg mb-2 md:mb-4 text-emerald-700"><i class="fa-brands fa-google-drive mr-2"></i>Google Drive Cá Nhân</h3>
                    <p class="text-xs md:text-sm text-gray-600 mb-4">Lưu trực tiếp vào Drive riêng. Yêu cầu phải thay API Key trong source code.</p>
                    <div class="flex flex-wrap gap-3">
                        <button type="button" onclick="window.saveToGoogleDrive()" class="w-full sm:w-auto bg-emerald-600 text-white px-4 py-2 rounded-lg hover:bg-emerald-700 shadow-sm text-sm"><i class="fa-solid fa-cloud-arrow-up mr-2"></i>Lưu vào Drive</button>
                        <button type="button" onclick="window.loadFromGoogleDrive()" class="w-full sm:w-auto bg-emerald-50 text-emerald-700 px-4 py-2 rounded-lg hover:bg-emerald-100 shadow-sm border border-emerald-200 text-sm"><i class="fa-solid fa-cloud-arrow-down mr-2"></i>Tải từ Drive</button>
                    </div>
                </div>

                <div class="bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-200 mb-4 md:mb-6">
                    <h3 class="font-bold text-base md:text-lg mb-2 md:mb-4 text-indigo-700"><i class="fa-solid fa-download mr-2"></i>Backup Offline (File JSON)</h3>
                    <button type="button" onclick="window.backupData()" class="w-full sm:w-auto bg-gray-800 text-white px-4 md:px-6 py-2 rounded-lg hover:bg-gray-900 shadow-sm text-sm md:text-base"><i class="fa-solid fa-file-arrow-down mr-2"></i>Tải file Backup (.json)</button>
                </div>

                <div class="bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-200">
                    <h3 class="font-bold text-base md:text-lg mb-2 md:mb-4 text-orange-600"><i class="fa-solid fa-upload mr-2"></i>Restore Offline</h3>
                    <div class="flex flex-col sm:flex-row items-start sm:items-center space-y-3 sm:space-y-0 sm:space-x-4">
                        <input type="file" id="inpRestore" accept=".json" class="block w-full sm:max-w-sm text-xs md:text-sm text-gray-500 file:mr-2 file:py-2 file:px-3 file:rounded-md file:border-0 file:bg-orange-50 file:text-orange-700">
                        <button type="button" onclick="window.restoreData()" class="w-full sm:w-auto bg-orange-500 text-white px-4 py-2 rounded-lg hover:bg-orange-600 text-sm"><i class="fa-solid fa-rotate-left mr-2"></i>Khôi phục</button>
                    </div>
                </div>
            `;
            container.innerHTML = html;
        }

        window.backupData = function() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state));
            const node = document.createElement('a'); node.setAttribute("href", dataStr); node.setAttribute("download", `NtuCostManager_Backup_${new Date().toISOString().split('T')[0]}.json`);
            document.body.appendChild(node); node.click(); node.remove(); window.showToast("Đã tải file Backup");
        }

        window.restoreData = function() {
            if(!window.checkAuth()) return;
            const fileInput = document.getElementById('inpRestore');
            if(fileInput.files.length === 0) { window.showToast("Chọn file backup (.json)", "error"); return; }
            window.showConfirm("Toàn bộ dữ liệu hiện tại sẽ bị xóa. Tiếp tục?", () => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const parsed = JSON.parse(e.target.result);
                        if(parsed.trip && parsed.plans) { 
                            state = parsed; 
                            window.showToast("Khôi phục thành công!", "success"); 
                            window.saveLocalState();
                            window.switchTab('dashboard'); 
                        } 
                        else { window.showToast("File không đúng định dạng!", "error"); }
                    } catch(err) { window.showToast("Lỗi đọc file JSON.", "error"); }
                };
                reader.readAsText(fileInput.files[0]);
            });
        }

        // ==========================================
        // 14. INITIALIZATION
        // ==========================================
        window.addEventListener('DOMContentLoaded', () => {
            if (typeof window.checkSharedLink === 'function') {
                const urlParams = new URLSearchParams(window.location.search);
                if (urlParams.get('sharedId') || urlParams.get('npointId')) {
                    window.checkSharedLink();
                } else {
                    window.loadLocalState();
                    window.renderTab();
                }
            } else {
                window.loadLocalState();
                window.renderTab();
            }
        });

    </script>
</body>
</html>
