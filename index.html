<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTU Bridge Design 2026 - Cost Manager</title>
    
    <!-- Tailwind CSS cho Giao diện -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js cho Biểu đồ -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- SheetJS (Excel Export) -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    
    <!-- html2pdf (PDF Export) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <!-- FontAwesome (Icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- FIREBASE MODULES -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.fbInitApp = initializeApp;
        window.fbGetAuth = getAuth;
        window.fbSignInAnon = signInAnonymously;
        window.fbSignInToken = signInWithCustomToken;
        window.fbGetFirestore = getFirestore;
        window.fbDoc = doc;
        window.fbSetDoc = setDoc;
        window.fbGetDoc = getDoc;
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .tab-active { background-color: #e0e7ff; color: #4338ca; border-right: 4px solid #4338ca; font-weight: 600; }
        .tab-inactive { color: #4b5563; }
        .tab-inactive:hover { background-color: #f3f4f6; color: #111827; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .table-scroll-container::-webkit-scrollbar { width: 8px; height: 8px; }
        .table-scroll-container::-webkit-scrollbar-track { background: #f8fafc; border-radius: 4px; }
        .table-scroll-container::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 4px; }
        .table-scroll-container::-webkit-scrollbar-thumb:hover { background: #64748b; }

        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast-enter { animation: slideIn 0.3s ease-out forwards; }

        @media print { .page-break { page-break-before: always; } .avoid-break { page-break-inside: avoid; } }
        .report-content { font-family: 'Times New Roman', Times, serif; color: #000; line-height: 1.5; font-size: 14pt; }
        .report-content h2, .report-content h3 { font-family: Arial, sans-serif; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-gray-800">

    <!-- Sidebar Overlay -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-20 hidden md:hidden" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed md:static inset-y-0 left-0 transform -translate-x-full md:translate-x-0 w-64 bg-white shadow-xl flex flex-col z-30 flex-shrink-0 transition-transform duration-300 ease-in-out">
        <div class="p-6 border-b flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold text-indigo-700 leading-tight">NTU Bridge 2026</h1>
                <p class="text-xs text-gray-500 mt-1">Cost Management System</p>
            </div>
            <button class="md:hidden text-gray-500 hover:text-gray-700" onclick="toggleSidebar()"><i class="fa-solid fa-times text-xl"></i></button>
        </div>
        
        <div class="p-4 border-b bg-gray-50 flex justify-between items-center">
            <div class="flex items-center space-x-2 truncate">
                <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-700 font-bold flex-shrink-0">
                    <i class="fa-solid fa-user-tie"></i>
                </div>
                <div class="truncate">
                    <p class="text-sm font-semibold truncate" id="currentUserRole" title="Tấn Đạt đẹp trai - 64CNXD2">Tấn Đạt đẹp trai - 64CNXD2</p>
                    <button onclick="toggleRole()" class="text-xs text-indigo-600 hover:underline">Đổi quyền</button>
                </div>
            </div>
        </div>

        <nav class="flex-1 overflow-y-auto py-4">
            <ul class="space-y-1">
                <li><a href="#" onclick="switchTab('dashboard')" id="nav-dashboard" class="nav-link block px-6 py-3 tab-active"><i class="fa-solid fa-chart-pie w-6"></i> Dashboard</a></li>
                <li><a href="#" onclick="switchTab('timeline')" id="nav-timeline" class="nav-link block px-6 py-3 tab-inactive"><i class="fa-solid fa-calendar-days w-6"></i> Lịch trình chuyến đi</a></li>
                <li><a href="#" onclick="switchTab('planning')" id="nav-planning" class="nav-link block px-6 py-3 tab-inactive"><i class="fa-solid fa-lightbulb w-6"></i> Lập phương án</a></li>
                <li><a href="#" onclick="switchTab('actual')" id="nav-actual" class="nav-link block px-6 py-3 tab-inactive"><i class="fa-solid fa-money-bill-wave w-6"></i> Chi phí thực tế</a></li>
                <li><a href="#" onclick="switchTab('invoices')" id="nav-invoices" class="nav-link block px-6 py-3 tab-inactive"><i class="fa-solid fa-file-invoice w-6"></i> Quản lý Hóa đơn</a></li>
                <li><a href="#" onclick="switchTab('export')" id="nav-export" class="nav-link block px-6 py-3 tab-inactive"><i class="fa-solid fa-file-export w-6"></i> Báo cáo & Xuất file</a></li>
                <li><a href="#" onclick="switchTab('settings')" id="nav-settings" class="nav-link block px-6 py-3 tab-inactive"><i class="fa-solid fa-database w-6"></i> Quản lý Dữ liệu</a></li>
            </ul>
        </nav>
    </aside>

    <!-- Mobile Header -->
    <div class="md:hidden fixed top-0 w-full bg-indigo-700 text-white p-4 flex justify-between items-center z-10 shadow-md">
        <h1 class="text-lg font-bold">NTU Bridge 2026</h1>
        <button onclick="toggleSidebar()" class="text-white focus:outline-none p-1"><i class="fa-solid fa-bars text-xl"></i></button>
    </div>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden pt-14 md:pt-0 relative w-full">
        <div id="content-area" class="flex-1 overflow-y-auto p-4 md:p-8 w-full max-w-full"></div>
    </main>

    <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-2 pointer-events-none max-w-[90vw]"></div>

    <div id="modal-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden flex items-center justify-center backdrop-blur-sm p-4">
        <div id="modal-content" class="bg-white rounded-xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto transform transition-all"></div>
    </div>

    <div id="report-render-area" class="hidden bg-white text-black" style="width: 210mm; padding: 20mm; margin: 0 auto; box-sizing: border-box; background: white;"></div>
    <canvas id="hiddenReportChart" width="800" height="400" style="display:none;"></canvas>
    <canvas id="hiddenReportPieChart" width="400" height="400" style="display:none;"></canvas>

    <script>
        // ==========================================
        // 1. STATE MANAGEMENT (IN-MEMORY)
        // ==========================================
        const CATEGORIES = [
            { id: 1, name: '✈️ Vé máy bay', icon: 'fa-plane' },
            { id: 2, name: '🏨 Khách sạn', icon: 'fa-hotel' },
            { id: 3, name: '🚇 Di chuyển nội địa', icon: 'fa-train-subway' },
            { id: 4, name: '🍽️ Ăn uống', icon: 'fa-utensils' },
            { id: 5, name: '🏗️ Lệ phí cuộc thi', icon: 'fa-ticket' },
            { id: 6, name: '📦 Chi phí khác', icon: 'fa-box' }
        ];

        let state = {
            role: 'admin', 
            trip: { origin: 'Nha Trang (CXR)', destination: 'NTU, Singapore (SIN)', members: 5, budget: 50000000, exchangeRate: 18500 },
            plans: [
                { id: 1, catId: 1, desc: 'Vietjet Air bay thẳng', unit: 3500000, qty: 5, total: 17500000, selected: false, currency: 'VND', originalUnit: 3500000, mapLocation: 'Changi Airport', notes: '' },
                { id: 2, catId: 1, desc: 'Scoot (SGN-SIN) + Xe giường nằm', unit: 2800000, qty: 5, total: 14000000, selected: true, currency: 'VND', originalUnit: 2800000, mapLocation: 'Sân bay Tân Sơn Nhất', notes: '' },
                { id: 3, catId: 2, desc: 'NTU Guest House', unit: 1200000, qty: 4, total: 4800000, selected: true, currency: 'VND', originalUnit: 1200000, mapLocation: 'NTU Guest House Singapore', notes: '' },
                { id: 5, catId: 4, desc: 'Ăn uống Canteen NTU', unit: 370000, qty: 20, total: 7400000, selected: true, currency: 'SGD', originalUnit: 20, mapLocation: 'North Spine Food Court NTU', notes: '' },
                { id: 6, catId: 3, desc: 'Grab & MRT', unit: 370000, qty: 2, total: 740000, selected: true, currency: 'SGD', originalUnit: 20, routes: [{from: 'Changi', to: 'NTU'}], mapLocation: '', notes: '' }
            ],
            planLists: [],
            actuals: [
                { id: 1, catId: 1, desc: 'Mua vé Scoot đợt 1', amount: 14200000, date: '2026-02-15', currency: 'VND', originalAmount: 14200000, notes: 'Đã thanh toán qua thẻ tín dụng' },
                { id: 2, catId: 5, desc: 'Phí đăng ký BTC', amount: 2000000, date: '2026-02-10', currency: 'VND', originalAmount: 2000000, notes: '' }
            ],
            timeline: [
                { id: 1, date: '2026-03-10', time: '08:00', title: 'Tập trung xuất phát', location: 'ĐH Nha Trang', notes: 'Kiểm tra hộ chiếu', planId: null },
                { id: 2, date: '2026-03-10', time: '13:00', title: 'Bay đi Singapore', location: 'Sân bay TSN', notes: 'Có mặt trước 2 tiếng', planId: 2 }
            ],
            invoices: [
                { id: 1, expenseId: 1, filename: 've_scoot_pdf.png', dataUrl: null, date: '2026-02-15' }
            ]
        };

        let currentTab = 'dashboard';
        let charts = {}; 

        // ==========================================
        // 2. CORE UTILITIES
        // ==========================================
        const formatMoney = (amount) => new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(amount);
        const formatSGD = (amount) => new Intl.NumberFormat('en-SG', { style: 'currency', currency: 'SGD' }).format(amount);
        
        const formatDate = (dStr) => {
            if (!dStr) return '';
            const d = new Date(dStr);
            return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear()}`;
        };

        const showToast = (message, type = 'success') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const color = type === 'success' ? 'bg-green-500' : (type === 'error' ? 'bg-red-500' : 'bg-blue-500');
            toast.className = `${color} text-white px-4 md:px-6 py-3 rounded-lg shadow-lg flex items-center space-x-3 toast-enter pointer-events-auto text-sm md:text-base`;
            toast.innerHTML = `<i class="fa-solid ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> <span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };

        const openModal = (htmlContent) => {
            const modalOverlay = document.getElementById('modal-overlay');
            const modalContent = document.getElementById('modal-content');
            modalContent.innerHTML = htmlContent;
            modalOverlay.classList.remove('hidden');
        };

        const closeModal = () => {
            document.getElementById('modal-overlay').classList.add('hidden');
        };

        const showConfirm = (message, onConfirmCallback) => {
            const m = `
                <div class="p-4 md:p-6">
                    <h3 class="text-lg md:text-xl font-bold mb-4 text-gray-800 flex items-center"><i class="fa-solid fa-triangle-exclamation text-red-500 mr-2"></i> Xác nhận</h3>
                    <p class="text-sm md:text-base text-gray-600 mb-6">${message}</p>
                    <div class="flex justify-end space-x-3">
                        <button onclick="closeModal()" class="px-4 py-2 border rounded-md text-gray-600 hover:bg-gray-50 text-sm">Hủy</button>
                        <button id="btnConfirmAction" class="px-4 py-2 bg-red-600 text-white rounded-md hover:bg-red-700 font-medium text-sm">Đồng ý</button>
                    </div>
                </div>
            `;
            openModal(m);
            setTimeout(() => {
                document.getElementById('btnConfirmAction').onclick = () => { onConfirmCallback(); closeModal(); };
            }, 50);
        };

        const toggleRole = () => {
            state.role = state.role === 'admin' ? 'member' : 'admin';
            document.getElementById('currentUserRole').innerText = state.role === 'admin' ? 'Tấn Đạt đẹp trai - 64CNXD2' : 'Khách (Chỉ xem)';
            showToast(`Đã chuyển sang quyền: ${state.role.toUpperCase()}`, 'info');
            renderTab();
        };

        const checkAuth = () => {
            if (state.role !== 'admin') {
                showToast('Chỉ Admin mới có quyền thực hiện thao tác này!', 'error'); return false;
            }
            return true;
        };

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        function setupPasteHandler(elementId) {
            const div = document.getElementById(elementId);
            if (!div) return;
            div.addEventListener('paste', function(e) {
                const items = (e.clipboardData || e.originalEvent.clipboardData).items;
                let hasImage = false;
                for (let i = 0; i < items.length; i++) {
                    if (items[i].type.indexOf("image") !== -1) {
                        hasImage = true;
                        const blob = items[i].getAsFile();
                        const reader = new FileReader();
                        reader.onload = function(event) {
                            const img = document.createElement('img');
                            img.src = event.target.result;
                            img.style.maxWidth = '100%'; img.style.maxHeight = '300px'; img.style.borderRadius = '8px';
                            img.style.marginTop = '8px'; img.style.marginBottom = '8px'; img.style.boxShadow = '0 2px 5px rgba(0,0,0,0.1)';
                            const sel = window.getSelection();
                            if (sel.getRangeAt && sel.rangeCount) {
                                let range = sel.getRangeAt(0);
                                if (div.contains(range.commonAncestorContainer)) {
                                    range.deleteContents(); range.insertNode(img); range.setStartAfter(img); range.setEndAfter(img);
                                    sel.removeAllRanges(); sel.addRange(range);
                                } else { div.appendChild(img); }
                            } else { div.appendChild(img); }
                        };
                        reader.readAsDataURL(blob);
                    }
                }
                if (hasImage) e.preventDefault(); 
            });
        }

        // ==========================================
        // 3. FIREBASE CLOUD & SHARE LOGIC
        // ==========================================
        let db = null;
        let auth = null;
        let appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        async function initFirebase() {
            if (db) return;
            if(typeof window.fbInitApp === 'undefined') return; 
            try {
                const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' && __firebase_config ? __firebase_config : '{}');
                const app = window.fbInitApp(firebaseConfig);
                auth = window.fbGetAuth(app);
                db = window.fbGetFirestore(app);

                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await window.fbSignInToken(auth, __initial_auth_token);
                } else {
                    await window.fbSignInAnon(auth);
                }
            } catch(e) { console.error("Lỗi kết nối Server", e); }
        }

        async function shareApp() {
            if(!checkAuth()) return;
            try {
                showToast("Đang tạo link chia sẻ trực tuyến...", "info");
                await initFirebase();
                const user = auth.currentUser;
                if (!user) throw new Error("Chưa kết nối máy chủ");

                const shareId = crypto.randomUUID();
                const shareRef = window.fbDoc(db, 'artifacts', appId, 'public', 'data', 'shared_trips', shareId);
                await window.fbSetDoc(shareRef, { data: JSON.stringify(state), createdAt: new Date().toISOString() });

                let base = window.location.href.split('?')[0];
                let warningHtml = '';
                if (base.startsWith('blob:') || base.includes('usercontent')) {
                    base = "https://tên-miền-của-bạn.com/";
                    warningHtml = '<span class="text-[11px] text-red-500 block mb-2 font-medium border-l-2 border-red-500 pl-2">Lưu ý: Bạn đang chạy trên giả lập Canvas, link sinh ra chỉ là minh họa. Tính năng này sẽ hoạt động thật khi bạn host file này lên Github Pages/Vercel.</span>';
                }
                const shareUrl = base + '?sharedId=' + shareId;

                showConfirm(`
                    Đã lưu dữ liệu lên Cloud an toàn!<br>
                    ${warningHtml}
                    Hãy copy đường link dưới đây để gửi cho thành viên khác (Họ sẽ vào web với quyền Khách - Chỉ xem):<br>
                    <input type="text" value="${shareUrl}" class="w-full p-2 border rounded bg-gray-50 text-sm mt-3 font-medium text-blue-600 outline-none focus:border-blue-500" readonly onclick="this.select(); document.execCommand('copy'); showToast('Đã copy link vào khay nhớ tạm!');">
                `, () => {});
            } catch(e) {
                console.error(e);
                showToast("Dịch vụ tạo link tạm thời không khả dụng.", "error");
            }
        }

        async function saveToCloudCache() {
            if(!checkAuth()) return;
            try {
                showToast("Đang đồng bộ dữ liệu lên Đám mây...", "info");
                await initFirebase();
                const user = auth.currentUser;
                if (!user) throw new Error("No auth");

                const cacheRef = window.fbDoc(db, 'artifacts', appId, 'users', user.uid, 'cache', 'latest');
                await window.fbSetDoc(cacheRef, { data: JSON.stringify(state), updatedAt: new Date().toISOString() });
                showToast("Đã đồng bộ lên Bộ nhớ đệm thành công!", "success");
            } catch(e) {
                console.error(e);
                showToast("Lỗi đồng bộ đám mây", "error");
            }
        }

        async function loadFromCloudCache() {
            try {
                showToast("Đang tìm dữ liệu từ Đám mây...", "info");
                await initFirebase();
                const user = auth.currentUser;
                if (!user) return;

                const cacheRef = window.fbDoc(db, 'artifacts', appId, 'users', user.uid, 'cache', 'latest');
                const docSnap = await window.fbGetDoc(cacheRef);
                if (docSnap.exists()) {
                    state = JSON.parse(docSnap.data().data);
                    showToast("Đã tải dữ liệu cũ từ bộ nhớ đệm!", "success");
                    renderTab();
                } else {
                    showToast("Chưa có bộ nhớ đệm nào được lưu.", "info");
                }
            } catch(e) { console.error(e); }
        }

        async function checkSharedLink() {
            const urlParams = new URLSearchParams(window.location.search);
            const sharedId = urlParams.get('sharedId');
            if (sharedId) {
                try {
                    showToast("Đang kết nối để tải dữ liệu chia sẻ...", "info");
                    await initFirebase();
                    const shareRef = window.fbDoc(db, 'artifacts', appId, 'public', 'data', 'shared_trips', sharedId);
                    const docSnap = await window.fbGetDoc(shareRef);
                    if (docSnap.exists()) {
                        state = JSON.parse(docSnap.data().data);
                        state.role = 'member';
                        document.getElementById('currentUserRole').innerText = 'Khách (Chỉ xem)';
                        showToast("Tải dữ liệu thành công!", "success");
                        renderTab();
                    } else {
                        showToast("Link chia sẻ không tồn tại hoặc đã hết hạn!", "error");
                    }
                } catch(e) {
                    console.error(e);
                    showToast("Lỗi tải link chia sẻ", "error");
                }
            } else {
                setTimeout(() => { if(typeof window.fbInitApp !== 'undefined') loadFromCloudCache(); }, 800);
            }
        }

        // ==========================================
        // 4. TABS & RENDERING
        // ==========================================
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.nav-link').forEach(el => {
                el.classList.remove('tab-active'); el.classList.add('tab-inactive');
            });
            document.getElementById(`nav-${tab}`).classList.remove('tab-inactive');
            document.getElementById(`nav-${tab}`).classList.add('tab-active');
            if(window.innerWidth < 768 && !document.getElementById('sidebar').classList.contains('-translate-x-full')) {
                toggleSidebar();
            }
            renderTab();
        }

        function renderTab() {
            const contentArea = document.getElementById('content-area');
            contentArea.innerHTML = ''; 
            Object.values(charts).forEach(chart => chart.destroy()); charts = {};
            switch (currentTab) {
                case 'dashboard': renderDashboard(contentArea); break;
                case 'timeline': renderTimeline(contentArea); break;
                case 'planning': renderPlanning(contentArea); break;
                case 'actual': renderActual(contentArea); break;
                case 'invoices': renderInvoices(contentArea); break;
                case 'export': renderExport(contentArea); break;
                case 'settings': renderSettings(contentArea); break;
            }
        }

        // ==========================================
        // 5. MODULE: DASHBOARD
        // ==========================================
        function renderDashboard(container) {
            const estimatedTotal = state.plans.filter(p => p.selected).reduce((sum, p) => sum + p.total, 0);
            const actualTotal = state.actuals.reduce((sum, a) => sum + a.amount, 0);
            const remaining = state.trip.budget - actualTotal;
            const overBudget = actualTotal > state.trip.budget;

            let html = `
                <div class="flex flex-col md:flex-row md:justify-between md:items-center mb-6 gap-4">
                    <h2 class="text-2xl font-bold text-gray-800">Tổng quan chuyến đi</h2>
                    <button type="button" onclick="editTripInfo()" class="bg-white border shadow-sm px-4 py-2 rounded-lg text-sm font-medium hover:bg-gray-50 transition w-full md:w-auto ${state.role !== 'admin' ? 'hidden' : ''}">
                        <i class="fa-solid fa-pen mr-2"></i>Sửa thông tin
                    </button>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                    <div class="bg-indigo-600 text-white rounded-xl p-5 shadow-lg relative overflow-hidden">
                        <i class="fa-solid fa-wallet absolute right-[-20px] bottom-[-20px] text-8xl opacity-10"></i>
                        <p class="text-indigo-100 text-xs md:text-sm font-medium uppercase tracking-wider mb-1">Tổng Ngân sách</p>
                        <h3 class="text-xl md:text-2xl font-bold truncate" title="${formatMoney(state.trip.budget)}">${formatMoney(state.trip.budget)}</h3>
                        <p class="text-xs md:text-sm mt-2"><i class="fa-solid fa-users mr-1"></i> ${state.trip.members} thành viên</p>
                    </div>
                    <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
                        <p class="text-gray-500 text-xs md:text-sm font-medium uppercase tracking-wider mb-1">Dự toán (Đang chọn)</p>
                        <h3 class="text-xl md:text-2xl font-bold text-blue-600 truncate" title="${formatMoney(estimatedTotal)}">${formatMoney(estimatedTotal)}</h3>
                    </div>
                    <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
                        <p class="text-gray-500 text-xs md:text-sm font-medium uppercase tracking-wider mb-1">Thực tế đã chi</p>
                        <h3 class="text-xl md:text-2xl font-bold ${actualTotal > estimatedTotal ? 'text-orange-500' : 'text-green-600'} truncate" title="${formatMoney(actualTotal)}">${formatMoney(actualTotal)}</h3>
                    </div>
                    <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
                        <p class="text-gray-500 text-xs md:text-sm font-medium uppercase tracking-wider mb-1">Còn lại</p>
                        <h3 class="text-xl md:text-2xl font-bold ${overBudget ? 'text-red-600' : 'text-gray-800'} truncate" title="${formatMoney(remaining)}">${formatMoney(remaining)}</h3>
                    </div>
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-100 w-full overflow-hidden">
                        <h3 class="text-lg font-semibold mb-4 text-gray-700">Phân bổ Dự toán</h3>
                        <div class="relative h-64 w-full flex justify-center"><canvas id="pieChart"></canvas></div>
                    </div>
                    <div class="bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-100 w-full overflow-hidden">
                        <h3 class="text-lg font-semibold mb-4 text-gray-700">Dự toán vs Thực tế</h3>
                        <div class="relative h-64 w-full"><canvas id="barChart"></canvas></div>
                    </div>
                </div>
            `;
            container.innerHTML = html; renderCharts();
        }

        function renderCharts() {
            const labels = CATEGORIES.map(c => c.name.substring(3)); 
            const estData = CATEGORIES.map(c => state.plans.filter(p => p.catId === c.id && p.selected).reduce((sum, p) => sum + p.total, 0));
            const actData = CATEGORIES.map(c => state.actuals.filter(a => a.catId === c.id).reduce((sum, a) => sum + a.amount, 0));
            charts.pie = new Chart(document.getElementById('pieChart').getContext('2d'), {
                type: 'doughnut', data: { labels: labels, datasets: [{ data: estData, backgroundColor: ['#4f46e5', '#0ea5e9', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'], borderWidth: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: window.innerWidth < 768 ? 'bottom' : 'right', labels: { boxWidth: 12 } } } }
            });
            charts.bar = new Chart(document.getElementById('barChart').getContext('2d'), {
                type: 'bar', data: { labels: labels, datasets: [{ label: 'Dự toán', data: estData, backgroundColor: '#cbd5e1', borderRadius: 4 }, { label: 'Thực tế', data: actData, backgroundColor: '#4f46e5', borderRadius: 4 }] },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, ticks: { callback: (val) => val / 1000000 + 'M' } }, x: { ticks: { maxRotation: 45, minRotation: 45 } } } }
            });
        }

        function editTripInfo() {
            if(!checkAuth()) return;
            const m = `
                <div class="p-4 md:p-6"><h3 class="text-xl font-bold mb-4">Cập nhật chuyến đi</h3>
                    <div class="space-y-4">
                        <div><label class="block text-sm font-medium text-gray-700 mb-1">Ngân sách tổng (VNĐ)</label><input type="number" id="inpBudget" value="${state.trip.budget}" class="block w-full rounded-md border-gray-300 shadow-sm p-2 md:p-3 border focus:border-indigo-500 text-sm"></div>
                        <div class="flex flex-col sm:flex-row gap-4">
                            <div class="w-full sm:w-1/2"><label class="block text-sm font-medium text-gray-700 mb-1">Số thành viên</label><input type="number" id="inpMembers" value="${state.trip.members}" class="block w-full rounded-md border-gray-300 shadow-sm p-2 md:p-3 border focus:border-indigo-500 text-sm"></div>
                            <div class="w-full sm:w-1/2"><label class="block text-sm font-medium text-gray-700 mb-1">Tỷ giá (1 SGD = ? VNĐ)</label><input type="number" id="inpExchangeRate" value="${state.trip.exchangeRate || 18500}" class="block w-full rounded-md border-gray-300 shadow-sm p-2 md:p-3 border focus:border-indigo-500 text-sm"></div>
                        </div>
                    </div>
                    <div class="mt-6 flex justify-end space-x-3"><button type="button" onclick="closeModal()" class="px-4 py-2 border rounded-md hover:bg-gray-50 text-sm">Hủy</button><button type="button" onclick="saveTripInfo()" class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 text-sm">Lưu</button></div>
                </div>`;
            openModal(m);
        }
        function saveTripInfo() {
            state.trip.budget = parseFloat(document.getElementById('inpBudget').value) || 0;
            state.trip.members = parseInt(document.getElementById('inpMembers').value) || 1;
            state.trip.exchangeRate = parseFloat(document.getElementById('inpExchangeRate').value) || 18500;
            closeModal(); showToast('Đã cập nhật thông tin chuyến đi'); renderTab();
        }

        // ==========================================
        // 6. MODULE: TIMELINE
        // ==========================================
        function renderTimeline(container) {
            let html = `
                <div class="flex flex-col sm:flex-row sm:justify-between items-start sm:items-center mb-6 gap-4">
                    <div>
                        <h2 class="text-xl md:text-2xl font-bold text-gray-800">Lịch trình chuyến đi</h2>
                        <p class="text-xs md:text-sm text-gray-500">Chi tiết hoạt động, thời gian và địa điểm tại Singapore.</p>
                    </div>
                    <button type="button" onclick="openTimelineModal()" class="w-full sm:w-auto bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-indigo-700 transition shadow-sm ${state.role !== 'admin' ? 'hidden' : ''}">
                        <i class="fa-solid fa-plus mr-2"></i>Thêm hoạt động
                    </button>
                </div>
            `;

            if(!state.timeline || state.timeline.length === 0) {
                html += `<div class="text-center py-10 bg-white rounded-xl border border-dashed border-gray-300 text-gray-500 text-sm md:text-base mx-4">Chưa có lịch trình nào. Hãy thêm hoạt động mới.</div>`;
                container.innerHTML = html;
                return;
            }

            const sortedEvents = [...state.timeline].sort((a,b) => new Date(a.date + 'T' + (a.time||'00:00')) - new Date(b.date + 'T' + (b.time||'00:00')));
            const groupedEvents = {};
            sortedEvents.forEach(ev => {
                if(!groupedEvents[ev.date]) groupedEvents[ev.date] = [];
                groupedEvents[ev.date].push(ev);
            });

            html += `<div class="max-w-4xl mx-auto px-2 md:px-0 py-4"><div class="relative border-l-2 border-indigo-200 ml-3 md:ml-4">`;

            for (const [date, events] of Object.entries(groupedEvents)) {
                html += `
                    <div class="mb-8 md:mb-10 ml-6 md:ml-8">
                        <span class="absolute flex items-center justify-center w-8 h-8 bg-indigo-100 rounded-full -left-[17px] ring-4 ring-white text-indigo-600"><i class="fa-solid fa-calendar-day text-sm"></i></span>
                        <h3 class="font-bold text-lg text-indigo-900 mb-4 bg-white inline-block pr-4 py-1">${formatDate(date)}</h3>
                        <div class="space-y-4">
                `;

                events.forEach(ev => {
                    let planBtnHtml = '';
                    if (ev.planId) {
                        const linkedPlan = state.plans.find(p => p.id == ev.planId);
                        if (linkedPlan) {
                            planBtnHtml = `<div class="mt-3"><button type="button" onclick="viewPlanDetails(${ev.planId})" class="text-[11px] md:text-xs bg-blue-50 text-blue-700 border border-blue-100 px-3 py-1.5 rounded-lg shadow-sm hover:bg-blue-100 transition inline-flex items-center font-medium"><i class="fa-solid fa-map-location-dot mr-1.5"></i> Xem phương án & Bản đồ</button></div>`;
                        }
                    }

                    html += `
                        <div class="bg-white p-4 md:p-5 rounded-xl border border-gray-100 shadow-sm relative group hover:shadow-md transition">
                            <span class="absolute flex items-center justify-center w-3 h-3 bg-indigo-500 rounded-full -left-[2.1rem] md:-left-[2.35rem] top-6 ring-4 ring-white"></span>
                            <div class="flex justify-between items-start gap-4">
                                <div class="flex-1">
                                    <div class="text-sm font-bold text-indigo-600 mb-1 flex items-center"><i class="fa-regular fa-clock mr-1.5"></i> ${ev.time || 'Cả ngày'}</div>
                                    <h4 class="text-base md:text-lg font-bold text-gray-800 break-words">${ev.title}</h4>
                                    ${ev.location ? `<p class="text-xs md:text-sm text-gray-500 mt-1.5 font-medium"><i class="fa-solid fa-location-dot text-red-400 mr-1.5 w-4 text-center"></i> ${ev.location}</p>` : ''}
                                    ${ev.notes ? `<p class="text-xs md:text-sm text-gray-600 mt-2.5 bg-gray-50 p-2.5 rounded-lg border border-gray-100">${ev.notes}</p>` : ''}
                                    ${planBtnHtml}
                                </div>
                                <div class="flex flex-col sm:flex-row space-y-2 sm:space-y-0 sm:space-x-2 opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-opacity ${state.role !== 'admin' ? 'hidden' : ''}">
                                    <button type="button" onclick="openTimelineModal(${ev.id})" class="text-indigo-500 hover:text-indigo-700 bg-indigo-50 p-2 rounded transition" title="Sửa"><i class="fa-solid fa-pen pointer-events-none"></i></button>
                                    <button type="button" onclick="deleteTimelineEvent(${ev.id})" class="text-red-500 hover:text-red-700 bg-red-50 p-2 rounded transition" title="Xóa"><i class="fa-solid fa-trash pointer-events-none"></i></button>
                                </div>
                            </div>
                        </div>
                    `;
                });
                html += `</div></div>`;
            }
            html += `</div></div>`;
            container.innerHTML = html;
        }

        function openTimelineModal(id = null) {
            if(!checkAuth()) return;
            let ev = { date: new Date().toISOString().split('T')[0], time: '08:00', title: '', location: '', notes: '', planId: '' };
            let isEdit = false;
            if (id) { const found = state.timeline.find(t => t.id == id); if (found) { ev = found; isEdit = true; } }

            let planOptions = `<option value="">-- Không gắn phương án --</option>`;
            state.plans.forEach(p => { planOptions += `<option value="${p.id}" ${ev.planId == p.id ? 'selected' : ''}>${CATEGORIES.find(c => c.id == p.catId)?.name.substring(3)} - ${p.desc}</option>`; });

            const m = `
                <div class="p-4 md:p-6">
                    <h3 class="text-xl font-bold mb-4">${isEdit ? 'Sửa hoạt động' : 'Thêm hoạt động lịch trình'}</h3>
                    <div class="space-y-4">
                        <div class="flex flex-col sm:flex-row gap-4">
                            <div class="w-full sm:w-1/2"><label class="block text-sm font-medium text-gray-700 mb-1">Ngày</label><input type="date" id="inpTlDate" value="${ev.date}" class="block w-full rounded-md border-gray-300 shadow-sm p-2 border text-sm"></div>
                            <div class="w-full sm:w-1/2"><label class="block text-sm font-medium text-gray-700 mb-1">Giờ</label><input type="time" id="inpTlTime" value="${ev.time}" class="block w-full rounded-md border-gray-300 shadow-sm p-2 border text-sm"></div>
                        </div>
                        <div><label class="block text-sm font-medium text-gray-700 mb-1">Tên hoạt động (*)</label><input type="text" id="inpTlTitle" value="${ev.title}" placeholder="VD: Khai mạc cuộc thi" class="block w-full rounded-md border-gray-300 shadow-sm p-2 border text-sm"></div>
                        <div><label class="block text-sm font-medium text-gray-700 mb-1">Địa điểm</label><input type="text" id="inpTlLoc" value="${ev.location}" placeholder="VD: NTU Campus" class="block w-full rounded-md border-gray-300 shadow-sm p-2 border text-sm"></div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Gắn với phương án chi phí (Tùy chọn)</label>
                            <select id="inpTlPlanId" class="block w-full rounded-md border-gray-300 shadow-sm p-2 border text-sm text-indigo-700 font-medium">${planOptions}</select>
                        </div>
                        <div><label class="block text-sm font-medium text-gray-700 mb-1">Ghi chú thêm</label><textarea id="inpTlNotes" rows="2" class="block w-full rounded-md border-gray-300 shadow-sm p-2 border text-sm">${ev.notes}</textarea></div>
                    </div>
                    <div class="mt-6 flex justify-end space-x-3">
                        <button type="button" onclick="closeModal()" class="px-4 py-2 border rounded-md text-gray-600 hover:bg-gray-50 text-sm">Hủy</button>
                        <button type="button" onclick="saveTimelineEvent(${id ? id : 'null'})" class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 text-sm">Lưu</button>
                    </div>
                </div>
            `;
            openModal(m);
        }

        function saveTimelineEvent(id) {
            const date = document.getElementById('inpTlDate').value;
            const time = document.getElementById('inpTlTime').value;
            const title = document.getElementById('inpTlTitle').value.trim();
            const location = document.getElementById('inpTlLoc').value.trim();
            const notes = document.getElementById('inpTlNotes').value.trim();
            const planId = document.getElementById('inpTlPlanId').value ? parseInt(document.getElementById('inpTlPlanId').value) : null;

            if(!title || !date) { showToast("Vui lòng nhập Ngày và Tên!", "error"); return; }
            if (!state.timeline) state.timeline = [];

            if (id) { 
                const ev = state.timeline.find(t => t.id == id);
                if(ev) { ev.date = date; ev.time = time; ev.title = title; ev.location = location; ev.notes = notes; ev.planId = planId; }
                showToast("Đã cập nhật lịch trình");
            } else { 
                state.timeline.push({ id: Date.now(), date, time, title, location, notes, planId });
                showToast("Đã thêm vào lịch trình");
            }
            closeModal(); renderTab();
        }

        function deleteTimelineEvent(id) {
            if(!checkAuth()) return;
            showConfirm('Bạn có chắc chắn muốn xóa hoạt động này khỏi lịch trình?', () => {
                state.timeline = state.timeline.filter(t => t.id != id);
                showToast('Đã xóa', 'success'); renderTab();
            });
        }

        // ==========================================
        // 7. MODULE: PLANNING
        // ==========================================
        function renderPlanning(container) {
            let html = `
                <div class="flex flex-col md:flex-row md:justify-between items-start md:items-center mb-6 gap-4">
                    <div>
                        <h2 class="text-xl md:text-2xl font-bold text-gray-800">Lập phương án chi phí</h2>
                        <p class="text-xs md:text-sm text-gray-500">Tạo nhiều phương án, tích chọn và lưu lại thành các danh sách kịch bản.</p>
                    </div>
                    <div class="flex space-x-2 w-full md:w-auto overflow-x-auto pb-1">
                        <button type="button" onclick="promptSavePlanList()" class="flex-1 md:flex-none bg-blue-600 text-white px-3 py-2 rounded-lg text-sm font-medium hover:bg-blue-700 transition whitespace-nowrap ${state.role !== 'admin' ? 'hidden' : ''}"><i class="fa-solid fa-bookmark mr-1"></i>Lưu DS</button>
                        <button type="button" onclick="optimizePlans()" class="flex-1 md:flex-none bg-green-600 text-white px-3 py-2 rounded-lg text-sm font-medium hover:bg-green-700 transition whitespace-nowrap ${state.role !== 'admin' ? 'hidden' : ''}"><i class="fa-solid fa-wand-magic-sparkles mr-1"></i>Tối ưu</button>
                        <button type="button" onclick="openAddPlanModal()" class="flex-1 md:flex-none bg-indigo-600 text-white px-3 py-2 rounded-lg text-sm font-medium hover:bg-indigo-700 transition whitespace-nowrap ${state.role !== 'admin' ? 'hidden' : ''}"><i class="fa-solid fa-plus mr-1"></i>Thêm</button>
                    </div>
                </div>
                <div class="space-y-6">
            `;

            CATEGORIES.forEach(cat => {
                const catPlans = state.plans.filter(p => p.catId === cat.id);
                if (catPlans.length === 0) return;

                html += `
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden w-full">
                    <div class="bg-gray-50 px-4 md:px-5 py-3 border-b border-gray-200 flex justify-between items-center"><h3 class="font-bold text-gray-700 text-sm md:text-base"><i class="fa-solid ${cat.icon} text-indigo-500 mr-2"></i>${cat.name}</h3></div>
                    <div class="table-scroll-container overflow-x-auto max-h-[400px] w-full">
                        <table class="w-full text-left border-collapse min-w-[600px] md:min-w-full">
                            <thead class="sticky top-0 bg-white z-10 shadow-sm">
                                <tr class="text-xs text-gray-500 uppercase tracking-wider border-b">
                                    <th class="p-3 w-10 text-center">Chọn</th><th class="p-3 min-w-[150px]">Mô tả chi tiết</th><th class="p-3 text-right">Đơn giá</th><th class="p-3 text-center w-16">SL</th><th class="p-3 text-right min-w-[120px]">Tổng cộng</th><th class="p-3 w-20 text-center">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-100 text-xs md:text-sm">
                `;

                catPlans.forEach(plan => {
                    html += `
                                <tr class="${plan.selected ? 'bg-indigo-50/50' : 'hover:bg-gray-50'} transition">
                                    <td class="p-3 text-center"><input type="checkbox" ${plan.selected ? 'checked' : ''} onchange="togglePlanSelection(${plan.id})" class="w-4 h-4 text-indigo-600 focus:ring-indigo-500 rounded cursor-pointer" ${state.role !== 'admin' ? 'disabled' : ''}></td>
                                    <td class="p-3 font-medium text-gray-800 break-words">${plan.desc}${plan.notes ? `<i class="fa-solid fa-sticky-note text-yellow-500 ml-1"></i>` : ''}</td>
                                    <td class="p-3 text-right">${plan.currency === 'SGD' ? `<div class="font-bold text-gray-800">${formatSGD(plan.originalUnit)}</div><div class="text-[10px] text-gray-400 font-medium">~ ${formatMoney(plan.unit)}</div>` : `<div class="font-bold text-gray-800">${formatMoney(plan.unit)}</div>`}</td>
                                    <td class="p-3 text-center text-gray-600">${plan.qty}</td>
                                    <td class="p-3 text-right font-bold ${plan.selected ? 'text-indigo-700' : 'text-gray-800'}">${formatMoney(plan.total)}</td>
                                    <td class="p-3 text-center flex justify-center space-x-2">
                                        <button type="button" onclick="viewPlanDetails(${plan.id})" class="text-blue-500 hover:text-blue-700 p-1" title="Chi tiết"><i class="fa-solid fa-map-location-dot pointer-events-none"></i></button>
                                        <button type="button" onclick="deletePlan(${plan.id})" class="text-red-400 hover:text-red-600 p-1 ${state.role !== 'admin' ? 'hidden' : ''}" title="Xóa"><i class="fa-solid fa-trash pointer-events-none"></i></button>
                                    </td>
                                </tr>
                    `;
                });
                html += `</tbody></table></div></div>`;
            });

            if(state.plans.length === 0) html += `<div class="text-center py-10 bg-white rounded-xl border border-dashed border-gray-300 text-gray-500 text-sm mx-4">Chưa có phương án nào.</div>`;
            html += `</div>`;

            if (state.planLists && state.planLists.length > 0) {
                html += `<div class="mt-8 border-t pt-6"><h2 class="text-xl md:text-2xl font-bold text-gray-800 mb-4 flex items-center"><i class="fa-solid fa-layer-group text-blue-600 mr-2"></i> Kịch bản / Danh sách đã lưu</h2><div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">`;
                const sortedLists = [...state.planLists].sort((a,b) => new Date(b.dateCreated) - new Date(a.dateCreated));
                sortedLists.forEach(list => {
                    html += `
                        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 hover:shadow-md transition flex flex-col">
                            <div class="flex justify-between items-start mb-2"><h4 class="font-bold text-gray-800 text-lg line-clamp-2">${list.name}</h4><div class="flex space-x-1 ${state.role !== 'admin' ? 'hidden' : ''} flex-shrink-0 ml-2"><button type="button" onclick="deletePlanList(${list.id})" class="text-red-400 hover:text-red-600 p-1" title="Xóa"><i class="fa-solid fa-trash"></i></button></div></div>
                            <p class="text-xs text-gray-500 mb-3">${list.planIds.length} phương án được chọn</p>
                            <p class="text-indigo-700 font-bold text-xl mb-4 flex-1">${formatMoney(list.totalCost)}</p>
                            <div class="flex space-x-2 mt-auto">
                                <button type="button" onclick="viewPlanList(${list.id})" class="flex-1 bg-blue-50 text-blue-700 py-1.5 rounded-lg text-sm font-medium hover:bg-blue-100">Chi tiết</button>
                                <button type="button" onclick="applyPlanList(${list.id})" class="flex-1 bg-blue-600 text-white py-1.5 rounded-lg text-sm font-medium hover:bg-blue-700 ${state.role !== 'admin' ? 'hidden' : ''}">Áp dụng</button>
                            </div>
                        </div>`;
                });
                html += `</div></div>`;
            }
            container.innerHTML = html;
        }

        function togglePlanSelection(planId) {
            if(!checkAuth()) return;
            const targetPlan = state.plans.find(p => p.id == planId);
            if (targetPlan) { targetPlan.selected = !targetPlan.selected; renderTab(); }
        }

        function optimizePlans() {
            if(!checkAuth()) return;
            let changed = false;
            CATEGORIES.forEach(cat => {
                const plans = state.plans.filter(p => p.catId === cat.id);
                if (plans.length > 0) {
                    plans.forEach(p => p.selected = false);
                    const optimal = plans.reduce((prev, curr) => prev.total < curr.total ? prev : curr);
                    optimal.selected = true; changed = true;
                }
            });
            if(changed) { showToast('Đã tự động chọn mức giá rẻ nhất!', 'success'); renderTab(); }
        }

        function deletePlan(id) {
            if(!checkAuth()) return;
            showConfirm('Bạn có chắc chắn muốn xóa phương án này?', () => {
                state.plans = state.plans.filter(p => p.id != id);
                if (state.timeline) state.timeline.forEach(t => { if(t.planId == id) t.planId = null; });

        function toggleRouteSection() {
            const catId = document.getElementById('inpCatId').value;
            const routeSec = document.getElementById('routeSection');
            if (catId == '3') { routeSec.classList.remove('hidden'); renderRouteInputs(); } 
            else { routeSec.classList.add('hidden'); }
        }

        function renderRouteInputs() {
            const catId = document.getElementById('inpCatId').value;
            if(catId != '3') return;
            const count = Math.max(1, parseInt(document.getElementById('inpQty').value) || 1);
            const container = document.getElementById('routeInputsContainer');
            
            let existingRoutes = [];
            for(let i=1; i<=container.children.length; i++) {
                existingRoutes.push({
                    from: document.getElementById(`routeFrom_${i}`)?.value || '',
                    to: document.getElementById(`routeTo_${i}`)?.value || '',
                    price: parseFloat(document.getElementById(`routePrice_${i}`)?.value) || 0
                });
            }
            let html = '';
            for(let i=1; i<=count; i++) {
                const fromVal = existingRoutes[i-1]?.from || '';
                const toVal = existingRoutes[i-1]?.to || '';
                const priceVal = existingRoutes[i-1]?.price || '';
                html += `
                    <div class="flex flex-col sm:flex-row space-y-2 sm:space-y-0 sm:space-x-2 items-start sm:items-center mb-2 bg-white p-2 rounded border border-blue-50">
                        <span class="text-xs font-bold text-blue-700 w-full sm:w-4 hidden sm:block">${i}.</span>
                        <div class="flex w-full space-x-2">
                            <input type="text" id="routeFrom_${i}" value="${fromVal}" placeholder="Từ" class="w-2/5 rounded-md border-blue-200 shadow-sm p-2 text-xs md:text-sm focus:border-blue-500">
                            <i class="fa-solid fa-arrow-right text-blue-400 text-xs mt-3"></i>
                            <input type="text" id="routeTo_${i}" value="${toVal}" placeholder="Đến" class="w-2/5 rounded-md border-blue-200 shadow-sm p-2 text-xs md:text-sm focus:border-blue-500">
                            <input type="number" id="routePrice_${i}" value="${priceVal}" oninput="calcTotalFromRoutes()" placeholder="Giá" class="w-1/5 rounded-md border-blue-200 shadow-sm p-2 text-xs md:text-sm focus:border-blue-500 font-bold text-blue-700 px-1">
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
            setTimeout(calcTotalFromRoutes, 50);
        }

        function calcTotalFromRoutes() {
            if(document.getElementById('inpCatId').value != '3') return;
            const count = parseInt(document.getElementById('inpQty').value) || 0;
            let totalUnitStr = 0;
            for(let i=1; i<=count; i++) totalUnitStr += (parseFloat(document.getElementById(`routePrice_${i}`)?.value) || 0);
            const unitInput = document.getElementById('inpUnit');
            if(unitInput) { unitInput.value = totalUnitStr; calcTotal(); }
        }

        function calcTotal() {
            const catId = document.getElementById('inpCatId').value;
            const u = parseFloat(document.getElementById('inpUnit').value) || 0;
            const curr = document.getElementById('inpCurrency').value;
            const rate = state.trip.exchangeRate || 18500;
            const vndUnit = curr === 'SGD' ? u * rate : u;
            let totalVnd = (catId == '3') ? vndUnit : vndUnit * (parseFloat(document.getElementById('inpQty').value) || 0);
            document.getElementById('inpTotal').value = formatMoney(totalVnd);
        }

        function updatePlan(id) {
            const plan = state.plans.find(p => p.id == id);
            if(!plan) return;

            const desc = document.getElementById('inpDesc').value;
            const currency = document.getElementById('inpCurrency').value;
            const originalUnit = parseFloat(document.getElementById('inpUnit').value) || 0;
            const qty = parseFloat(document.getElementById('inpQty').value) || 0;
            const mapLocation = document.getElementById('inpMapLoc').value.trim();
            const notes = document.getElementById('inpPlanNotes').innerHTML;
            
            if(!desc || originalUnit <= 0) { showToast("Dữ liệu không hợp lệ!", "error"); return; }

            const rate = state.trip.exchangeRate || 18500;
            const unit = currency === 'SGD' ? originalUnit * rate : originalUnit;

            let routes = [];
            if (plan.catId === 3) {
                for(let i=1; i<=qty; i++) {
                    const from = document.getElementById(`routeFrom_${i}`)?.value || '';
                    const to = document.getElementById(`routeTo_${i}`)?.value || '';
                    const price = parseFloat(document.getElementById(`routePrice_${i}`)?.value) || 0;
                    if (from || to) routes.push({ from, to, price });
                }
            }
            
            plan.desc = desc; plan.currency = currency; plan.originalUnit = originalUnit;
            plan.unit = unit; plan.qty = qty; plan.routes = routes;
            plan.mapLocation = mapLocation; plan.notes = notes;
            plan.total = (plan.catId === 3) ? unit : unit * qty;

            showToast('Cập nhật thành công!'); renderTab(); viewPlanDetails(id);
        }

        function saveNewPlan() {
            const catId = parseInt(document.getElementById('inpCatId').value);
            const desc = document.getElementById('inpDesc').value;
            const currency = document.getElementById('inpCurrency').value;
            const originalUnit = parseFloat(document.getElementById('inpUnit').value) || 0;
            const qty = parseFloat(document.getElementById('inpQty').value) || 0;
            const mapLocation = document.getElementById('inpMapLoc').value.trim();
            const notes = document.getElementById('inpPlanNotes').innerHTML;
            
            if(!desc || originalUnit <= 0) { showToast("Dữ liệu không hợp lệ!", "error"); return; }

            const rate = state.trip.exchangeRate || 18500;
            const unit = currency === 'SGD' ? originalUnit * rate : originalUnit;

            let routes = [];
            if (catId === 3) {
                for(let i=1; i<=qty; i++) {
                    const from = document.getElementById(`routeFrom_${i}`)?.value || '';
                    const to = document.getElementById(`routeTo_${i}`)?.value || '';
                    const price = parseFloat(document.getElementById(`routePrice_${i}`)?.value) || 0;
                    if (from || to) routes.push({ from, to, price });
                }
            }
            
            const total = (catId === 3) ? unit : unit * qty;
            const isFirstInCategory = !state.plans.some(p => p.catId === catId);

            state.plans.push({
                id: Date.now(), catId, desc, unit, qty, total, mapLocation, notes,
                currency, originalUnit, routes, selected: isFirstInCategory
            });

            closeModal(); showToast('Đã thêm thành công'); renderTab();
        }

        function promptSavePlanList() {
            if(!checkAuth()) return;
            const selectedPlans = state.plans.filter(p => p.selected);
            if (selectedPlans.length === 0) { showToast("Vui lòng tích chọn ít nhất 1 phương án!", "error"); return; }
            const total = selectedPlans.reduce((sum, p) => sum + p.total, 0);

            const m = `
                <div class="p-4 md:p-6">
                    <h3 class="text-lg md:text-xl font-bold mb-4 text-blue-800">Lưu thành Kịch bản / Danh sách</h3>
                    <p class="text-sm text-gray-600 mb-4">Bạn đang chọn <strong>${selectedPlans.length}</strong> phương án. Tổng chi phí: <strong class="text-indigo-700">${formatMoney(total)}</strong>.</p>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs md:text-sm font-medium text-gray-700 mb-1">Tên Kịch bản</label>
                            <input type="text" id="inpPlanListName" placeholder="VD: Phương án đi siêu tiết kiệm" class="block w-full rounded-md border-gray-300 shadow-sm p-2 border text-sm">
                        </div>
                    </div>
                    <div class="mt-6 flex justify-end space-x-3">
                        <button type="button" onclick="closeModal()" class="px-4 py-2 border rounded-md text-gray-600 hover:bg-gray-50 text-sm">Hủy</button>
                        <button type="button" onclick="savePlanList()" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 text-sm">Lưu</button>
                    </div>
                </div>`;
            openModal(m);
        }

        function savePlanList() {
            const name = document.getElementById('inpPlanListName').value.trim();
            if (!name) return;
            const selectedPlans = state.plans.filter(p => p.selected);
            const totalCost = selectedPlans.reduce((sum, p) => sum + p.total, 0);
            if (!state.planLists) state.planLists = [];
            state.planLists.push({ id: Date.now(), name: name, planIds: selectedPlans.map(p => p.id), totalCost: totalCost, dateCreated: new Date().toISOString() });
            closeModal(); showToast("Đã lưu thành Kịch bản mới!", "success"); renderTab();
        }

        function deletePlanList(id) {
            if(!checkAuth()) return;
            showConfirm("Xóa kịch bản / danh sách phương án này?", () => { state.planLists = state.planLists.filter(l => l.id != id); showToast("Đã xóa", "success"); renderTab(); });
        }

        function applyPlanList(id) {
            if(!checkAuth()) return;
            const list = state.planLists.find(l => l.id == id);
            if (!list) return;
            state.plans.forEach(p => p.selected = false);
            state.plans.forEach(p => { if (list.planIds.includes(p.id)) p.selected = true; });
            showToast(`Đã áp dụng cấu hình: ${list.name}`, 'success'); renderTab();
        }

        function viewPlanList(id) {
            const list = state.planLists.find(l => l.id == id);
            if (!list) return;
            const plansInList = state.plans.filter(p => list.planIds.includes(p.id));
            
            const grouped = {};
            plansInList.forEach(p => {
                if(!grouped[p.catId]) grouped[p.catId] = [];
                grouped[p.catId].push(p);
            });

            let tbody = '';
            CATEGORIES.forEach(cat => {
                if(grouped[cat.id]) {
                    const catSubtotal = grouped[cat.id].reduce((sum, p) => sum + p.total, 0);
                    tbody += `
                        <tr class="bg-indigo-50 border-b border-indigo-100">
                            <td colspan="2" class="py-2 px-3 text-xs md:text-sm font-bold text-indigo-800"><i class="fa-solid ${cat.icon} mr-2 w-4 text-center"></i>${cat.name.substring(3)}</td>
                            <td class="py-2 px-3 text-xs md:text-sm text-right font-bold text-indigo-800 whitespace-nowrap">${formatMoney(catSubtotal)}</td>
                        </tr>
                    `;
                    grouped[cat.id].forEach(p => {
                        tbody += `
                            <tr class="border-b border-gray-100 hover:bg-gray-50">
                                <td class="py-2 px-3 text-xs md:text-sm text-gray-400 pl-4 md:pl-8 italic"></td>
                                <td class="py-2 px-3 text-xs md:text-sm text-gray-800 break-words"><i class="fa-solid fa-angle-right text-gray-300 mr-2"></i>${p.desc}</td>
                                <td class="py-2 px-3 text-xs md:text-sm text-right font-medium text-gray-700 whitespace-nowrap">${formatMoney(p.total)}</td>
                            </tr>
                        `;
                    });
                }
            });

            const m = `
                <div class="p-4 md:p-6 max-h-[85vh] flex flex-col">
                    <div class="flex justify-between items-start mb-4 sticky top-0 bg-white z-10 pb-2 border-b"><h3 class="text-base md:text-lg font-bold text-gray-800 pr-2"><i class="fa-solid fa-list-check text-blue-600 mr-2"></i>${list.name}</h3><button type="button" onclick="closeModal()" class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark text-xl"></i></button></div>
                    <div class="overflow-y-auto flex-1 table-scroll-container"><table class="w-full text-left min-w-[400px]">
                        <thead class="text-xs text-gray-500 uppercase bg-gray-50"><tr><th class="py-2 px-3 w-1/4">Hạng mục</th><th class="py-2 px-3 w-1/2">Chi tiết</th><th class="py-2 px-3 text-right w-1/4">Chi phí</th></tr></thead>
                        <tbody>${tbody}</tbody>
                    </table></div>
                    <div class="mt-4 pt-4 border-t flex justify-between items-center sticky bottom-0 bg-white z-10"><span class="text-gray-600 font-medium">Tổng chi phí:</span><span class="text-xl md:text-2xl font-bold text-indigo-700">${formatMoney(list.totalCost)}</span></div>
                </div>`;
            openModal(m);
        }

        // ==========================================
        // 8. MODULE: ACTUAL EXPENSES
        // ==========================================
        function renderActual(container) {
            let totalActual = state.actuals.reduce((sum, a) => sum + a.amount, 0);

            `;

            if(state.actuals.length === 0) html += `<tr><td colspan="6" class="p-8 text-center text-gray-400">Chưa có khoản chi nào được ghi nhận.</td></tr>`;

            const sortedActuals = [...state.actuals].sort((a,b) => new Date(b.date) - new Date(a.date));

            sortedActuals.forEach(act => {
                const cat = CATEGORIES.find(c => c.id === act.catId);
                const hasNotes = act.notes && act.notes.trim() !== '';
                const invCount = state.invoices.filter(i => i.expenseId === act.id).length;

                const invoiceBtn = invCount > 0 
                    ? `<button type="button" onclick="viewActualDetails(${act.id}); event.stopPropagation();" class="bg-green-50 text-green-700 py-1 px-2 rounded-lg text-[10px] md:text-xs whitespace-nowrap hover:bg-green-100 border border-green-200 transition font-medium"><i class="fa-solid fa-check md:mr-1"></i><span class="hidden md:inline">Đã có</span> (${invCount})</button>`
                    : `<button type="button" onclick="openUploadModal(${act.id}); event.stopPropagation();" class="bg-gray-50 text-gray-600 hover:bg-indigo-50 hover:text-indigo-700 hover:border-indigo-200 border border-gray-200 transition py-1 px-2 rounded-lg text-[10px] md:text-xs whitespace-nowrap font-medium ${state.role !== 'admin' ? 'hidden' : ''}"><i class="fa-solid fa-arrow-up-from-bracket md:mr-1"></i><span class="hidden md:inline">Thêm HĐ</span></button>`;

                html += `
                    <tr class="hover:bg-gray-50 transition cursor-pointer" onclick="viewActualDetails(${act.id})">
                        <td class="p-3 md:p-4 text-gray-600 whitespace-nowrap">${formatDate(act.date)}</td>
                        <td class="p-3 md:p-4 font-medium whitespace-nowrap"><i class="fa-solid ${cat.icon} text-gray-400 mr-1 md:mr-2"></i><span class="hidden sm:inline">${cat.name.substring(3)}</span></td>
                        <td class="p-3 md:p-4 text-gray-800 break-words">
                            ${act.desc}
                            ${hasNotes ? `<i class="fa-solid fa-file-lines text-blue-400 ml-1" title="Có ghi chú/hình ảnh"></i>` : ''}
                        </td>
                        <td class="p-3 md:p-4 text-right">
                            ${act.currency === 'SGD' ? `<div class="font-bold text-gray-800 whitespace-nowrap">${formatSGD(act.originalAmount)}</div><div class="text-[10px] md:text-xs text-gray-400 font-medium whitespace-nowrap">~ ${formatMoney(act.amount)}</div>` : `<div class="font-bold text-gray-800 whitespace-nowrap">${formatMoney(act.amount)}</div>`}

                        <td class="p-3 md:p-4 text-center">${invoiceBtn}</td>

                            </button>

                `;
            });

            html += `

                                    <td colspan="2"></td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>
                </div>
            `;
            container.innerHTML = html;
        }

            let invoiceHtml = '';
            if (invoices.length > 0) {

                    <button type="button" onclick="openUploadModal(${act.id})" class="text-xs bg-blue-50 text-blue-600 px-2 py-1 rounded hover:bg-blue-100 ${state.role !== 'admin' ? 'hidden' : ''}">+ Thêm hóa đơn</button>

                            <button type="button" onclick="deleteInvoice(${inv.id});" class="absolute top-1 right-1 bg-red-500 text-white w-6 h-6 rounded-full opacity-0 group-hover:opacity-100 transition flex items-center justify-center ${state.role !== 'admin' ? 'hidden' : ''}"><i class="fa-solid fa-xmark text-xs"></i></button>
                        </div>`;
                });

            } else {
                invoiceHtml = `

                        <button type="button" onclick="openUploadModal(${act.id})" class="bg-white border border-gray-300 text-gray-700 px-3 py-1.5 rounded-lg text-xs font-medium hover:bg-gray-100 shadow-sm ${state.role !== 'admin' ? 'hidden' : ''}"><i class="fa-solid fa-upload mr-1"></i> Tải Hóa đơn lên</button>
                    </div>

            const notesHtml = (act.notes && act.notes.trim() !== '') ? `<h4 class="font-bold text-gray-800 mb-2 mt-4"><i class="fa-solid fa-file-lines text-yellow-500 mr-2"></i>Ghi chú</h4><div class="bg-yellow-50 p-3 rounded-lg border border-yellow-100 text-sm overflow-hidden">${act.notes}</div>` : '';

            const m = `
                <div class="p-0 flex flex-col max-h-[85vh]">
                    <div class="p-3 md:p-4 border-b bg-gray-50 flex justify-between items-center rounded-t-xl sticky top-0 z-10">
                        <h3 class="text-base md:text-lg font-bold text-indigo-700 flex items-center">
                            <i class="fa-solid ${cat.icon} mr-2"></i> Chi tiết khoản chi
                        </h3>
                        <div class="flex space-x-2 items-center">
                            <button type="button" onclick="openActualModal(${act.id})" class="text-indigo-600 hover:bg-indigo-100 px-3 py-1 rounded transition text-sm font-bold ${state.role !== 'admin' ? 'hidden' : ''}"><i class="fa-solid fa-pen mr-1"></i>Sửa</button>
                            <button type="button" onclick="closeModal()" class="text-gray-400 hover:text-gray-600 border-l pl-2"><i class="fa-solid fa-xmark text-xl"></i></button>
                        </div>
                    </div>
                    <div class="p-4 md:p-6 overflow-y-auto">
                        <div class="mb-4">
                            <p class="text-xs text-gray-500 mb-1"><i class="fa-regular fa-calendar mr-1"></i> Ngày chi: <strong>${formatDate(act.date)}</strong></p>
                            <h4 class="text-lg font-bold text-gray-800 break-words">${act.desc}</h4>
                        </div>
                        <div class="bg-indigo-50 p-4 rounded-xl border border-indigo-100 flex justify-between items-center mb-4">
                            <span class="text-sm font-medium text-gray-600">Số tiền thanh toán:</span>
                            <span class="font-bold text-xl md:text-2xl text-indigo-700">
                                ${act.currency === 'SGD' ? `${formatSGD(act.originalAmount)} <span class="text-sm text-gray-500">(~${formatMoney(act.amount)})</span>` : formatMoney(act.amount)}
                            </span>
                        </div>
                        ${notesHtml}
                        ${invoiceHtml}
                    </div>
                </div>
            `;
            openModal(m);
        }

        function openActualModal(id = null) {
            if(!checkAuth()) return;
            let catOptions = CATEGORIES.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            
            let act = { date: new Date().toISOString().split('T')[0], catId: 1, desc: '', currency: 'VND', originalAmount: '', notes: '' };
            if (id) {
                const found = state.actuals.find(a => a.id == id);
                if (found) act = found;
                catOptions = CATEGORIES.map(c => `<option value="${c.id}" ${c.id == act.catId ? 'selected' : ''}>${c.name}</option>`).join('');
            }

            const m = `
                <div class="p-4 md:p-6 max-h-[85vh] flex flex-col">
                    <h3 class="text-lg md:text-xl font-bold mb-4 sticky top-0 bg-white z-10 pb-2 border-b">${id ? 'Sửa khoản chi' : 'Ghi nhận chi phí thực tế'}</h3>
                    <div class="space-y-4 overflow-y-auto pr-1">
                        <div class="flex flex-col sm:flex-row gap-3">
                            <div class="w-full sm:w-1/2">
                                <label class="block text-xs md:text-sm font-medium text-gray-700 mb-1">Ngày chi</label>
                                <input type="date" id="inpActDate" value="${act.date}" class="block w-full rounded-md border-gray-300 shadow-sm p-2 border text-sm">
                            </div>
                            <div class="w-full sm:w-1/2">
                                <label class="block text-xs md:text-sm font-medium text-gray-700 mb-1">Hạng mục</label>
                                <select id="inpActCatId" class="block w-full rounded-md border-gray-300 shadow-sm p-2 border text-sm">${catOptions}</select>
                            </div>

                        <div class="flex flex-col sm:flex-row gap-3">

                                    <option value="VND" ${act.currency === 'VND' ? 'selected' : ''}>VNĐ</option>
                                    <option value="SGD" ${act.currency === 'SGD' ? 'selected' : ''}>SGD (Đô Sing)</option>
                                </select>
                            </div>
                            <div class="w-full sm:w-2/3">

                            </div>
                        </div>
                        <div>
                            <label class="block text-xs md:text-sm font-medium text-gray-700 mb-1">Ghi chú & Hình chụp <span class="text-indigo-600">(Bấm Ctrl+V để dán)</span></label>
                            <div id="inpActNotes" contenteditable="true" class="block w-full min-h-[80px] max-h-[250px] overflow-y-auto rounded-md border border-gray-300 shadow-sm p-2 focus:border-indigo-500 outline-none text-sm bg-white">${act.notes || ''}</div>
                        </div>
                    </div>
                    <div class="mt-4 pt-4 border-t flex justify-end space-x-3 sticky bottom-0 bg-white">
                        <button type="button" onclick="${id ? `viewActualDetails(${id})` : 'closeModal()'}" class="px-4 py-2 border rounded-md text-gray-600 hover:bg-gray-50 text-sm">Hủy</button>
                        <button type="button" onclick="saveActual(${id ? id : 'null'})" class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 text-sm">Lưu</button>
                    </div>
                </div>
            `;
            openModal(m);
            setTimeout(() => setupPasteHandler('inpActNotes'), 50);
        }

        function saveActual(id) {
            const date = document.getElementById('inpActDate').value;
            const catId = parseInt(document.getElementById('inpActCatId').value);
            const desc = document.getElementById('inpActDesc').value.trim();
            const currency = document.getElementById('inpActCurrency').value;
            const originalAmount = parseFloat(document.getElementById('inpActAmount').value) || 0;
            const notes = document.getElementById('inpActNotes').innerHTML;
            
            if(!desc || originalAmount <= 0) { showToast("Vui lòng nhập Diễn giải và Số tiền!", "error"); return; }

            const rate = state.trip.exchangeRate || 18500;
            const amount = currency === 'SGD' ? originalAmount * rate : originalAmount;

            if (id) {
                const act = state.actuals.find(a => a.id == id);
                if (act) { act.date=date; act.catId=catId; act.desc=desc; act.currency=currency; act.originalAmount=originalAmount; act.amount=amount; act.notes=notes; }
            } else {
                state.actuals.push({ id: Date.now(), catId, desc, amount, date, currency, originalAmount, notes });
            }
            closeModal(); showToast('Đã lưu khoản chi!'); 
            if(id) viewActualDetails(id); else renderTab();
        }

        function deleteActual(id) {
            if(!checkAuth()) return;
            showConfirm('Bạn có chắc chắn muốn xóa khoản chi này? Các hình ảnh gắn kèm cũng sẽ bị xóa.', () => {
                state.actuals = state.actuals.filter(a => a.id != id);
                state.invoices = state.invoices.filter(i => i.expenseId != id);
                showToast('Đã xóa', 'success'); renderTab();
            });
        }

        // ==========================================
        // 9. MODULE: INVOICES & MINH CHỨNG
        // ==========================================
        function renderInvoices(container) {
            let html = `
                <div class="flex flex-col sm:flex-row sm:justify-between items-start sm:items-center mb-6 gap-4">

                    </div>
                    <button type="button" onclick="openUploadModal()" class="w-full sm:w-auto bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-indigo-700 transition shadow-sm ${state.role !== 'admin' ? 'hidden' : ''}">
                        <i class="fa-solid fa-upload mr-2"></i>Upload Hóa đơn

                </div>
                
                <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">

                const expense = state.actuals.find(a => a.id === inv.expenseId);

        function openUploadModal(prefillExpId = null) {
            if(!checkAuth()) return;
            let actOptions = state.actuals.map(a => `<option value="${a.id}" ${prefillExpId == a.id ? 'selected' : ''}>${a.desc} - ${formatMoney(a.amount)}</option>`).join('');

                            <select id="inpInvExpId" class="block w-full rounded-md border-gray-300 shadow-sm p-2 md:p-3 border focus:border-indigo-500 text-sm md:text-base font-medium text-indigo-700">${actOptions}</select>

                    </div>
                    <div class="mt-6 flex justify-end space-x-3">
                        <button type="button" onclick="${prefillExpId ? `viewActualDetails(${prefillExpId})` : 'closeModal()'}" class="px-4 py-2 border rounded-md text-gray-600 hover:bg-gray-50 text-sm md:text-base">Hủy</button>
                        <button type="button" onclick="saveInvoice(${prefillExpId ? prefillExpId : 'null'})" class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 text-sm md:text-base"><i class="fa-solid fa-cloud-arrow-up mr-2"></i>Upload</button>
                    </div>
                </div>
