<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTU Bridge Design 2026 - Cost Manager</title>
    
    <!-- Tailwind CSS cho Giao diện -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js cho Biểu đồ -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- SheetJS (Excel Export) -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    
    <!-- html2pdf (PDF Export) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <!-- FontAwesome (Icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .tab-active { background-color: #e0e7ff; color: #4338ca; border-right: 4px solid #4338ca; font-weight: 600; }
        .tab-inactive { color: #4b5563; }
        .tab-inactive:hover { background-color: #f3f4f6; color: #111827; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Custom Scrollbar for inner tables */
        .table-scroll-container::-webkit-scrollbar { width: 8px; height: 8px; }
        .table-scroll-container::-webkit-scrollbar-track { background: #f8fafc; border-radius: 4px; }
        .table-scroll-container::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 4px; }
        .table-scroll-container::-webkit-scrollbar-thumb:hover { background: #64748b; }

        /* Toast Animation */
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .toast-enter { animation: slideIn 0.3s ease-out forwards; }

        /* PDF Report Print Styles */
        @media print {
            .page-break { page-break-before: always; }
            .avoid-break { page-break-inside: avoid; }
        }
        .report-content { font-family: 'Times New Roman', Times, serif; color: #000; line-height: 1.5; font-size: 14pt; }
        .report-content h2, .report-content h3 { font-family: Arial, sans-serif; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-gray-800">

    <!-- Sidebar Overlay (Mobile) -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-20 hidden md:hidden" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed md:static inset-y-0 left-0 transform -translate-x-full md:translate-x-0 w-64 bg-white shadow-xl flex flex-col z-30 flex-shrink-0 transition-transform duration-300 ease-in-out">
        <div class="p-6 border-b flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold text-indigo-700 leading-tight">NTU Bridge 2026</h1>
                <p class="text-xs text-gray-500 mt-1">Cost Management System</p>
            </div>
            <button class="md:hidden text-gray-500 hover:text-gray-700" onclick="toggleSidebar()">
                <i class="fa-solid fa-times text-xl"></i>
            </button>
        </div>
        
        <div class="p-4 border-b bg-gray-50 flex justify-between items-center">
            <div class="flex items-center space-x-2 truncate">
                <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-700 font-bold flex-shrink-0">
                    <i class="fa-solid fa-user-tie"></i>
                </div>
                <div class="truncate">
                    <p class="text-sm font-semibold truncate" id="currentUserRole" title="Tấn Đạt đẹp trai - 64CNXD2">Tấn Đạt đẹp trai - 64CNXD2</p>
                    <button onclick="toggleRole()" class="text-xs text-indigo-600 hover:underline">Đổi quyền</button>
                </div>
            </div>
        </div>

        <nav class="flex-1 overflow-y-auto py-4">
            <ul class="space-y-1">
                <li><a href="#" onclick="switchTab('dashboard')" id="nav-dashboard" class="nav-link block px-6 py-3 tab-active"><i class="fa-solid fa-chart-pie w-6"></i> Dashboard</a></li>
                <li><a href="#" onclick="switchTab('timeline')" id="nav-timeline" class="nav-link block px-6 py-3 tab-inactive"><i class="fa-solid fa-calendar-days w-6"></i> Lịch trình chuyến đi</a></li>
                <li><a href="#" onclick="switchTab('planning')" id="nav-planning" class="nav-link block px-6 py-3 tab-inactive"><i class="fa-solid fa-lightbulb w-6"></i> Lập phương án</a></li>
                <li><a href="#" onclick="switchTab('actual')" id="nav-actual" class="nav-link block px-6 py-3 tab-inactive"><i class="fa-solid fa-money-bill-wave w-6"></i> Chi phí thực tế</a></li>
                <li><a href="#" onclick="switchTab('invoices')" id="nav-invoices" class="nav-link block px-6 py-3 tab-inactive"><i class="fa-solid fa-file-invoice w-6"></i> Quản lý Hóa đơn</a></li>
                <li><a href="#" onclick="switchTab('export')" id="nav-export" class="nav-link block px-6 py-3 tab-inactive"><i class="fa-solid fa-file-export w-6"></i> Báo cáo & Xuất file</a></li>
                <li><a href="#" onclick="switchTab('settings')" id="nav-settings" class="nav-link block px-6 py-3 tab-inactive"><i class="fa-solid fa-database w-6"></i> Backup Dữ liệu</a></li>
            </ul>
        </nav>
    </aside>

    <!-- Mobile Header -->
    <div class="md:hidden fixed top-0 w-full bg-indigo-700 text-white p-4 flex justify-between items-center z-10 shadow-md">
        <h1 class="text-lg font-bold">NTU Bridge 2026</h1>
        <button onclick="toggleSidebar()" class="text-white focus:outline-none p-1">
            <i class="fa-solid fa-bars text-xl"></i>
        </button>
    </div>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden pt-14 md:pt-0 relative w-full">
        <div id="content-area" class="flex-1 overflow-y-auto p-4 md:p-8 w-full max-w-full">
            <!-- Content will be injected here via JS -->
        </div>
    </main>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-2 pointer-events-none max-w-[90vw]"></div>

    <!-- Modals -->
    <div id="modal-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden flex items-center justify-center backdrop-blur-sm p-4">
        <div id="modal-content" class="bg-white rounded-xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto transform transition-all">
            <!-- Modal content injected here -->
        </div>
    </div>

    <!-- Report Render Area (Hidden, used for PDF/Word generation) -->
    <div id="report-render-area" class="hidden bg-white text-black" style="width: 210mm; padding: 20mm; margin: 0 auto; box-sizing: border-box; background: white;">
        <!-- Container for PDF rendering -->
    </div>

    <!-- Hidden canvases to render report charts to image -->
    <canvas id="hiddenReportChart" width="800" height="400" style="display:none;"></canvas>
    <canvas id="hiddenReportPieChart" width="400" height="400" style="display:none;"></canvas>

    <script>
        // ==========================================
        // 1. STATE MANAGEMENT (IN-MEMORY)
        // ==========================================
        const CATEGORIES = [
            { id: 1, name: '✈️ Vé máy bay', icon: 'fa-plane' },
            { id: 2, name: '🏨 Khách sạn', icon: 'fa-hotel' },
            { id: 3, name: '🚇 Di chuyển nội địa', icon: 'fa-train-subway' },
            { id: 4, name: '🍽️ Ăn uống', icon: 'fa-utensils' },
            { id: 5, name: '🏗️ Lệ phí cuộc thi', icon: 'fa-ticket' },
            { id: 6, name: '📦 Chi phí khác', icon: 'fa-box' }
        ];

        let state = {
            role: 'admin', 
            trip: {
                origin: 'Nha Trang (CXR)',
                destination: 'NTU, Singapore (SIN)',
                members: 5,
                budget: 50000000, 
                exchangeRate: 18500 
            },
            plans: [
                { id: 1, catId: 1, desc: 'Vietjet Air (CXR-SIN) bay thẳng', unit: 3500000, qty: 5, total: 17500000, selected: false, currency: 'VND', originalUnit: 3500000 },
                { id: 2, catId: 1, desc: 'Scoot (SGN-SIN) + Xe giường nằm', unit: 2800000, qty: 5, total: 14000000, selected: true, currency: 'VND', originalUnit: 2800000 },
                { id: 3, catId: 2, desc: 'NTU Guest House', unit: 1200000, qty: 4, total: 4800000, selected: true, currency: 'VND', originalUnit: 1200000 },
                { id: 4, catId: 2, desc: 'Hostel Jurong West', unit: 800000, qty: 4, total: 3200000, selected: false, currency: 'VND', originalUnit: 800000 },
                { id: 5, catId: 4, desc: 'Ăn uống Canteen NTU', unit: 370000, qty: 20, total: 7400000, selected: true, currency: 'SGD', originalUnit: 20 },
                { id: 6, catId: 3, desc: 'Grab & MRT nội địa', unit: 370000, qty: 2, total: 740000, selected: true, currency: 'SGD', originalUnit: 20, routes: [{from: 'Sân bay Changi', to: 'Hostel Jurong West'}, {from: 'Hostel Jurong West', to: 'NTU Singapore'}] }
            ],
            actuals: [
                { id: 1, catId: 1, desc: 'Mua vé Scoot đợt 1', amount: 14200000, date: '2026-02-15', currency: 'VND', originalAmount: 14200000 },
                { id: 2, catId: 5, desc: 'Phí đăng ký BTC', amount: 2000000, date: '2026-02-10', currency: 'VND', originalAmount: 2000000 }
            ],
            timeline: [
                { id: 1, date: '2026-03-10', time: '08:00', title: 'Tập trung xuất phát', location: 'ĐH Nha Trang', notes: 'Kiểm tra giấy tờ, hộ chiếu thành viên', planId: null },
                { id: 2, date: '2026-03-10', time: '13:00', title: 'Bay đi Singapore', location: 'Sân bay Cam Ranh (CXR)', notes: 'Chuyến bay cất cánh, làm thủ tục trước 2 tiếng', planId: 2 },
                { id: 3, date: '2026-03-11', time: '08:30', title: 'Di chuyển bằng MRT & Grab', location: 'Sân bay Changi -> NTU', notes: 'Dùng thẻ EZ-Link', planId: 6 }
            ],
            invoices: [
                { id: 1, expenseId: 1, filename: 've_scoot_pdf.png', dataUrl: null, date: '2026-02-15' }
            ]
        };

        let currentTab = 'dashboard';
        let charts = {}; 

        // ==========================================
        // 2. CORE UTILITIES
        // ==========================================
        const formatMoney = (amount) => new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(amount);
        const formatSGD = (amount) => new Intl.NumberFormat('en-SG', { style: 'currency', currency: 'SGD' }).format(amount);
        
        const showToast = (message, type = 'success') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const color = type === 'success' ? 'bg-green-500' : (type === 'error' ? 'bg-red-500' : 'bg-blue-500');
            toast.className = `${color} text-white px-4 md:px-6 py-3 rounded-lg shadow-lg flex items-center space-x-3 toast-enter pointer-events-auto text-sm md:text-base`;
            toast.innerHTML = `<i class="fa-solid ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> <span>${message}</span>`;
            
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };

        // Hàm hiện bảng hỏi xác nhận riêng cho môi trường bị chặn Confirm()
        const showConfirm = (message, onConfirmCallback) => {
            const m = `
                <div class="p-4 md:p-6">
                    <h3 class="text-lg md:text-xl font-bold mb-4 text-gray-800 flex items-center">
                        <i class="fa-solid fa-triangle-exclamation text-red-500 mr-2"></i> Xác nhận thao tác
                    </h3>
                    <p class="text-sm md:text-base text-gray-600 mb-6">${message}</p>
                    <div class="flex justify-end space-x-3">
                        <button onclick="closeModal()" class="px-4 py-2 border rounded-md text-gray-600 hover:bg-gray-50 text-sm">Hủy</button>
                        <button id="btnConfirmAction" class="px-4 py-2 bg-red-600 text-white rounded-md hover:bg-red-700 font-medium text-sm">Đồng ý</button>
                    </div>
                </div>
            `;
            openModal(m);
            // Gán sự kiện thực thi sau khi render Modal
            setTimeout(() => {
                document.getElementById('btnConfirmAction').onclick = () => {
                    onConfirmCallback();
                    closeModal();
                };
            }, 50);
        };

        const toggleRole = () => {
            state.role = state.role === 'admin' ? 'member' : 'admin';
            document.getElementById('currentUserRole').innerText = state.role === 'admin' ? 'Tấn Đạt đẹp trai - 64CNXD2' : 'Member (View Only)';
            showToast(`Đã chuyển sang quyền: ${state.role.toUpperCase()}`, 'info');
            renderTab();
        };

        const checkAuth = () => {
            if (state.role !== 'admin') {
                showToast('Chỉ Admin mới có quyền thực hiện thao tác này!', 'error');
                return false;
            }
            return true;
        };

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        // ==========================================
        // 3. ROUTING & RENDERING
        // ==========================================
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.nav-link').forEach(el => {
                el.classList.remove('tab-active');
                el.classList.add('tab-inactive');
            });
            document.getElementById(`nav-${tab}`).classList.remove('tab-inactive');
            document.getElementById(`nav-${tab}`).classList.add('tab-active');
            
            if(window.innerWidth < 768) {
                toggleSidebar();
            }
            renderTab();
        }

        function renderTab() {
            const contentArea = document.getElementById('content-area');
            contentArea.innerHTML = ''; 
            Object.values(charts).forEach(chart => chart.destroy());
            charts = {};

            switch (currentTab) {
                case 'dashboard': renderDashboard(contentArea); break;
                case 'timeline': renderTimeline(contentArea); break;
                case 'planning': renderPlanning(contentArea); break;
                case 'actual': renderActual(contentArea); break;
                case 'invoices': renderInvoices(contentArea); break;
                case 'export': renderExport(contentArea); break;
                case 'settings': renderSettings(contentArea); break;
            }
        }

        // ==========================================
        // 4. MODULE: DASHBOARD
        // ==========================================
        function renderDashboard(container) {
            const estimatedTotal = state.plans.filter(p => p.selected).reduce((sum, p) => sum + p.total, 0);
            const actualTotal = state.actuals.reduce((sum, a) => sum + a.amount, 0);
            const remaining = state.trip.budget - actualTotal;
            const overBudget = actualTotal > state.trip.budget;

            let html = `
                <div class="flex flex-col md:flex-row md:justify-between md:items-center mb-6 gap-4">
                    <h2 class="text-2xl font-bold text-gray-800">Tổng quan chuyến đi</h2>
                    <button type="button" onclick="editTripInfo()" class="bg-white border shadow-sm px-4 py-2 rounded-lg text-sm font-medium hover:bg-gray-50 transition w-full md:w-auto ${state.role !== 'admin' ? 'hidden' : ''}">
                        <i class="fa-solid fa-pen mr-2"></i>Sửa thông tin
                    </button>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                    <div class="bg-indigo-600 text-white rounded-xl p-5 shadow-lg relative overflow-hidden">
                        <i class="fa-solid fa-wallet absolute right-[-20px] bottom-[-20px] text-8xl opacity-10"></i>
                        <p class="text-indigo-100 text-xs md:text-sm font-medium uppercase tracking-wider mb-1">Tổng Ngân sách</p>
                        <h3 class="text-xl md:text-2xl font-bold truncate" title="${formatMoney(state.trip.budget)}">${formatMoney(state.trip.budget)}</h3>
                        <p class="text-xs md:text-sm mt-2"><i class="fa-solid fa-users mr-1"></i> ${state.trip.members} thành viên</p>
                    </div>
                    
                    <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
                        <p class="text-gray-500 text-xs md:text-sm font-medium uppercase tracking-wider mb-1">Dự toán (Tối ưu)</p>
                        <h3 class="text-xl md:text-2xl font-bold text-blue-600 truncate" title="${formatMoney(estimatedTotal)}">${formatMoney(estimatedTotal)}</h3>
                        <p class="text-xs text-gray-400 mt-2">Dựa trên phương án đã chọn</p>
                    </div>

                    <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
                        <p class="text-gray-500 text-xs md:text-sm font-medium uppercase tracking-wider mb-1">Thực tế đã chi</p>
                        <h3 class="text-xl md:text-2xl font-bold ${actualTotal > estimatedTotal ? 'text-orange-500' : 'text-green-600'} truncate" title="${formatMoney(actualTotal)}">${formatMoney(actualTotal)}</h3>
                        <p class="text-xs text-gray-400 mt-2">${((actualTotal / (estimatedTotal || 1)) * 100).toFixed(1)}% so với dự toán</p>
                    </div>

                    <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
                        <p class="text-gray-500 text-xs md:text-sm font-medium uppercase tracking-wider mb-1">Còn lại</p>
                        <h3 class="text-xl md:text-2xl font-bold ${overBudget ? 'text-red-600' : 'text-gray-800'} truncate" title="${formatMoney(remaining)}">${formatMoney(remaining)}</h3>
                        <p class="text-xs ${overBudget ? 'text-red-500' : 'text-green-500'} mt-2 truncate">
                            ${overBudget ? '<i class="fa-solid fa-triangle-exclamation"></i> Vượt ngân sách!' : '<i class="fa-solid fa-check-circle"></i> Trong tầm kiểm soát'}
                        </p>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-100 w-full overflow-hidden">
                        <h3 class="text-lg font-semibold mb-4 text-gray-700">Phân bổ Dự toán</h3>
                        <div class="relative h-64 w-full flex justify-center">
                            <canvas id="pieChart"></canvas>
                        </div>
                    </div>
                    <div class="bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-100 w-full overflow-hidden">
                        <h3 class="text-lg font-semibold mb-4 text-gray-700">Dự toán vs Thực tế</h3>
                        <div class="relative h-64 w-full">
                            <canvas id="barChart"></canvas>
                        </div>
                    </div>
                </div>
            `;
            container.innerHTML = html;
            renderCharts();
        }

        function renderCharts() {
            const labels = CATEGORIES.map(c => c.name.substring(3)); 
            const estData = CATEGORIES.map(c => state.plans.filter(p => p.catId === c.id && p.selected).reduce((sum, p) => sum + p.total, 0));
            const actData = CATEGORIES.map(c => state.actuals.filter(a => a.catId === c.id).reduce((sum, a) => sum + a.amount, 0));

            const ctxPie = document.getElementById('pieChart').getContext('2d');
            charts.pie = new Chart(ctxPie, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{ data: estData, backgroundColor: ['#4f46e5', '#0ea5e9', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'], borderWidth: 0 }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    plugins: { 
                        legend: { 
                            position: window.innerWidth < 768 ? 'bottom' : 'right',
                            labels: { boxWidth: 12 }
                        } 
                    } 
                }
            });

            const ctxBar = document.getElementById('barChart').getContext('2d');
            charts.bar = new Chart(ctxBar, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Dự toán', data: estData, backgroundColor: '#cbd5e1', borderRadius: 4 },
                        { label: 'Thực tế', data: actData, backgroundColor: '#4f46e5', borderRadius: 4 }
                    ]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    scales: { 
                        y: { beginAtZero: true, ticks: { callback: (val) => val / 1000000 + 'M' } },
                        x: { ticks: { maxRotation: 45, minRotation: 45 } }
                    } 
                }
            });
        }

        function editTripInfo() {
            if(!checkAuth()) return;
            const m = `
                <div class="p-4 md:p-6">
                    <h3 class="text-xl font-bold mb-4">Cập nhật chuyến đi</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Ngân sách tổng (VNĐ)</label>
                            <input type="number" id="inpBudget" value="${state.trip.budget}" class="block w-full rounded-md border-gray-300 shadow-sm p-2 md:p-3 border focus:border-indigo-500 focus:ring-indigo-500 text-sm md:text-base">
                        </div>
                        <div class="flex flex-col sm:flex-row gap-4">
                            <div class="w-full sm:w-1/2">
                                <label class="block text-sm font-medium text-gray-700 mb-1">Số thành viên</label>
                                <input type="number" id="inpMembers" value="${state.trip.members}" class="block w-full rounded-md border-gray-300 shadow-sm p-2 md:p-3 border focus:border-indigo-500 focus:ring-indigo-500 text-sm md:text-base">
                            </div>
                            <div class="w-full sm:w-1/2">
                                <label class="block text-sm font-medium text-gray-700 mb-1">Tỷ giá (1 SGD = ? VNĐ)</label>
                                <input type="number" id="inpExchangeRate" value="${state.trip.exchangeRate || 18500}" class="block w-full rounded-md border-gray-300 shadow-sm p-2 md:p-3 border focus:border-indigo-500 focus:ring-indigo-500 text-sm md:text-base">
                            </div>
                        </div>
                    </div>
                    <div class="mt-6 flex justify-end space-x-3">
                        <button type="button" onclick="closeModal()" class="px-4 py-2 border rounded-md text-gray-600 hover:bg-gray-50 text-sm md:text-base">Hủy</button>
                        <button type="button" onclick="saveTripInfo()" class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 text-sm md:text-base">Lưu</button>
                    </div>
                </div>
            `;
            openModal(m);
        }

        function saveTripInfo() {
            state.trip.budget = parseFloat(document.getElementById('inpBudget').value) || 0;
            state.trip.members = parseInt(document.getElementById('inpMembers').value) || 1;
            state.trip.exchangeRate = parseFloat(document.getElementById('inpExchangeRate').value) || 18500;
            closeModal();
            showToast('Đã cập nhật thông tin chuyến đi');
            renderTab();
        }

        // ==========================================
        // 4.5 MODULE: TIMELINE (LỊCH TRÌNH)
        // ==========================================
        function renderTimeline(container) {
            let html = `
                <div class="flex flex-col sm:flex-row sm:justify-between items-start sm:items-center mb-6 gap-4">
                    <div>
                        <h2 class="text-xl md:text-2xl font-bold text-gray-800">Lịch trình chuyến đi</h2>
                        <p class="text-xs md:text-sm text-gray-500">Chi tiết hoạt động, thời gian và địa điểm tại Singapore.</p>
                    </div>
                    <button type="button" onclick="openTimelineModal()" class="w-full sm:w-auto bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-indigo-700 transition shadow-sm ${state.role !== 'admin' ? 'hidden' : ''}">
                        <i class="fa-solid fa-plus mr-2"></i>Thêm hoạt động
                    </button>
                </div>
            `;

            if(!state.timeline || state.timeline.length === 0) {
                html += `<div class="text-center py-10 bg-white rounded-xl border border-dashed border-gray-300 text-gray-500 text-sm md:text-base mx-4">Chưa có lịch trình nào. Hãy thêm hoạt động mới.</div>`;
                container.innerHTML = html;
                return;
            }

            // Sắp xếp theo ngày và giờ
            const sortedEvents = [...state.timeline].sort((a,b) => new Date(a.date + 'T' + (a.time||'00:00')) - new Date(b.date + 'T' + (b.time||'00:00')));
            
            // Nhóm theo ngày
            const groupedEvents = {};
            sortedEvents.forEach(ev => {
                if(!groupedEvents[ev.date]) groupedEvents[ev.date] = [];
                groupedEvents[ev.date].push(ev);
            });

            html += `<div class="max-w-4xl mx-auto px-2 md:px-0 py-4"><div class="relative border-l-2 border-indigo-200 ml-3 md:ml-4">`;

            for (const [date, events] of Object.entries(groupedEvents)) {
                html += `
                    <div class="mb-8 md:mb-10 ml-6 md:ml-8">
                        <span class="absolute flex items-center justify-center w-8 h-8 bg-indigo-100 rounded-full -left-[17px] ring-4 ring-white text-indigo-600">
                            <i class="fa-solid fa-calendar-day text-sm"></i>
                        </span>
                        <h3 class="font-bold text-lg text-indigo-900 mb-4 bg-white inline-block pr-4 py-1">${formatDate(date)}</h3>
                        <div class="space-y-4">
                `;

                events.forEach(ev => {
                    let planBtnHtml = '';
                    if (ev.planId) {
                        const linkedPlan = state.plans.find(p => p.id == ev.planId);
                        if (linkedPlan) {
                            planBtnHtml = `
                                <div class="mt-3">
                                    <button type="button" onclick="viewPlanDetails(${ev.planId})" class="text-[11px] md:text-xs bg-blue-50 text-blue-700 border border-blue-100 px-3 py-1.5 rounded-lg shadow-sm hover:bg-blue-100 transition inline-flex items-center font-medium">
                                        <i class="fa-solid fa-map-location-dot mr-1.5"></i> Xem chi tiết phương án & Bản đồ
                                    </button>
                                </div>
                            `;
                        }
                    }

                    html += `
                        <div class="bg-white p-4 md:p-5 rounded-xl border border-gray-100 shadow-sm relative group hover:shadow-md transition">
                            <span class="absolute flex items-center justify-center w-3 h-3 bg-indigo-500 rounded-full -left-[2.1rem] md:-left-[2.35rem] top-6 ring-4 ring-white"></span>
                            <div class="flex justify-between items-start gap-4">
                                <div class="flex-1">
                                    <div class="text-sm font-bold text-indigo-600 mb-1 flex items-center">
                                        <i class="fa-regular fa-clock mr-1.5"></i> ${ev.time || 'Cả ngày'}
                                    </div>
                                    <h4 class="text-base md:text-lg font-bold text-gray-800 break-words">${ev.title}</h4>
                                    ${ev.location ? `<p class="text-xs md:text-sm text-gray-500 mt-1.5 font-medium"><i class="fa-solid fa-location-dot text-red-400 mr-1.5 w-4 text-center"></i> ${ev.location}</p>` : ''}
                                    ${ev.notes ? `<p class="text-xs md:text-sm text-gray-600 mt-2.5 bg-gray-50 p-2.5 rounded-lg border border-gray-100">${ev.notes}</p>` : ''}
                                    ${planBtnHtml}
                                </div>
                                <div class="flex flex-col sm:flex-row space-y-2 sm:space-y-0 sm:space-x-2 opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-opacity ${state.role !== 'admin' ? 'hidden' : ''}">
                                    <button type="button" onclick="openTimelineModal(${ev.id})" class="text-indigo-500 hover:text-indigo-700 bg-indigo-50 p-2 rounded transition" title="Sửa">
                                        <i class="fa-solid fa-pen pointer-events-none"></i>
                                    </button>
                                    <button type="button" onclick="deleteTimelineEvent(${ev.id})" class="text-red-500 hover:text-red-700 bg-red-50 p-2 rounded transition" title="Xóa">
                                        <i class="fa-solid fa-trash pointer-events-none"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                });

                html += `</div></div>`;
            }

            html += `</div></div>`;
            container.innerHTML = html;
        }

        function openTimelineModal(id = null) {
            if(!checkAuth()) return;
            
            let ev = { date: new Date().toISOString().split('T')[0], time: '08:00', title: '', location: '', notes: '', planId: '' };
            let isEdit = false;
            
            if (id) {
                const found = state.timeline.find(t => t.id == id);
                if (found) { ev = found; isEdit = true; }
            }

            // Tạo danh sách chọn phương án để gắn vào Lịch trình
            let planOptions = `<option value="">-- Không gắn --</option>`;
            state.plans.forEach(p => {
                let catName = CATEGORIES.find(c => c.id == p.catId)?.name || '';
                planOptions += `<option value="${p.id}" ${ev.planId == p.id ? 'selected' : ''}>${catName.substring(3)} - ${p.desc}</option>`;
            });

            const m = `
                <div class="p-4 md:p-6">
                    <h3 class="text-xl font-bold mb-4">${isEdit ? 'Sửa hoạt động' : 'Thêm hoạt động lịch trình'}</h3>
                    <div class="space-y-4">
                        <div class="flex flex-col sm:flex-row gap-4">
                            <div class="w-full sm:w-1/2">
                                <label class="block text-sm font-medium text-gray-700 mb-1">Ngày</label>
                                <input type="date" id="inpTlDate" value="${ev.date}" class="block w-full rounded-md border-gray-300 shadow-sm p-2 md:p-3 border focus:border-indigo-500 text-sm">
                            </div>
                            <div class="w-full sm:w-1/2">
                                <label class="block text-sm font-medium text-gray-700 mb-1">Giờ</label>
                                <input type="time" id="inpTlTime" value="${ev.time}" class="block w-full rounded-md border-gray-300 shadow-sm p-2 md:p-3 border focus:border-indigo-500 text-sm">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Tên hoạt động (*)</label>
                            <input type="text" id="inpTlTitle" value="${ev.title}" placeholder="VD: Khai mạc cuộc thi" class="block w-full rounded-md border-gray-300 shadow-sm p-2 md:p-3 border focus:border-indigo-500 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Địa điểm</label>
                            <input type="text" id="inpTlLoc" value="${ev.location}" placeholder="VD: NTU Campus" class="block w-full rounded-md border-gray-300 shadow-sm p-2 md:p-3 border focus:border-indigo-500 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Gắn với phương án chi phí (Tùy chọn)</label>
                            <select id="inpTlPlanId" class="block w-full rounded-md border-gray-300 shadow-sm p-2 md:p-3 border focus:border-indigo-500 text-sm text-indigo-700 font-medium">
                                ${planOptions}
                            </select>
                            <p class="text-[10px] md:text-xs text-gray-500 mt-1">Khi gắn, trên lịch trình sẽ có nút xem nhanh bản đồ và chi phí của phương án đó.</p>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Ghi chú thêm</label>
                            <textarea id="inpTlNotes" rows="2" class="block w-full rounded-md border-gray-300 shadow-sm p-2 md:p-3 border focus:border-indigo-500 text-sm">${ev.notes}</textarea>
                        </div>
                    </div>
                    <div class="mt-6 flex justify-end space-x-3">
                        <button type="button" onclick="closeModal()" class="px-4 py-2 border rounded-md text-gray-600 hover:bg-gray-50 text-sm">Hủy</button>
                        <button type="button" onclick="saveTimelineEvent(${id ? id : 'null'})" class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 text-sm">Lưu hoạt động</button>
                    </div>
                </div>
            `;
            openModal(m);
        }

        function saveTimelineEvent(id) {
            const date = document.getElementById('inpTlDate').value;
            const time = document.getElementById('inpTlTime').value;
            const title = document.getElementById('inpTlTitle').value.trim();
            const location = document.getElementById('inpTlLoc').value.trim();
            const notes = document.getElementById('inpTlNotes').value.trim();
            const planIdVal = document.getElementById('inpTlPlanId').value;
            const planId = planIdVal ? parseInt(planIdVal) : null;

            if(!title || !date) { showToast("Vui lòng nhập Ngày và Tên hoạt động!", "error"); return; }

            if (!state.timeline) state.timeline = [];

            if (id) { // Edit
                const ev = state.timeline.find(t => t.id == id);
                if(ev) {
                    ev.date = date; ev.time = time; ev.title = title;
                    ev.location = location; ev.notes = notes; ev.planId = planId;
                }
                showToast("Đã cập nhật lịch trình");
            } else { // Add
                state.timeline.push({ id: Date.now(), date, time, title, location, notes, planId });
                showToast("Đã thêm vào lịch trình");
            }
            
            closeModal();
            renderTab();
        }

        function deleteTimelineEvent(id) {
            if(!checkAuth()) return;
            showConfirm('Bạn có chắc chắn muốn xóa hoạt động này khỏi lịch trình?', () => {
                state.timeline = state.timeline.filter(t => t.id != id);
                showToast('Đã xóa hoạt động', 'success');
                renderTab();
            });
        }

        // ==========================================
        // 5. MODULE: COST PLANNING
        // ==========================================
        function renderPlanning(container) {
            let html = `
                <div class="flex flex-col md:flex-row md:justify-between items-start md:items-center mb-6 gap-4">
                    <div>
                        <h2 class="text-xl md:text-2xl font-bold text-gray-800">Lập phương án chi phí</h2>
                        <p class="text-xs md:text-sm text-gray-500">Tạo nhiều phương án và so sánh để tìm mức giá tốt nhất.</p>
                    </div>
                    <div class="flex space-x-2 w-full md:w-auto">
                        <button type="button" onclick="optimizePlans()" class="flex-1 md:flex-none bg-green-600 text-white px-3 md:px-4 py-2 rounded-lg text-sm font-medium hover:bg-green-700 transition shadow-sm ${state.role !== 'admin' ? 'hidden' : ''}">
                            <i class="fa-solid fa-wand-magic-sparkles mr-1 md:mr-2"></i><span class="hidden sm:inline">Tự động chọn tối ưu</span><span class="sm:hidden">Tối ưu</span>
                        </button>
                        <button type="button" onclick="openAddPlanModal()" class="flex-1 md:flex-none bg-indigo-600 text-white px-3 md:px-4 py-2 rounded-lg text-sm font-medium hover:bg-indigo-700 transition shadow-sm ${state.role !== 'admin' ? 'hidden' : ''}">
                            <i class="fa-solid fa-plus mr-1 md:mr-2"></i>Thêm <span class="hidden sm:inline">phương án</span>
                        </button>
                    </div>
                </div>
                <div class="space-y-6">
            `;

            CATEGORIES.forEach(cat => {
                const catPlans = state.plans.filter(p => p.catId === cat.id);
                if (catPlans.length === 0) return;

                html += `
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden w-full">
                    <div class="bg-gray-50 px-4 md:px-5 py-3 border-b border-gray-200 flex justify-between items-center">
                        <h3 class="font-bold text-gray-700 text-sm md:text-base"><i class="fa-solid ${cat.icon} text-indigo-500 mr-2"></i>${cat.name}</h3>
                    </div>
                    <div class="table-scroll-container overflow-x-auto max-h-[400px] w-full">
                        <table class="w-full text-left border-collapse min-w-[600px] md:min-w-full">
                            <thead class="sticky top-0 bg-white z-10 shadow-sm">
                                <tr class="text-xs text-gray-500 uppercase tracking-wider border-b">
                                    <th class="p-3 md:p-4 w-10 md:w-12 text-center">Chọn</th>
                                    <th class="p-3 md:p-4 min-w-[150px]">Mô tả chi tiết</th>
                                    <th class="p-3 md:p-4 text-right">Đơn giá</th>
                                    <th class="p-3 md:p-4 text-center w-16 md:w-20">SL</th>
                                    <th class="p-3 md:p-4 text-right min-w-[120px]">Tổng cộng</th>
                                    <th class="p-3 md:p-4 w-20 md:w-24 text-center">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-100 text-xs md:text-sm">
                `;

                catPlans.forEach(plan => {
                    html += `
                                <tr class="${plan.selected ? 'bg-indigo-50/50' : 'hover:bg-gray-50'} transition">
                                    <td class="p-3 md:p-4 text-center">
                                        <input type="checkbox" ${plan.selected ? 'checked' : ''} 
                                               onchange="togglePlanSelection(${plan.id})" 
                                               class="w-4 h-4 text-indigo-600 focus:ring-indigo-500 cursor-pointer rounded"
                                               ${state.role !== 'admin' ? 'disabled' : ''}>
                                    </td>
                                    <td class="p-3 md:p-4 font-medium text-gray-800 break-words">${plan.desc}</td>
                                    <td class="p-3 md:p-4 text-right">
                                        ${plan.currency === 'SGD' ? `<div class="font-bold text-gray-800 whitespace-nowrap">${formatSGD(plan.originalUnit)}</div><div class="text-[10px] md:text-xs text-gray-400 font-medium whitespace-nowrap">~ ${formatMoney(plan.unit)}</div>` : `<div class="font-bold text-gray-800 whitespace-nowrap">${formatMoney(plan.unit)}</div>`}
                                    </td>

                html += `

                        </table>
                    </div>

                `;
            });

            if(state.plans.length === 0) {
                html += `<div class="text-center py-10 bg-white rounded-xl border border-dashed border-gray-300 text-gray-500 text-sm md:text-base mx-4">Chưa có phương án nào. Hãy thêm phương án mới.</div>`;

            html += `</div>`;
            container.innerHTML = html;
        }

        // Đã sửa lại hàm chọn phương án để hỗ trợ Checkbox (Chọn/Bỏ chọn độc lập)
        function togglePlanSelection(planId) {
            if(!checkAuth()) return;
            const targetPlan = state.plans.find(p => p.id == planId);
            if (targetPlan) {
                targetPlan.selected = !targetPlan.selected; // Đảo trạng thái hiện tại
                renderTab();
            }
        }

        // Đã sửa hàm thuật toán: Giờ nó sẽ chỉ tự động chọn 1 phương án rẻ nhất cho mỗi hạng mục để làm gốc, bạn vẫn có thể chọn thêm thủ công
        function optimizePlans() {
            if(!checkAuth()) return;
            let changed = false;
            CATEGORIES.forEach(cat => {
                const plans = state.plans.filter(p => p.catId === cat.id);
                if (plans.length > 0) {
                    plans.forEach(p => p.selected = false);
                    const optimal = plans.reduce((prev, curr) => prev.total < curr.total ? prev : curr);
                    optimal.selected = true;
                    changed = true;
                }
            });
            if(changed) {
                showToast('Đã tự động chọn các phương án có chi phí thấp nhất làm cấu hình gốc!', 'success');
                renderTab();
            }
        }

        function deletePlan(id) {
            if(!checkAuth()) return;
            showConfirm('Bạn có chắc chắn muốn xóa phương án này?', () => {
                state.plans = state.plans.filter(p => p.id != id);
                showToast('Đã xóa phương án thành công!', 'success');
                renderTab();
            });
        }

            let searchQuery = plan.desc;
            if(cat.id === 2 || cat.id === 3 || cat.id === 4) { searchQuery += " Singapore"; }

            const embedUrl = `https://maps.google.com/maps?q=${query}&t=&z=14&ie=UTF8&iwloc=&output=embed`;

                            </a>
                        </div>
                    `;
                });
                routeHtml += `</div>`;
            }

            const m = `
                <div class="p-0 flex flex-col max-h-[85vh]">
                    <div class="p-3 md:p-4 border-b bg-gray-50 flex justify-between items-center rounded-t-xl sticky top-0 z-10">
                        <h3 class="text-base md:text-lg font-bold text-indigo-700 flex items-center truncate pr-2">
                            <i class="fa-solid ${cat.icon} mr-2"></i> <span class="truncate">Chi tiết</span>
                        </h3>
                        <div class="flex space-x-1 md:space-x-2 items-center flex-shrink-0">
                            <button type="button" onclick="openEditPlanModal(${plan.id})" class="text-indigo-600 hover:text-indigo-800 px-2 py-1 md:px-3 md:py-1.5 rounded bg-indigo-100 hover:bg-indigo-200 transition text-xs md:text-sm font-bold ${state.role !== 'admin' ? 'hidden' : ''}">
                                <i class="fa-solid fa-pen md:mr-1"></i> <span class="hidden md:inline">Sửa</span>
                            </button>
                            <button type="button" onclick="closeModal()" class="text-gray-400 hover:text-gray-600 px-2 ml-1 md:ml-2 border-l border-gray-300">
                                <i class="fa-solid fa-xmark text-lg md:text-xl"></i>
                            </button>
                        </div>
                    </div>
                    <div class="p-4 md:p-6 overflow-y-auto">
                        <h4 class="text-lg md:text-xl font-bold text-gray-800 mb-4 break-words">${plan.desc}</h4>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 md:gap-4 mb-4 md:mb-6 text-xs md:text-sm">
                            <div class="bg-indigo-50 p-3 md:p-4 rounded-xl border border-indigo-100 flex justify-between sm:block items-center">
                                <p class="text-gray-500 mb-0 sm:mb-1">Đơn giá</p>
                                <p class="font-bold text-gray-800 text-sm md:text-lg">
                                    ${plan.currency === 'SGD' ? `${formatSGD(plan.originalUnit)} <span class="text-[10px] md:text-xs font-normal text-gray-500">(~ ${formatMoney(plan.unit)})</span>` : formatMoney(plan.unit)}

                            </div>
                            <div class="bg-indigo-50 p-3 md:p-4 rounded-xl border border-indigo-100 flex justify-between sm:block items-center">
                                <p class="text-gray-500 mb-0 sm:mb-1">Số lượng / Thời gian</p>

            const plan = state.plans.find(p => p.id == id);

            const desc = document.getElementById('inpDesc').value;

            const unit = currency === 'SGD' ? originalUnit * rate : originalUnit;

            let routes = [];
            if (plan.catId === 3) {
                for(let i=1; i<=qty; i++) {
                    const from = document.getElementById(`routeFrom_${i}`)?.value || '';
                    const to = document.getElementById(`routeTo_${i}`)?.value || '';
                    const price = parseFloat(document.getElementById(`routePrice_${i}`)?.value) || 0;
                    if (from || to) routes.push({ from, to, price });
                }

            plan.desc = desc; plan.currency = currency; plan.originalUnit = originalUnit;

        function saveNewActual() {
            const date = document.getElementById('inpActDate').value;
            const catId = parseInt(document.getElementById('inpActCatId').value);
            const desc = document.getElementById('inpActDesc').value;
            const currency = document.getElementById('inpActCurrency').value;
            const originalAmount = parseFloat(document.getElementById('inpActAmount').value) || 0;
            
            if(!desc || originalAmount <= 0) { showToast("Dữ liệu không hợp lệ!", "error"); return; }

            const rate = state.trip.exchangeRate || 18500;
            const amount = currency === 'SGD' ? originalAmount * rate : originalAmount;

            state.actuals.push({ id: Date.now(), catId, desc, amount, date, currency, originalAmount });
            closeModal(); showToast('Đã lưu khoản chi!'); renderTab();
        }

        function deleteActual(id) {
            if(!checkAuth()) return;
            showConfirm('Bạn có chắc chắn muốn xóa khoản chi này? Hóa đơn đính kèm cũng sẽ bị xóa.', () => {
                state.actuals = state.actuals.filter(a => a.id != id);
                state.invoices = state.invoices.filter(i => i.expenseId != id);
                showToast('Đã xóa', 'success'); renderTab();
            });
        }

        function saveInvoice() {
            const expId = parseInt(document.getElementById('inpInvExpId').value);
            const fileInput = document.getElementById('inpInvFile');
            if(fileInput.files.length === 0) { showToast("Vui lòng chọn 1 file ảnh!", "error"); return; }

            const reader = new FileReader();
            reader.onload = function(e) {
                state.invoices.push({
                    id: Date.now(), expenseId: expId, filename: fileInput.files[0].name,
                    dataUrl: e.target.result, date: new Date().toISOString().split('T')[0]
                });
                closeModal(); showToast('Đã upload thành công'); renderTab();
            };
            reader.readAsDataURL(fileInput.files[0]);
        }

            if(!checkAuth()) return;
            showConfirm('Xóa minh chứng hóa đơn này?', () => {
                state.invoices = state.invoices.filter(i => i.id != id);
                showToast('Đã xóa hóa đơn', 'success'); renderTab();
            });
        }

        // Variables to hold the hidden chart instances
        let hiddenReportChartInstance = null;
        let hiddenReportPieChartInstance = null;

        // Tạo ảnh 2 biểu đồ (Cột và Tròn) cho báo cáo
        function generateChartImagesForReport(callback) {
            const canvasBar = document.getElementById('hiddenReportChart');
            const ctxBar = canvasBar.getContext('2d');
            ctxBar.fillStyle = 'white';
            ctxBar.fillRect(0, 0, canvasBar.width, canvasBar.height);

            const canvasPie = document.getElementById('hiddenReportPieChart');
            const ctxPie = canvasPie.getContext('2d');
            ctxPie.fillStyle = 'white';
            ctxPie.fillRect(0, 0, canvasPie.width, canvasPie.height);

            const labels = CATEGORIES.map(c => c.name.substring(3)); 
            const estData = CATEGORIES.map(c => state.plans.filter(p => p.catId === c.id && p.selected).reduce((sum, p) => sum + p.total, 0));
            const actData = CATEGORIES.map(c => state.actuals.filter(a => a.catId === c.id).reduce((sum, a) => sum + a.amount, 0));

            const totalEst = estData.reduce((a, b) => a + b, 0);
            const totalAct = actData.reduce((a, b) => a + b, 0);

            if (hiddenReportChartInstance) hiddenReportChartInstance.destroy();
            hiddenReportChartInstance = new Chart(ctxBar, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Dự toán', data: estData, backgroundColor: '#cbd5e1' },
                        { label: 'Thực tế', data: actData, backgroundColor: '#4f46e5' }
                    ]
                },
                options: { 
                    responsive: false, animation: false,
                    plugins: { title: { display: true, text: 'BIỂU ĐỒ SO SÁNH DỰ TOÁN - THỰC TẾ THEO HẠNG MỤC', font: {size: 16} } }
                }
            });

            if (hiddenReportPieChartInstance) hiddenReportPieChartInstance.destroy();
            hiddenReportPieChartInstance = new Chart(ctxPie, {
                type: 'doughnut',
                data: {
                    labels: ['Tổng Dự toán', 'Tổng Thực tế'],
                    datasets: [{
                        data: [totalEst, totalAct],
                        backgroundColor: ['#cbd5e1', '#4f46e5'],
                        borderWidth: 1
                    }]
                },
                options: { 
                    responsive: false, animation: false,
                    plugins: { title: { display: true, text: 'TỶ LỆ TỔNG DỰ TOÁN & THỰC TẾ', font: {size: 16} } }
                }
            });

            // Đợi Chart render xong thì trích xuất hình ảnh
            setTimeout(() => {
                const barImgData = canvasBar.toDataURL('image/png');
                const pieImgData = canvasPie.toDataURL('image/png');
                callback(barImgData, pieImgData);
            }, 500);
        }

        function buildReportHTML(barChartImg, pieChartImg) {
            const estimatedTotal = state.plans.filter(p => p.selected).reduce((sum, p) => sum + p.total, 0);
            const actualTotal = state.actuals.reduce((sum, a) => sum + a.amount, 0);
            
            let rating = "";
            let percentStr = "";
            if (estimatedTotal > 0) {
                const percent = (actualTotal / estimatedTotal) * 100;
                percentStr = percent.toFixed(2) + "%";
                if (percent <= 95) rating = "Tuyệt vời (Tiết kiệm chi phí đáng kể so với dự toán).";
                else if (percent <= 100) rating = "Tốt (Sử dụng ngân sách đúng kế hoạch).";
                else if (percent <= 110) rating = "Khá (Vượt ngân sách nhẹ, cần kiểm soát thêm).";
                else rating = "Cần chú ý (Vượt ngân sách nhiều so với phương án đã chọn).";
            }

            let tableRows = '';
            CATEGORIES.forEach(cat => {
                const catEst = state.plans.filter(p => p.catId === cat.id && p.selected).reduce((sum, p) => sum + p.total, 0);
                const catAct = state.actuals.filter(a => a.catId === cat.id).reduce((sum, a) => sum + a.amount, 0);
                const diff = catEst - catAct;

                tableRows += `
                    <tr class="avoid-break">
                        <td style="border: 1px solid #999; padding: 8px;">${cat.name}</td>
                        <td style="border: 1px solid #999; padding: 8px; text-align: right;">${catEst.toLocaleString()}</td>
                        <td style="border: 1px solid #999; padding: 8px; text-align: right;">${catAct.toLocaleString()}</td>
                        <td style="border: 1px solid #999; padding: 8px; text-align: right; color: ${diff < 0 ? '#cc0000' : '#006600'}; font-weight: bold;">${diff.toLocaleString()}</td>
                    </tr>
                `;
            });

            // HTML Timeline
            let timelineHtml = '';
            if (state.timeline && state.timeline.length > 0) {
                timelineHtml = `
                    <div class="avoid-break" style="margin-top: 40px;">
                        <h3 style="border-bottom: 2px solid #ccc; padding-bottom: 5px;">2. Lịch trình công tác / thi đấu</h3>
                        <table style="width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 11pt;">
                            <thead>
                                <tr style="background-color: #f0f0f0;">
                                    <th style="border: 1px solid #999; padding: 8px; width: 15%; text-align: center;">Thời gian</th>
                                    <th style="border: 1px solid #999; padding: 8px; width: 35%; text-align: left;">Hoạt động</th>
                                    <th style="border: 1px solid #999; padding: 8px; width: 25%; text-align: left;">Địa điểm</th>
                                    <th style="border: 1px solid #999; padding: 8px; width: 25%; text-align: left;">Ghi chú</th>
                                </tr>
                            </thead>
                            <tbody>
                `;
                
                const sortedTimeline = [...state.timeline].sort((a,b) => new Date(a.date + 'T' + (a.time||'00:00')) - new Date(b.date + 'T' + (b.time||'00:00')));
                let currentDate = '';

                sortedTimeline.forEach(t => {
                    const formattedDate = formatDate(t.date);
                    const isNewDate = formattedDate !== currentDate;
                    if (isNewDate) currentDate = formattedDate;

                    timelineHtml += `
                        <tr class="avoid-break">
                            <td style="border: 1px solid #999; padding: 8px; text-align: center;">
                                ${isNewDate ? `<strong>${formattedDate}</strong><br>` : ''}
                                <span style="color: #4338ca;">${t.time || ''}</span>
                            </td>
                            <td style="border: 1px solid #999; padding: 8px; font-weight: bold; color: #333;">${t.title}</td>
                            <td style="border: 1px solid #999; padding: 8px;">${t.location || ''}</td>
                            <td style="border: 1px solid #999; padding: 8px; font-style: italic; color: #666;">${t.notes || ''}</td>
                        </tr>
                    `;
                });
                timelineHtml += `</tbody></table></div>`;
            }

            let invoiceHtml = '';
            if (state.invoices.length > 0) {
                invoiceHtml = `<h3 style="margin-top: 40px; border-bottom: 2px solid #ccc; padding-bottom: 5px;">4. Phụ lục Hóa đơn / Chứng từ</h3>`;
                state.invoices.forEach((inv, index) => {
                    const expense = state.actuals.find(a => a.id === inv.expenseId);
                    const expDesc = expense ? expense.desc : 'Không xác định';
                    const expAmount = expense ? formatMoney(expense.amount) : '';
                    const date = formatDate(inv.date);
                    const breakClass = (index > 0 && index % 2 === 0) ? 'page-break' : '';

                    invoiceHtml += `
                        <div class="avoid-break ${breakClass}" style="margin-bottom: 30px; padding: 10px; border: 1px dashed #ccc;">
                            <p style="font-weight: bold; margin: 0 0 5px 0;">Chứng từ #${index + 1}: ${expDesc}</p>
                            <p style="margin: 0 0 10px 0; font-size: 12pt; color: #555;">Ngày chi: ${date} - Số tiền: ${expAmount}</p>
                            <div style="text-align: center;">
                                <img src="${inv.dataUrl}" style="max-width: 100%; max-height: 400px; border: 1px solid #eee;" alt="Hóa đơn">
                            </div>
                        </div>
                    `;
                });
            }

            return `
                <div class="report-content">
                    <div style="text-align: center; margin-bottom: 30px;">
                        <h2 style="text-transform: uppercase; font-size: 20pt; margin: 0;">BÁO CÁO TÀI CHÍNH CHUYẾN ĐI</h2>
                        <h3 style="color: #4338ca; margin: 5px 0 0 0;">NTU BRIDGE DESIGN 2026</h3>
                    </div>
                    
                    <div style="margin-bottom: 20px;">
                        <p><strong>Hành trình:</strong> ${state.trip.origin} - ${state.trip.destination}</p>
                        <p><strong>Số thành viên:</strong> ${state.trip.members} người</p>
                        <p><strong>Ngân sách cấp (Budget):</strong> ${state.trip.budget.toLocaleString()} VNĐ</p>
                    </div>
                    
                    <h3 style="margin-top: 30px; border-bottom: 2px solid #ccc; padding-bottom: 5px;">1. Tổng hợp ngân sách</h3>
                    <table style="width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 12pt;">
                        <thead>
                            <tr style="background-color: #f0f0f0;">
                                <th style="border: 1px solid #999; padding: 8px;">Hạng mục</th>
                                <th style="border: 1px solid #999; padding: 8px; text-align: right;">Dự toán (VNĐ)</th>
                                <th style="border: 1px solid #999; padding: 8px; text-align: right;">Thực tế (VNĐ)</th>
                                <th style="border: 1px solid #999; padding: 8px; text-align: right;">Chênh lệch (VNĐ)</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${tableRows}
                        </tbody>
                        <tfoot>
                            <tr class="avoid-break" style="font-weight: bold; background-color: #e6e6e6;">
                                <td style="border: 1px solid #999; padding: 8px;">TỔNG CỘNG</td>
                                <td style="border: 1px solid #999; padding: 8px; text-align: right;">${estimatedTotal.toLocaleString()}</td>
                                <td style="border: 1px solid #999; padding: 8px; text-align: right;">${actualTotal.toLocaleString()}</td>
                                <td style="border: 1px solid #999; padding: 8px; text-align: right; color: ${(estimatedTotal - actualTotal) < 0 ? '#cc0000' : '#006600'};">${(estimatedTotal - actualTotal).toLocaleString()}</td>
                            </tr>
                        </tfoot>
                    </table>
                    <p style="font-size: 11pt; color: #666;"><em>* Ghi chú: Giá trị chênh lệch âm (màu đỏ) thể hiện việc chi tiêu vượt dự toán tại hạng mục đó.</em></p>

                    ${timelineHtml}

                    <div class="avoid-break page-break" style="margin-top: 30px;">
                        <h3 style="border-bottom: 2px solid #ccc; padding-bottom: 5px;">3. Đánh giá & Biểu đồ</h3>
                        <p><strong>Tỷ lệ tiêu hao:</strong> Đã sử dụng <strong>${percentStr}</strong> so với phương án dự toán phê duyệt.</p>
                        <p><strong>Đánh giá kiểm soát:</strong> ${rating}</p>
                        <div style="text-align: center; margin-top: 30px;">
                            <img src="${barChartImg}" style="max-width: 100%; height: auto; border: 1px solid #eee; margin-bottom: 30px;" alt="Biểu đồ cột">
                            <br>
                            <img src="${pieChartImg}" style="max-width: 50%; height: auto; border: 1px solid #eee;" alt="Biểu đồ tròn">
                        </div>
                    </div>

                    ${invoiceHtml}
                    
                    <div class="avoid-break" style="margin-top: 50px; display: flex; justify-content: space-around;">
                        <div style="text-align: center;">
                            <p><strong>Người lập biểu</strong></p>
                            <p style="font-size: 11pt; color: #666;">(Ký và ghi rõ họ tên)</p>
                            <p style="margin-top: 80px;"><strong>${document.getElementById('currentUserRole').innerText.split('-')[0].trim()}</strong></p>
                        </div>
                        <div style="text-align: center;">
                            <p><strong>Trưởng đoàn xác nhận</strong></p>
                            <p style="font-size: 11pt; color: #666;">(Ký và ghi rõ họ tên)</p>
                            <p style="margin-top: 80px;">.........................................</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function exportExcel() {
            try {
                const wb = XLSX.utils.book_new();
                
                const estData = [['BẢNG DỰ TOÁN CHI PHÍ', '', '', '', ''], ['Hành trình:', state.trip.origin + ' đến ' + state.trip.destination, '', 'Ngân sách:', state.trip.budget], [], ['Hạng mục', 'Mô tả', 'Đơn giá', 'SL', 'Thành tiền']];
                state.plans.filter(p=>p.selected).forEach(p => {
                    const catName = CATEGORIES.find(c => c.id === p.catId).name.substring(3);
                    estData.push([catName, p.desc, p.unit, p.qty, p.total]);
                });
                const wsEst = XLSX.utils.aoa_to_sheet(estData);
                XLSX.utils.book_append_sheet(wb, wsEst, "Dự toán (Đã duyệt)");

                const actData = [['BẢNG CHI PHÍ THỰC TẾ', '', '', ''], [], ['Ngày', 'Hạng mục', 'Diễn giải', 'Số tiền']];
                state.actuals.forEach(a => {
                    const catName = CATEGORIES.find(c => c.id === a.catId).name.substring(3);
                    actData.push([a.date, catName, a.desc, a.amount]);
                });
                const wsAct = XLSX.utils.aoa_to_sheet(actData);
                XLSX.utils.book_append_sheet(wb, wsAct, "Thực tế");

                XLSX.writeFile(wb, "NtuBridge2026_CostReport.xlsx");
                showToast("Đã tải xuống file Excel");
            } catch(e) { showToast("Lỗi xuất Excel! Đảm bảo trình duyệt hỗ trợ.", "error"); }
        }

        function generateAndExportPDF() {
            showToast("Đang thu thập dữ liệu và biểu đồ...", "info");
            
            generateChartImagesForReport((barChartImg, pieChartImg) => {
                const area = document.getElementById('report-render-area');
                area.innerHTML = buildReportHTML(barChartImg, pieChartImg);
                area.style.display = 'block'; 
                
                var opt = {
                    margin:       [15, 15, 15, 15], 
                    filename:     'NtuBridge2026_Report.pdf',
                    image:        { type: 'jpeg', quality: 0.98 },
                    html2canvas:  { scale: 2, useCORS: true, letterRendering: true },
                    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
                    pagebreak:    { mode: ['css', 'legacy'] } 
                };

                showToast("Đang tạo PDF, vui lòng không tắt trang...", "info");
                html2pdf().set(opt).from(area).save().then(() => {
                    area.style.display = 'none'; 
                    showToast("Tạo PDF thành công!", "success");
                });
            });
        }

        function exportWord() {
            generateChartImagesForReport((barChartImg, pieChartImg) => {
                const htmlContent = `
                    <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                    <head><meta charset='utf-8'><title>Export HTML to Word</title>
                    <style>
                        body { font-family: 'Times New Roman'; }
                        table { border-collapse: collapse; width: 100%; }
                        th, td { border: 1px solid windowtext; padding: 5px; }
                        .page-break { mso-special-character: line-break; page-break-before: always; }
                    </style>
                    </head><body>
                    ${buildReportHTML(barChartImg, pieChartImg)}
                    </body></html>
                `;
                const blob = new Blob(['\ufeff', htmlContent], { type: 'application/msword' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = 'NtuBridge2026_Report.doc';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                showToast("Đã tải xuống file Word");
            });
        }

        // ==========================================
        // 9. MODULE: SETTINGS / BACKUP (JSON)
        // ==========================================
        function renderSettings(container) {
            let html = `
                <div class="mb-6">
                    <h2 class="text-xl md:text-2xl font-bold text-gray-800">Quản lý Dữ liệu</h2>
                    <p class="text-xs md:text-sm text-gray-500">Vì ứng dụng chạy trực tiếp trên trình duyệt, hãy Backup thường xuyên.</p>
                </div>

                <div class="bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-200 mb-4 md:mb-6">
                    <h3 class="font-bold text-base md:text-lg mb-2 md:mb-4 text-indigo-700"><i class="fa-solid fa-download mr-2"></i>Backup (Lưu dữ liệu về máy)</h3>
                    <p class="text-xs md:text-sm text-gray-600 mb-4">Tải toàn bộ dữ liệu cấu hình, kế hoạch, thực tế (bao gồm cả ảnh hóa đơn) thành 1 file .json để lưu trữ an toàn.</p>
                    <button type="button" onclick="backupData()" class="w-full sm:w-auto bg-indigo-600 text-white px-4 md:px-6 py-2 rounded-lg hover:bg-indigo-700 shadow-sm text-sm md:text-base"><i class="fa-solid fa-cloud-arrow-down mr-2"></i>Tải file Backup (.json)</button>
                </div>

                <div class="bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-200">
                    <h3 class="font-bold text-base md:text-lg mb-2 md:mb-4 text-orange-600"><i class="fa-solid fa-upload mr-2"></i>Restore (Khôi phục dữ liệu)</h3>
                    <p class="text-xs md:text-sm text-gray-600 mb-4">Khôi phục toàn bộ hệ thống từ file .json đã lưu trước đó. <strong>Lưu ý: Dữ liệu hiện tại sẽ bị ghi đè!</strong></p>
                    
                    <div class="flex flex-col sm:flex-row items-start sm:items-center space-y-3 sm:space-y-0 sm:space-x-4">
                        <input type="file" id="inpRestore" accept=".json" class="block w-full sm:max-w-sm text-xs md:text-sm text-gray-500 file:mr-2 md:file:mr-4 file:py-2 file:px-3 md:file:px-4 file:rounded-md file:border-0 file:text-xs md:file:text-sm file:font-semibold file:bg-orange-50 file:text-orange-700 hover:file:bg-orange-100">
                        <button type="button" onclick="restoreData()" class="w-full sm:w-auto bg-orange-500 text-white px-4 md:px-6 py-2 rounded-lg hover:bg-orange-600 shadow-sm whitespace-nowrap text-sm md:text-base"><i class="fa-solid fa-rotate-left mr-2"></i>Khôi phục</button>
                    </div>
                </div>
            `;
            container.innerHTML = html;
        }

        function backupData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state));
            const node = document.createElement('a');
            node.setAttribute("href", dataStr);
            node.setAttribute("download", `NtuCostManager_Backup_${new Date().toISOString().split('T')[0]}.json`);
            document.body.appendChild(node);
            node.click();
            node.remove();
            showToast("Đã tải file Backup");
        }

        function restoreData() {
            if(!checkAuth()) return;
            const fileInput = document.getElementById('inpRestore');
            if(fileInput.files.length === 0) {
                showToast("Vui lòng chọn file backup (.json)", "error"); return;
            }

            showConfirm("Toàn bộ dữ liệu hiện tại sẽ bị xóa và thay thế bằng dữ liệu từ file. Tiếp tục?", () => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const parsed = JSON.parse(e.target.result);
                        if(parsed.trip && parsed.plans) {
                            state = parsed;
                            showToast("Khôi phục dữ liệu thành công!", "success");
                            switchTab('dashboard');
                        } else {
                            showToast("File không đúng định dạng của phần mềm!", "error");
                        }
                    } catch(err) {
                        showToast("Lỗi đọc file JSON.", "error");
                    }
                };
                reader.readAsText(fileInput.files[0]);
            });
        }

        // ==========================================
        // UTILS
        // ==========================================
        const formatDate = (dStr) => {
            const d = new Date(dStr);
            return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear()}`;
        };

        const openModal = (htmlContent) => {
            const modalOverlay = document.getElementById('modal-overlay');
            const modalContent = document.getElementById('modal-content');
            modalContent.innerHTML = htmlContent;
            modalOverlay.classList.remove('hidden');
        };

        const closeModal = () => {
            document.getElementById('modal-overlay').classList.add('hidden');
        };

        // Initialize Application
        window.onload = () => {
            renderTab();
        };

    </script>
</body>
</html>
