    <!-- GOOGLE DRIVE API MODULES -->
    <script>
        var GOOGLE_CLIENT_ID = 'THAY_BANG_CLIENT_ID_CUA_BAN.apps.googleusercontent.com'; 
        var GOOGLE_API_KEY = 'THAY_BANG_API_KEY_CUA_BAN'; 
        
        var gapiInited = false;
        var gisInited = false;
        var driveTokenClient = null;
        var driveAccessToken = null;

        function gapiLoaded() {
            if (typeof gapi !== 'undefined') {
                gapi.load('client', async () => {
                    try {
                        await gapi.client.init({ apiKey: GOOGLE_API_KEY, discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] });
                        gapiInited = true;
                    } catch (err) { console.warn('Lỗi GAPI', err); }
                });
            }
        }

        function gisLoaded() {
            if (typeof google !== 'undefined' && google.accounts) {
                try {
                    driveTokenClient = google.accounts.oauth2.initTokenClient({
                        client_id: GOOGLE_CLIENT_ID,
                        scope: 'https://www.googleapis.com/auth/drive.appdata', 
                        callback: '', 
                    });
                    gisInited = true;
                } catch(e) { console.warn('Lỗi GIS', e); }
            }
        }
    </script>
    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>

    <script>
        // ==========================================

        let state = {
            role: 'admin',

                    avatar: '', passportImg: '', studentIdImg: '', attachedCv: '', attachedCvName: '',
                    objective: 'Mong muốn học hỏi và giao lưu kỹ thuật thiết kế cầu với sinh viên quốc tế, mang lại thành tích tốt nhất cho đội.',

                }
            ],
            plans: [
                { id: 1, catId: 1, desc: 'Vietjet Air bay thẳng', unit: 3500000, qty: 5, total: 17500000, selected: false, currency: 'VND', originalUnit: 3500000, mapLocation: 'Changi Airport', notes: '' },
                { id: 2, catId: 1, desc: 'Scoot (SGN-SIN) + Xe giường nằm', unit: 2800000, qty: 5, total: 14000000, selected: true, currency: 'VND', originalUnit: 2800000, mapLocation: 'Sân bay Tân Sơn Nhất', notes: '' },
                { id: 3, catId: 2, desc: 'NTU Guest House', unit: 1200000, qty: 4, total: 4800000, selected: true, currency: 'VND', originalUnit: 1200000, mapLocation: 'NTU Guest House Singapore', notes: '' },
                { id: 5, catId: 4, desc: 'Ăn uống Canteen NTU', unit: 370000, qty: 20, total: 7400000, selected: true, currency: 'SGD', originalUnit: 20, mapLocation: 'North Spine Food Court NTU', notes: '' },
                { id: 6, catId: 3, desc: 'Grab & MRT', unit: 370000, qty: 2, total: 740000, selected: true, currency: 'SGD', originalUnit: 20, routes: [{from: 'Changi', to: 'NTU'}], mapLocation: '', notes: '' }
            ],
            planLists: [],
            actuals: [
                { id: 1, catId: 1, desc: 'Mua vé Scoot đợt 1', amount: 14200000, date: '2026-02-15', currency: 'VND', originalAmount: 14200000, notes: 'Đã thanh toán qua thẻ tín dụng' },
                { id: 2, catId: 5, desc: 'Phí đăng ký BTC', amount: 2000000, date: '2026-02-10', currency: 'VND', originalAmount: 2000000, notes: '' }
            ],
            timeline: [
                { id: 1, date: '2026-03-10', time: '08:00', title: 'Tập trung xuất phát', location: 'ĐH Nha Trang', notes: 'Kiểm tra hộ chiếu', planId: null },
                { id: 2, date: '2026-03-10', time: '13:00', title: 'Bay đi Singapore', location: 'Sân bay TSN', notes: 'Có mặt trước 2 tiếng', planId: 2 }
            ],
            actualTimeline: [
                { id: 1, date: '2026-03-10', time: '08:30', title: 'Thực tế: Tập trung trễ 30p', location: 'ĐH Nha Trang', notes: 'Đợi thành viên A quên đồ', image: '' }
            ],
            invoices: []
        };

        let currentTab = 'dashboard';
        window.currentTimelineTab = 'planned'; 
        let charts = {}; 
        
        // Temporary variables for CV upload
        window.tempAttachedCv = '';
        window.tempAttachedCvName = '';

        // ==========================================
        // LOCAL STORAGE - AUTO SAVE LOGIC
        // ==========================================
        window.loadLocalState = function() {
            try {
                const saved = localStorage.getItem('ntuCostManagerState');
                if (saved) {
                    state = JSON.parse(saved);
                }
            } catch(e) { console.warn('Lỗi đọc LocalStorage'); }
        };

        window.saveLocalState = function() {
            try {
                localStorage.setItem('ntuCostManagerState', JSON.stringify(state));
            } catch(e) {
                console.warn('Lỗi lưu LocalStorage, dung lượng có thể quá lớn');
                if(e.name === 'QuotaExceededError') {
                    window.showToast('Bộ nhớ thiết bị đầy! Không thể tự động lưu ảnh, hãy dọn bớt ảnh dư thừa.', 'error');
                }
            }
        };

        // ==========================================
        // 3. CORE UTILITIES
        // ==========================================
        window.formatMoney = (amount) => new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(amount);
        window.formatSGD = (amount) => new Intl.NumberFormat('en-SG', { style: 'currency', currency: 'SGD' }).format(amount);
        
        window.formatDate = (dStr) => {
            if (!dStr) return '';
            const d = new Date(dStr);
            return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear()}`;
        };

        window.showToast = (message, type = 'success') => {
            const container = document.getElementById('toast-container');
            if(!container) return;
            const toast = document.createElement('div');
            const color = type === 'success' ? 'bg-green-500' : (type === 'error' ? 'bg-red-500' : 'bg-blue-500');
            toast.className = `${color} text-white px-4 md:px-6 py-3 rounded-lg shadow-lg flex items-center space-x-3 toast-enter pointer-events-auto text-sm md:text-base`;
            toast.innerHTML = `<i class="fa-solid ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> <span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };

        window.openModal = (htmlContent) => {
            const modalOverlay = document.getElementById('modal-overlay');
            const modalContent = document.getElementById('modal-content');
            if(!modalOverlay || !modalContent) return;
            modalContent.innerHTML = htmlContent;
            modalOverlay.classList.remove('hidden');
        };

        window.closeModal = () => {
            const modalOverlay = document.getElementById('modal-overlay');
            if(modalOverlay) modalOverlay.classList.add('hidden');
        };

        window.showConfirm = (message, onConfirmCallback) => {
            const m = `
                <div class="p-4 md:p-6">
                    <h3 class="text-lg md:text-xl font-bold mb-4 text-gray-800 flex items-center"><i class="fa-solid fa-triangle-exclamation text-red-500 mr-2"></i> Xác nhận</h3>
                    <p class="text-sm md:text-base text-gray-600 mb-6">${message}</p>
                    <div class="flex justify-end space-x-3">
                        <button onclick="window.closeModal()" class="px-4 py-2 border rounded-md text-gray-600 hover:bg-gray-50 text-sm">Hủy</button>
                        <button id="btnConfirmAction" class="px-4 py-2 bg-red-600 text-white rounded-md hover:bg-red-700 font-medium text-sm">Đồng ý</button>
                    </div>
                </div>
            `;
            window.openModal(m);
            setTimeout(() => {
                const btn = document.getElementById('btnConfirmAction');
                if(btn) btn.onclick = () => { onConfirmCallback(); window.closeModal(); };
            }, 50);
        };

        window.toggleRole = () => {
            state.role = state.role === 'admin' ? 'member' : 'admin';
            const roleEl = document.getElementById('currentUserRole');
            if(roleEl) roleEl.innerText = state.role === 'admin' ? 'Tấn Đạt đẹp trai - 64CNXD2' : 'Khách (Chỉ xem)';
            window.showToast(`Đã chuyển sang quyền: ${state.role.toUpperCase()}`, 'info');
            window.saveLocalState();
            window.renderTab();
        };

        window.checkAuth = () => {
            if (state.role !== 'admin') {
                window.showToast('Chỉ Admin mới có quyền thực hiện thao tác này!', 'error'); return false;
            }
            return true;
        };

        window.toggleSidebar = function() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if(sidebar && overlay) {
                sidebar.classList.toggle('-translate-x-full');
                overlay.classList.toggle('hidden');
            }
        }

        window.resizeImage = function(file, maxSize, callback) {
            const reader = new FileReader();
            reader.onload = function (e) {
                const img = new Image();
                img.onload = function () {
                    const canvas = document.createElement('canvas');
                    let width = img.width; let height = img.height;
                    if (width > height) { if (width > maxSize) { height *= maxSize / width; width = maxSize; } } 
                    else { if (height > maxSize) { width *= maxSize / height; height = maxSize; } }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    callback(canvas.toDataURL('image/jpeg', 0.8)); 
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        window.setupPasteHandler = function(elementId) {
            const div = document.getElementById(elementId);
            if (!div) return;
            div.addEventListener('paste', function(e) {
                const items = (e.clipboardData || e.originalEvent.clipboardData).items;
                let hasImage = false;
                for (let i = 0; i < items.length; i++) {
                    if (items[i].type.indexOf("image") !== -1) {
                        hasImage = true;
                        const blob = items[i].getAsFile();
                        window.resizeImage(blob, 800, (resizedDataUrl) => {
                            const img = document.createElement('img');
                            img.src = resizedDataUrl;
                            img.style.maxWidth = '100%'; img.style.maxHeight = '300px'; img.style.borderRadius = '8px';
                            img.style.marginTop = '8px'; img.style.marginBottom = '8px'; img.style.boxShadow = '0 2px 5px rgba(0,0,0,0.1)';
                            const sel = window.getSelection();
                            if (sel.getRangeAt && sel.rangeCount) {
                                let range = sel.getRangeAt(0);
                                if (div.contains(range.commonAncestorContainer)) {
                                    range.deleteContents(); range.insertNode(img); range.setStartAfter(img); range.setEndAfter(img);
                                    sel.removeAllRanges(); sel.addRange(range);
                                } else { div.appendChild(img); }
                            } else { div.appendChild(img); }
                        });
                    }
                }
                if (hasImage) e.preventDefault(); 
            });
        }
        
        window.previewImageInput = function(input, imgId) {
            if (input.files && input.files[0]) {
                window.resizeImage(input.files[0], 600, function(dataUrl) {
                    const img = document.getElementById(imgId);
                    if(img) {
                        img.src = dataUrl;
                        img.classList.remove('hidden');
                    }
                    const textEl = document.getElementById(imgId + 'Text');
                    if(textEl) textEl.classList.add('hidden');
                });
            }
        }

        window.handleAttachedCVUpload = function(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                if (file.size > 2 * 1024 * 1024) {
                    window.showToast("File quá lớn! Vui lòng chọn file dưới 2MB.", "error");
                    input.value = '';
                    return;
                }
                window.tempAttachedCvName = file.name;
                const reader = new FileReader();
                reader.onload = function(e) {
                    window.tempAttachedCv = e.target.result;
                    const displayEl = document.getElementById('attachedCvNameDisplay');
                    if(displayEl) {
                        displayEl.innerText = file.name;
                        displayEl.classList.remove('hidden');
                    }
                };
                reader.readAsDataURL(file);
            }
        }

        window.downloadAttachedCV = function(id) {
            const mem = state.members.find(m => m.id == id);
            if (!mem || !mem.attachedCv) return;
            const link = document.createElement('a');
            link.href = mem.attachedCv;
            link.download = mem.attachedCvName || `CV_${mem.name}`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            window.showToast("Đã tải CV gốc về máy", "success");
        }

        // ==========================================
        // 4. FIREBASE CLOUD & NPOINT SHARE LOGIC 
        // ==========================================
        let db = null;
        let auth = null;
        let appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        window.initFirebase = async function() {
            if (db) return true;
            try {
                const configStr = typeof __firebase_config !== 'undefined' ? __firebase_config : null;
                if (!configStr || configStr === '{}') return false; 
                
                const firebaseConfig = JSON.parse(configStr);
                if (typeof window.fbInitApp === 'undefined') return false;

                const app = window.fbInitApp(firebaseConfig);
                auth = window.fbGetAuth(app);

        // --- GEMINI API FOR AUTO TRANSLATION ---
        window.translateCVToEnglish = async function(dataObj) {
            const apiKey = ""; 
            if (!apiKey || apiKey.trim() === "") {
                window.showToast("Môi trường không hỗ trợ dịch thuật AI. Sẽ sử dụng bản gốc.", "info");
                return dataObj;
            }
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const prompt = `You are a professional resume translator. Translate the following Vietnamese CV content to professional English. Return exactly a JSON object with the same keys. If a field is empty, return an empty string.\nContent to translate:\n${JSON.stringify(dataObj)}`;

            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: {
                    responseMimeType: "application/json",
                    responseSchema: {
                        type: "OBJECT",
                        properties: {
                            role: { type: "STRING" },
                            objective: { type: "STRING" },
                            education: { type: "STRING" },
                            experience: { type: "STRING" },
                            skills: { type: "STRING" }
                        }
                    }
                }
            };

            let retries = 2;
            let delay = 1000;
            while(retries > 0) {
                try {
                    const response = await fetch(url, { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify(payload) });
                    if (response.ok) {
                        const result = await response.json();
                        const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                        if(text) return JSON.parse(text);
                    }
                } catch(e) { console.error("Translate error", e); }
                retries--;
                await new Promise(r => setTimeout(r, delay));
                delay *= 2;
            }
            return dataObj; // Return original on absolute failure
        }

        window.executeShareApp = async function() {
            const type = document.querySelector('input[name="shareOption"]:checked').value;
            let dataStringToShare = '';

            if (type === 'current') {
                dataStringToShare = window.prepareStateForCloud();
                await window.uploadAndGetLink(dataStringToShare);
            } else {
                const fileInput = document.getElementById('inpShareFile');
                if(!fileInput.files.length) {
                    window.showToast("Vui lòng chọn 1 file .json!", "error");
                    return;
                }
                const reader = new FileReader();
                reader.onload = async function(e) {
                    try {
                        const parsed = JSON.parse(e.target.result);
                        if (!parsed.trip || !parsed.plans) throw new Error("File không đúng định dạng");
                        
                        if (parsed.invoices) {
                            parsed.invoices = parsed.invoices.map(inv => {
                                if(inv.dataUrl && inv.dataUrl.length > 100000) return { ...inv, dataUrl: null, filename: inv.filename + " (Ảnh ẩn)" };
                                return inv;
                            });
                        }
                        if (parsed.members) {
                            parsed.members = parsed.members.map(m => { return {...m, passportImg: '', studentIdImg: '', attachedCv: ''}; });
                        }
                        const stripNotes = (items) => {
                            if(items) items.forEach(p => {
                                if (p.notes && p.notes.length > 50000) p.notes = p.notes.replace(/<img[^>]*src="data:image[^>]*>/gi, '[Ảnh đã ẩn]');
                                if (p.image && p.image.length > 50000) p.image = p.image.replace(/<img[^>]*src="data:image[^>]*>/gi, '[Ảnh đã ẩn]');
                            });
                        };
                        stripNotes(parsed.plans); stripNotes(parsed.actuals); stripNotes(parsed.actualTimeline);

                        dataStringToShare = JSON.stringify(parsed);
                        await window.uploadAndGetLink(dataStringToShare);
                    } catch(err) { window.showToast("Lỗi định dạng file JSON", "error"); }
                };
                reader.readAsText(fileInput.files[0]);
            }
        }

        window.uploadAndGetLink = async function(dataString) {
            window.showToast("Đang xử lý dữ liệu và tạo link chia sẻ...", "info");
            const isFbReady = await window.initFirebase();
            let shareId = '';
            let isNpoint = false;

            if (isFbReady && auth && auth.currentUser && window.fbSetDoc && window.fbDoc) {
                try {
                    shareId = crypto.randomUUID();
                    const shareRef = window.fbDoc(db, 'artifacts', appId, 'public', 'data', 'shared_trips', shareId);
                    if (new Blob([dataString]).size > 1000000) { 
                        window.showToast("Dữ liệu vẫn quá lớn (>1MB). Hãy xóa bớt hình ảnh.", "error"); return; 
                    }
                    await window.fbSetDoc(shareRef, { data: dataString, createdAt: new Date().toISOString() });
                } catch(e) { window.showToast("Lỗi Firebase khi tạo link.", "error"); return; }
            } else {
                isNpoint = true;
                try {
                    const res = await fetch('https://api.npoint.io', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ data: dataString, createdAt: new Date().toISOString() })
                    });
                    if(!res.ok) throw new Error("API NPoint Failed");
                    const json = await res.json();
                    shareId = json.id; 
                } catch(e) {
                    window.showToast("Dịch vụ tạo link tạm thời không khả dụng.", "error"); return;
                }
            }

            let base = window.location.href.split('?')[0];
            if (base.startsWith('blob:') || base.includes('usercontent')) {
                base = "https://tandatdeptrai.github.io/ntu-cost-manager/"; 
            }
            
            const shareUrl = base + (isNpoint ? '?npointId=' : '?sharedId=') + shareId;
            window.showConfirm(`
                <strong>Đã tạo link chia sẻ thành công!</strong><br><br>
                <span class="text-xs text-gray-500 mb-2 block">Cơ chế: ${isNpoint ? 'Máy chủ dự phòng công khai' : 'Máy chủ đám mây riêng'}</span>

            `, () => {});
        }

        window.saveMember = function(id) {
            const name = document.getElementById('inpMemName').value.trim();
            const role = document.getElementById('inpMemRole').value;
            const phone = document.getElementById('inpMemPhone').value.trim();
            const email = document.getElementById('inpMemEmail').value.trim();
            const dob = document.getElementById('inpMemDob').value;
            const passport = document.getElementById('inpMemPassport').value.trim().toUpperCase();
            const passportExpiry = document.getElementById('inpMemPptExpiry').value;
            const pob = document.getElementById('inpMemPob').value.trim();
            const note = document.getElementById('inpMemNote').value.trim();
            
            let avatarSrc = document.getElementById('previewAvatar').src;
            let passImgSrc = document.getElementById('previewPassImg').src;
            let studentIdSrc = document.getElementById('previewStudentIdImg').src;
            
            let avatar = avatarSrc.startsWith('data:') ? avatarSrc : '';
            let passportImg = passImgSrc.startsWith('data:') ? passImgSrc : '';
            let studentIdImg = studentIdSrc.startsWith('data:') ? studentIdSrc : '';

            if(!name) { window.showToast("Vui lòng nhập Họ tên!", "error"); return; }
            if(!state.members) state.members = [];

            if (id) {
                const mem = state.members.find(m => m.id == id);
                if(mem) { 
                    mem.name=name; mem.role=role; mem.phone=phone; mem.email=email; 
                    mem.dob=dob; mem.passport=passport; mem.passportExpiry=passportExpiry; mem.pob=pob; mem.note=note; 
                    if(avatar) mem.avatar = avatar;
                    if(passportImg) mem.passportImg = passportImg;
                    if(studentIdImg) mem.studentIdImg = studentIdImg;
                    mem.attachedCv = window.tempAttachedCv;
                    mem.attachedCvName = window.tempAttachedCvName;
                }
                window.showToast("Cập nhật thành công");
            } else {
                state.members.push({ 
                    id: Date.now(), name, role, phone, email, dob, passport, passportExpiry, pob, note, avatar, passportImg, studentIdImg,
                    attachedCv: window.tempAttachedCv, attachedCvName: window.tempAttachedCvName,
                    objective: '', education: '', experience: '', skills: '' 
                });
                window.showToast("Đã thêm thành viên");
            }
            window.tempAttachedCv = ''; window.tempAttachedCvName = ''; // reset
            window.saveLocalState();
            window.closeModal(); 
            window.renderTab();
        }

        window.deleteMember = function(id) {
            if(!window.checkAuth()) return;
            window.showConfirm('Xóa thành viên này?', () => {
                state.members = state.members.filter(m => m.id != id);
                state.trip.members = state.members.length || 1;
                window.showToast('Đã xóa', 'success'); 
                window.saveLocalState();
                window.renderTab();
            });
        }

        window.copyMemberInfo = function(id) {
            const mem = state.members.find(m => m.id == id);
            if (!mem) return;

            const textToCopy = `Thông tin ICA - ${mem.name.toUpperCase()}
- Họ và tên: ${mem.name.toUpperCase()}
- Ngày sinh: ${window.formatDate(mem.dob) || 'N/A'}
- Số Passport: ${mem.passport || 'N/A'}
- Ngày hết hạn PP: ${window.formatDate(mem.passportExpiry) || 'N/A'}
- Nơi sinh: ${mem.pob || 'N/A'}
- SĐT: ${mem.phone || 'N/A'}
- Email: ${mem.email || 'N/A'}
- Ghi chú: ${mem.note || ''}`;

            const tempInput = document.createElement("textarea");
            tempInput.value = textToCopy;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand("copy");
            document.body.removeChild(tempInput);
            window.showToast('Đã copy thông tin ICA vào khay nhớ tạm!', 'success');
        }

                            <h2 style="font-size: 14pt; color: #002f6c; border-bottom: 1.5px solid #cbd5e1; padding-bottom: 5px; margin-bottom: 10px; font-weight: bold; text-transform: uppercase;">
                                <span style="color: #ffc000; font-size: 16pt; margin-right: 5px; vertical-align: middle;">■</span> ${txt.skills}
                            </h2>
                            <p style="white-space: pre-wrap; margin: 0; color: #334155; text-align: justify;">${exportData.skills || txt.empty}</p>
                        </div>
                        
                        <div style="margin-top: 60px; text-align: right; color: #475569;">
                            <p><i>${txt.date}</i></p>
                            <p style="margin-top: 50px;"><strong>${mem.name}</strong></p>
                        </div>
                    </div>
                </div>

            var opt = {
                margin:       0,
                filename:     `CV_${mem.name.replace(/\s+/g, '')}_${lang.toUpperCase()}.pdf`,

                html2canvas:  { scale: 2, useCORS: true },

            html2pdf().set(opt).from(cvArea).save().then(() => {
                cvArea.style.display = 'none';

            });
        }


        // ==========================================
        // 7. MODULE: DASHBOARD
        // ==========================================
        window.renderDashboard = function(container) {
            const estimatedTotal = state.plans.filter(p => p.selected).reduce((sum, p) => sum + p.total, 0);
            const actualTotal = state.actuals.reduce((sum, a) => sum + a.amount, 0);
            const remaining = state.trip.budget - actualTotal;
            const overBudget = actualTotal > state.trip.budget;

            let finStatus = "";
            if (actualTotal === 0) finStatus = "Chưa có phát sinh chi phí thực tế. Ngân sách khả dụng 100%.";
            else if (actualTotal > state.trip.budget) finStatus = "⚠️ Đã <strong class='text-red-600'>VƯỢT NGÂN SÁCH</strong>! Cần rà soát lại các khoản chi ngay lập tức.";
            else if (actualTotal > estimatedTotal) finStatus = "Đang chi tiêu <strong class='text-orange-600'>vượt mức dự toán</strong> đã chọn, nhưng vẫn nằm trong ngân sách an toàn.";
            else finStatus = "✅ Chi tiêu đang được kiểm soát tốt, bám sát dự toán.";

            const actualCount = state.actuals.length;
            const invoiceCount = state.invoices.length;
            let invStatus = `Đã thu thập <strong>${invoiceCount}</strong> minh chứng / <strong>${actualCount}</strong> khoản chi.<br>`;
            if (actualCount === 0) invStatus += "Chưa có khoản chi nào để thu thập hóa đơn.";
            else if (invoiceCount < actualCount) invStatus += "⚠️ <span class='text-red-600 font-medium'>Còn thiếu hóa đơn</span>, cần bổ sung để hoàn thiện hồ sơ.";
            else invStatus += "✅ Hồ sơ chứng từ đầy đủ.";

            const plannedEvents = state.timeline ? state.timeline.length : 0;
            const actualEvents = state.actualTimeline ? state.actualTimeline.length : 0;
            let timelineStatus = `Kế hoạch: <strong>${plannedEvents}</strong> hoạt động.<br>Thực tế: <strong>${actualEvents}</strong> sự kiện.<br>`;
            if (actualEvents === 0) timelineStatus += "Chưa diễn ra hoặc chưa ghi nhận thực tế.";
            else timelineStatus += "✅ Đang theo dõi tiến độ hiện trường.";

            let html = `
                <div class="flex flex-col md:flex-row md:justify-between md:items-center mb-6 gap-4">
                    <h2 class="text-2xl font-bold text-gray-800">Tổng quan chuyến đi</h2>
                    <button type="button" onclick="window.editTripInfo()" class="bg-white border shadow-sm px-4 py-2 rounded-lg text-sm font-medium hover:bg-gray-50 transition w-full md:w-auto ${state.role !== 'admin' ? 'hidden' : ''}">
                        <i class="fa-solid fa-pen mr-2"></i>Sửa thông tin
                    </button>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                    <div class="bg-indigo-600 text-white rounded-xl p-5 shadow-lg relative overflow-hidden">
                        <i class="fa-solid fa-wallet absolute right-[-20px] bottom-[-20px] text-8xl opacity-10"></i>
                        <p class="text-indigo-100 text-xs md:text-sm font-medium uppercase tracking-wider mb-1">Tổng Ngân sách</p>
                        <h3 class="text-xl md:text-2xl font-bold truncate" title="${window.formatMoney(state.trip.budget)}">${window.formatMoney(state.trip.budget)}</h3>
                        <p class="text-xs md:text-sm mt-2"><i class="fa-solid fa-users mr-1"></i> <span id="dash-members">${state.trip.members}</span> thành viên</p>
                    </div>
                    <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
                        <p class="text-gray-500 text-xs md:text-sm font-medium uppercase tracking-wider mb-1">Dự toán (Đang chọn)</p>
                        <h3 class="text-xl md:text-2xl font-bold text-blue-600 truncate" title="${window.formatMoney(estimatedTotal)}">${window.formatMoney(estimatedTotal)}</h3>
                    </div>
                    <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
                        <p class="text-gray-500 text-xs md:text-sm font-medium uppercase tracking-wider mb-1">Thực tế đã chi</p>
                        <h3 class="text-xl md:text-2xl font-bold ${actualTotal > estimatedTotal ? 'text-orange-500' : 'text-green-600'} truncate" title="${window.formatMoney(actualTotal)}">${window.formatMoney(actualTotal)}</h3>
                    </div>
                    <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
                        <p class="text-gray-500 text-xs md:text-sm font-medium uppercase tracking-wider mb-1">Còn lại</p>
                        <h3 class="text-xl md:text-2xl font-bold ${overBudget ? 'text-red-600' : 'text-gray-800'} truncate" title="${window.formatMoney(remaining)}">${window.formatMoney(remaining)}</h3>
                    </div>
                </div>

                <div class="bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-100 mb-6">
                    <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center">
                        <i class="fa-solid fa-robot text-indigo-500 mr-2"></i> Trợ lý phân tích chuyến đi
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="bg-indigo-50 rounded-xl p-4 border border-indigo-100 shadow-inner">
                            <h4 class="font-bold text-indigo-800 mb-2"><i class="fa-solid fa-money-bill-trend-up mr-1.5"></i> Tình hình Tài chính</h4>
                            <p class="text-sm text-gray-700 leading-relaxed">${finStatus}</p>
                        </div>
                        <div class="bg-green-50 rounded-xl p-4 border border-green-100 shadow-inner">
                            <h4 class="font-bold text-green-800 mb-2"><i class="fa-solid fa-file-invoice mr-1.5"></i> Trạng thái Chứng từ</h4>
                            <p class="text-sm text-gray-700 leading-relaxed">${invStatus}</p>
                        </div>
                        <div class="bg-orange-50 rounded-xl p-4 border border-orange-100 shadow-inner">
                            <h4 class="font-bold text-orange-800 mb-2"><i class="fa-solid fa-route mr-1.5"></i> Tiến độ Lịch trình</h4>
                            <p class="text-sm text-gray-700 leading-relaxed">${timelineStatus}</p>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-100 w-full overflow-hidden">
                        <h3 class="text-lg font-semibold mb-4 text-gray-700">Phân bổ Dự toán</h3>
                        <div class="relative h-64 w-full flex justify-center"><canvas id="pieChart"></canvas></div>
                    </div>
                    <div class="bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-100 w-full overflow-hidden">
                        <h3 class="text-lg font-semibold mb-4 text-gray-700">Dự toán vs Thực tế</h3>
                        <div class="relative h-64 w-full"><canvas id="barChart"></canvas></div>
                    </div>
                </div>
            `;
            container.innerHTML = html; window.renderCharts();
        }

        window.renderCharts = function() {
            const labels = CATEGORIES.map(c => c.name.substring(3)); 
            const estData = CATEGORIES.map(c => state.plans.filter(p => p.catId === c.id && p.selected).reduce((sum, p) => sum + p.total, 0));
            const actData = CATEGORIES.map(c => state.actuals.filter(a => a.catId === c.id).reduce((sum, a) => sum + a.amount, 0));
            const pieCtx = document.getElementById('pieChart');
            if(pieCtx) {
                charts.pie = new Chart(pieCtx.getContext('2d'), {
                    type: 'doughnut', data: { labels: labels, datasets: [{ data: estData, backgroundColor: ['#4f46e5', '#0ea5e9', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'], borderWidth: 0 }] },
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false, 
                        plugins: { 
                            legend: { position: window.innerWidth < 768 ? 'bottom' : 'right', labels: { boxWidth: 12 } },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        let value = context.parsed;
                                        let total = context.dataset.data.reduce((a, b) => a + b, 0);
                                        let percentage = total > 0 ? Math.round((value / total) * 100) + '%' : '0%';
                                        return ' ' + context.label + ': ' + window.formatMoney(value) + ' (' + percentage + ')';
                                    }
                                }
                            }
                        } 
                    }
                });
            }
            const barCtx = document.getElementById('barChart');
            if(barCtx) {
                charts.bar = new Chart(barCtx.getContext('2d'), {
                    type: 'bar', data: { labels: labels, datasets: [{ label: 'Dự toán', data: estData, backgroundColor: '#cbd5e1', borderRadius: 4 }, { label: 'Thực tế', data: actData, backgroundColor: '#4f46e5', borderRadius: 4 }] },
                    options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, ticks: { callback: (val) => val / 1000000 + 'M' } }, x: { ticks: { maxRotation: 45, minRotation: 45 } } } }
                });
            }
        }

        window.editTripInfo = function() {
            if(!window.checkAuth()) return;
            const m = `
                <div class="p-4 md:p-6"><h3 class="text-xl font-bold mb-4">Cập nhật chuyến đi</h3>
                    <div class="space-y-4">
                        <div><label class="block text-sm font-medium text-gray-700 mb-1">Tên dự án / Chuyến đi</label><input type="text" id="inpTripName" value="${state.trip.name || 'NTU Bridge 2026'}" class="block w-full rounded-md border-gray-300 shadow-sm p-2 border text-sm font-bold text-indigo-700"></div>
                        <div><label class="block text-sm font-medium text-gray-700 mb-1">Ngân sách tổng (VNĐ)</label><input type="number" id="inpBudget" value="${state.trip.budget}" class="block w-full rounded-md border-gray-300 shadow-sm p-2 border text-sm"></div>
                        <div class="flex flex-col sm:flex-row gap-4">
                            <div class="w-full sm:w-1/2"><label class="block text-sm font-medium text-gray-700 mb-1">Số thành viên</label><input type="number" id="inpMembers" value="${state.trip.members}" class="block w-full rounded-md border-gray-300 shadow-sm p-2 border text-sm"></div>
                            <div class="w-full sm:w-1/2"><label class="block text-sm font-medium text-gray-700 mb-1">Tỷ giá (1 SGD = ? VNĐ)</label><input type="number" id="inpExchangeRate" value="${state.trip.exchangeRate || 18500}" class="block w-full rounded-md border-gray-300 shadow-sm p-2 border text-sm"></div>
                        </div>
                    </div>
                    <div class="mt-6 flex justify-end space-x-3"><button type="button" onclick="window.closeModal()" class="px-4 py-2 border rounded-md hover:bg-gray-50 text-sm">Hủy</button><button type="button" onclick="window.saveTripInfo()" class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 text-sm">Lưu</button></div>
                </div>`;
            window.openModal(m);
        }

        window.saveTripInfo = function() {
            state.trip.name = document.getElementById('inpTripName').value.trim() || 'NTU Bridge 2026';
            state.trip.budget = parseFloat(document.getElementById('inpBudget').value) || 0;
            state.trip.members = parseInt(document.getElementById('inpMembers').value) || 1;
            state.trip.exchangeRate = parseFloat(document.getElementById('inpExchangeRate').value) || 18500;
            window.saveLocalState();
            window.closeModal(); window.showToast('Đã cập nhật thông tin chuyến đi'); window.renderTab();
        }

        // ==========================================
        // 8. MODULE: TIMELINE (KẾ HOẠCH & THỰC TẾ)
        // ==========================================
        window.switchTimelineTab = function(type) {
            window.currentTimelineTab = type;
            window.renderTab();
        }

        window.renderTimeline = function(container) {
            if (!state.actualTimeline) state.actualTimeline = [];
            const isPlanned = window.currentTimelineTab === 'planned';
            const activeData = isPlanned ? state.timeline : state.actualTimeline;

            let html = `
                <div class="flex flex-col md:flex-row md:justify-between items-start md:items-center mb-6 gap-4">
                    <div>
                        <h2 class="text-xl md:text-2xl font-bold text-gray-800">Lịch trình chuyến đi</h2>
                        <p class="text-xs md:text-sm text-gray-500">So sánh kế hoạch dự kiến và thực tế diễn ra.</p>
                    </div>
                    
                    <div class="flex flex-col sm:flex-row w-full md:w-auto gap-2">
                        <div class="flex bg-gray-200 rounded-lg p-1">
                            <button onclick="window.switchTimelineTab('planned')" class="flex-1 px-4 py-1.5 text-sm font-medium rounded-md transition ${isPlanned ? 'bg-white shadow text-indigo-700' : 'text-gray-600 hover:text-gray-800'}">Dự kiến</button>
                            <button onclick="window.switchTimelineTab('actual')" class="flex-1 px-4 py-1.5 text-sm font-medium rounded-md transition ${!isPlanned ? 'bg-white shadow text-indigo-700' : 'text-gray-600 hover:text-gray-800'}">Thực tế</button>
                        </div>
                    </div>
                </div>

                <div class="flex justify-between items-center mb-4">
                    <button type="button" onclick="window.openTimelineModal()" class="bg-indigo-600 text-white px-3 py-1.5 rounded-lg text-sm font-medium hover:bg-indigo-700 transition shadow-sm ${state.role !== 'admin' ? 'hidden' : ''}">
                        <i class="fa-solid fa-plus mr-1"></i>Thêm hoạt động
                    </button>
                    <div class="flex space-x-2">
                        <button type="button" onclick="window.exportTimelinePDF()" class="bg-red-50 text-red-700 border border-red-200 px-3 py-1.5 rounded-lg text-xs font-medium hover:bg-red-100 transition shadow-sm"><i class="fa-solid fa-file-pdf mr-1"></i>PDF</button>
                        <button type="button" onclick="window.exportTimelineExcel()" class="bg-green-50 text-green-700 border border-green-200 px-3 py-1.5 rounded-lg text-xs font-medium hover:bg-green-100 transition shadow-sm"><i class="fa-solid fa-file-excel mr-1"></i>Excel</button>
                    </div>
                </div>
            `;

            if(!activeData || activeData.length === 0) {
                html += `<div class="text-center py-10 bg-white rounded-xl border border-dashed border-gray-300 text-gray-500 text-sm mx-4">Chưa có lịch trình nào ở mục này.</div>`;
                container.innerHTML = html;
                return;
            }

            const sortedEvents = [...activeData].sort((a,b) => new Date(a.date + 'T' + (a.time||'00:00')) - new Date(b.date + 'T' + (b.time||'00:00')));
            const groupedEvents = {};
            sortedEvents.forEach(ev => {
                if(!groupedEvents[ev.date]) groupedEvents[ev.date] = [];
                groupedEvents[ev.date].push(ev);
            });

            html += `<div id="timeline-export-target" class="max-w-4xl mx-auto px-2 md:px-0 py-4 bg-white md:bg-transparent rounded-xl"><div class="relative border-l-2 ${isPlanned ? 'border-indigo-200' : 'border-orange-200'} ml-3 md:ml-4">`;

            html += `
                <div class="hidden print-header text-center mb-8">
                    <h2 class="text-2xl font-bold uppercase mb-2">NHẬT KÝ HÀNH TRÌNH</h2>
                    <h3 class="text-lg font-bold text-gray-600">(${isPlanned ? 'LỊCH TRÌNH DỰ KIẾN' : 'THỰC TẾ DIỄN RA'})</h3>
                </div>
            `;

            for (const [date, events] of Object.entries(groupedEvents)) {
                html += `
                    <div class="mb-8 md:mb-10 ml-6 md:ml-8">
                        <span class="absolute flex items-center justify-center w-8 h-8 ${isPlanned ? 'bg-indigo-100 text-indigo-600' : 'bg-orange-100 text-orange-600'} rounded-full -left-[17px] ring-4 ring-white"><i class="fa-solid fa-calendar-day text-sm"></i></span>
                        <h3 class="font-bold text-lg ${isPlanned ? 'text-indigo-900' : 'text-orange-900'} mb-4 bg-white inline-block pr-4 py-1">${window.formatDate(date)}</h3>
                        <div class="space-y-4">
                `;

                events.forEach(ev => {
                    let extraHtml = '';
                    if (isPlanned && ev.planId) {
                        const linkedPlan = state.plans.find(p => p.id == ev.planId);
                        if (linkedPlan) {
                            extraHtml = `<div class="mt-3 hide-on-print"><button type="button" onclick="window.viewPlanDetails(${ev.planId})" class="text-[11px] md:text-xs bg-blue-50 text-blue-700 border border-blue-100 px-3 py-1.5 rounded-lg shadow-sm hover:bg-blue-100 transition inline-flex items-center font-medium"><i class="fa-solid fa-map-location-dot mr-1.5"></i> Xem phương án & Bản đồ</button></div>`;
                        }
                    } else if (!isPlanned && ev.image && ev.image.trim() !== '') {
                        extraHtml = `<div class="mt-3 bg-gray-50 border rounded p-2 overflow-x-auto">${ev.image}</div>`;
                    }

                    html += `
                        <div class="bg-white p-4 md:p-5 rounded-xl border border-gray-100 shadow-sm relative group hover:shadow-md transition avoid-break">
                            <span class="absolute flex items-center justify-center w-3 h-3 ${isPlanned ? 'bg-indigo-500' : 'bg-orange-500'} rounded-full -left-[2.1rem] md:-left-[2.35rem] top-6 ring-4 ring-white"></span>
                            <div class="flex justify-between items-start gap-4">
                                <div class="flex-1 w-full overflow-hidden">
                                    <div class="text-sm font-bold ${isPlanned ? 'text-indigo-600' : 'text-orange-600'} mb-1 flex items-center"><i class="fa-regular fa-clock mr-1.5"></i> ${ev.time || 'Cả ngày'}</div>
                                    <h4 class="text-base md:text-lg font-bold text-gray-800 break-words">${ev.title}</h4>
                                    ${ev.location ? `<p class="text-xs md:text-sm text-gray-500 mt-1.5 font-medium"><i class="fa-solid fa-location-dot text-red-400 mr-1.5 w-4 text-center"></i> ${ev.location}</p>` : ''}
                                    ${ev.notes ? `<p class="text-xs md:text-sm text-gray-600 mt-2.5 bg-gray-50 p-2.5 rounded-lg border border-gray-100 whitespace-pre-wrap">${ev.notes}</p>` : ''}
                                    ${extraHtml}
                                </div>
                                <div class="flex flex-col sm:flex-row space-y-2 sm:space-y-0 sm:space-x-2 opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-opacity hide-on-print ${state.role !== 'admin' ? 'hidden' : ''}">
                                    <button type="button" onclick="window.openTimelineModal(${ev.id})" class="text-indigo-500 hover:text-indigo-700 bg-indigo-50 p-2 rounded transition" title="Sửa"><i class="fa-solid fa-pen pointer-events-none"></i></button>
                                    <button type="button" onclick="window.deleteTimelineEvent(${ev.id})" class="text-red-500 hover:text-red-700 bg-red-50 p-2 rounded transition" title="Xóa"><i class="fa-solid fa-trash pointer-events-none"></i></button>
                                </div>
                            </div>
                        </div>
                    `;
                });
                html += `</div></div>`;
            }
            html += `</div></div>`;
            container.innerHTML = html;
        }

        window.openTimelineModal = function(id = null) {
            if(!window.checkAuth()) return;
            const isPlanned = window.currentTimelineTab === 'planned';
            const activeData = isPlanned ? state.timeline : state.actualTimeline;

            let ev = { date: new Date().toISOString().split('T')[0], time: '08:00', title: '', location: '', notes: '', planId: '', image: '' };
            let isEdit = false;
            if (id) { const found = activeData.find(t => t.id == id); if (found) { ev = found; isEdit = true; } }

            let extraInputHtml = '';
            if (isPlanned) {
                let planOptions = `<option value="">-- Không gắn phương án --</option>`;
                state.plans.forEach(p => { planOptions += `<option value="${p.id}" ${ev.planId == p.id ? 'selected' : ''}>${CATEGORIES.find(c => c.id == p.catId)?.name.substring(3)} - ${p.desc}</option>`; });
                extraInputHtml = `
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Gắn với phương án chi phí (Tùy chọn)</label>
                        <select id="inpTlPlanId" class="block w-full rounded-md border-gray-300 shadow-sm p-2 border text-sm text-indigo-700 font-medium">${planOptions}</select>
                    </div>`;
            } else {
                extraInputHtml = `
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Hình ảnh đính kèm (Bấm Ctrl+V để dán)</label>
                        <div id="inpTlImage" contenteditable="true" class="block w-full min-h-[80px] max-h-[250px] overflow-y-auto rounded-md border border-gray-300 shadow-sm p-2 focus:border-indigo-500 outline-none text-sm bg-white">${ev.image || ''}</div>
                    </div>`;
            }

            const m = `
                <div class="p-4 md:p-6">
                    <h3 class="text-xl font-bold mb-4">${isEdit ? 'Sửa hoạt động' : 'Thêm hoạt động'} ${isPlanned ? '(Dự kiến)' : '(Thực tế)'}</h3>
                    <div class="space-y-4">
                        <div class="flex flex-col sm:flex-row gap-4">
                            <div class="w-full sm:w-1/2"><label class="block text-sm font-medium text-gray-700 mb-1">Ngày</label><input type="date" id="inpTlDate" value="${ev.date}" class="block w-full rounded-md border-gray-300 shadow-sm p-2 border text-sm"></div>
                            <div class="w-full sm:w-1/2"><label class="block text-sm font-medium text-gray-700 mb-1">Giờ</label><input type="time" id="inpTlTime" value="${ev.time}" class="block w-full rounded-md border-gray-300 shadow-sm p-2 border text-sm"></div>
                        </div>
                        <div><label class="block text-sm font-medium text-gray-700 mb-1">Tên hoạt động (*)</label><input type="text" id="inpTlTitle" value="${ev.title}" placeholder="VD: Khai mạc cuộc thi" class="block w-full rounded-md border-gray-300 shadow-sm p-2 border text-sm"></div>
                        <div><label class="block text-sm font-medium text-gray-700 mb-1">Địa điểm</label><input type="text" id="inpTlLoc" value="${ev.location}" placeholder="VD: NTU Campus" class="block w-full rounded-md border-gray-300 shadow-sm p-2 border text-sm"></div>

        window.saveTimelineEvent = function(id) {
            const isPlanned = window.currentTimelineTab === 'planned';
            const activeData = isPlanned ? state.timeline : state.actualTimeline;

            const date = document.getElementById('inpTlDate').value;
            const time = document.getElementById('inpTlTime').value;
            const title = document.getElementById('inpTlTitle').value.trim();
            const location = document.getElementById('inpTlLoc').value.trim();
            const notes = document.getElementById('inpTlNotes').value.trim();
            
            let planId = null; let image = '';
            if (isPlanned) {
                planId = document.getElementById('inpTlPlanId').value ? parseInt(document.getElementById('inpTlPlanId').value) : null;
            } else {
                image = document.getElementById('inpTlImage').innerHTML;
            }

            if(!title || !date) { window.showToast("Vui lòng nhập Ngày và Tên!", "error"); return; }

            if (id) { 
                const ev = activeData.find(t => t.id == id);
                if(ev) { 
                    ev.date = date; ev.time = time; ev.title = title; ev.location = location; ev.notes = notes; 
                    if (isPlanned) ev.planId = planId; else ev.image = image;
                }
                window.showToast("Đã cập nhật lịch trình");
            } else { 
                activeData.push({ id: Date.now(), date, time, title, location, notes, planId, image });
                window.showToast("Đã thêm vào lịch trình");
            }
            window.saveLocalState();
            window.closeModal(); window.renderTab();
        }

        window.deleteTimelineEvent = function(id) {
            if(!window.checkAuth()) return;
            const isPlanned = window.currentTimelineTab === 'planned';
            window.showConfirm('Bạn có chắc chắn muốn xóa hoạt động này khỏi lịch trình?', () => {
                if (isPlanned) state.timeline = state.timeline.filter(t => t.id != id);
                else state.actualTimeline = state.actualTimeline.filter(t => t.id != id);
                window.showToast('Đã xóa', 'success'); 
                window.saveLocalState();
                window.renderTab();
            });
        }

        window.exportTimelinePDF = function() {
            const isPlanned = window.currentTimelineTab === 'planned';
            const element = document.getElementById('timeline-export-target');
            if(!element) return;

            const hideElements = element.querySelectorAll('.hide-on-print');
            hideElements.forEach(el => el.style.display = 'none');

            const titleBlock = element.querySelector('.print-header');
            if(titleBlock) titleBlock.classList.remove('hidden');

            var opt = {
                margin:       10,
                filename:     isPlanned ? `LichTrinh_DuKien_${(state.trip.name || '').replace(/\s+/g, '')}.pdf` : `NhatKy_ThucTe_${(state.trip.name || '').replace(/\s+/g, '')}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            window.showToast("Đang tạo PDF...", "info");
            html2pdf().set(opt).from(element).save().then(() => {
                if(titleBlock) titleBlock.classList.add('hidden');
                hideElements.forEach(el => el.style.display = '');
                window.showToast("Đã tải PDF", "success");
            });
        }

        window.exportTimelineExcel = function() {
            const isPlanned = window.currentTimelineTab === 'planned';
            const activeData = isPlanned ? state.timeline : state.actualTimeline;

            if(!activeData || activeData.length === 0) { window.showToast("Không có dữ liệu để xuất", "error"); return; }

            try {
                const wb = XLSX.utils.book_new();
                const sortedEvents = [...activeData].sort((a,b) => new Date(a.date + 'T' + (a.time||'00:00')) - new Date(b.date + 'T' + (b.time||'00:00')));
                
                const appName = (state.trip.name || 'NTU BRIDGE 2026').toUpperCase();
                const title = isPlanned ? `LỊCH TRÌNH DỰ KIẾN - ${appName}` : `NHẬT KÝ THỰC TẾ - ${appName}`;
                const data = [[title], [], ['Ngày', 'Giờ', 'Hoạt động', 'Địa điểm', 'Ghi chú']];
                
                sortedEvents.forEach(ev => {
                    data.push([ window.formatDate(ev.date), ev.time || '', ev.title, ev.location || '', ev.notes || '' ]);
                });

                const ws = XLSX.utils.aoa_to_sheet(data);
                ws['!cols'] = [{wch: 12}, {wch: 10}, {wch: 40}, {wch: 25}, {wch: 40}];
                
                XLSX.utils.book_append_sheet(wb, ws, isPlanned ? "Dự kiến" : "Thực tế");
                XLSX.writeFile(wb, isPlanned ? "LichTrinh_DuKien.xlsx" : "NhatKy_ThucTe.xlsx");
                window.showToast("Đã tải file Excel", "success");
            } catch(e) { window.showToast("Lỗi xuất Excel!", "error"); }
        }

        window.togglePlanSelection = function(planId) {
            if(!window.checkAuth()) return;
            const targetPlan = state.plans.find(p => p.id == planId);
            if (targetPlan) { 
                targetPlan.selected = !targetPlan.selected; 
                window.saveLocalState();
                window.renderTab(); 
            }
        }

        window.optimizePlans = function() {
            if(!window.checkAuth()) return;
            let changed = false;
            CATEGORIES.forEach(cat => {
                const plans = state.plans.filter(p => p.catId === cat.id);
                if (plans.length > 0) {
                    plans.forEach(p => p.selected = false);
                    const optimal = plans.reduce((prev, curr) => prev.total < curr.total ? prev : curr);
                    optimal.selected = true; changed = true;
                }
            });
            if(changed) { 
                window.showToast('Đã tự động chọn mức giá rẻ nhất!', 'success'); 
                window.saveLocalState();
                window.renderTab(); 
            }
        }

        window.deletePlan = function(id) {
            if(!window.checkAuth()) return;
            window.showConfirm('Bạn có chắc chắn muốn xóa phương án này?', () => {
                state.plans = state.plans.filter(p => p.id != id);
                if (state.timeline) state.timeline.forEach(t => { if(t.planId == id) t.planId = null; });
                window.showToast('Đã xóa phương án thành công!', 'success');
                window.saveLocalState();
                window.renderTab();
            });
        }

        window.toggleRouteSection = function() {
            const catId = document.getElementById('inpCatId').value;
            const routeSec = document.getElementById('routeSection');
            if (catId == '3') { routeSec.classList.remove('hidden'); window.renderRouteInputs(); } 
            else { routeSec.classList.add('hidden'); }
        };

        window.renderRouteInputs = function() {
            const catId = document.getElementById('inpCatId').value;
            if(catId != '3') return;
            const count = Math.max(1, parseInt(document.getElementById('inpQty').value) || 1);
            const container = document.getElementById('routeInputsContainer');
            
            let existingRoutes = [];
            for(let i=1; i<=container.children.length; i++) {
                existingRoutes.push({
                    from: document.getElementById(`routeFrom_${i}`)?.value || '',
                    to: document.getElementById(`routeTo_${i}`)?.value || '',
                    price: parseFloat(document.getElementById(`routePrice_${i}`)?.value) || 0
                });
            }
            let html = '';
            for(let i=1; i<=count; i++) {
                const fromVal = existingRoutes[i-1]?.from || '';
                const toVal = existingRoutes[i-1]?.to || '';
                const priceVal = existingRoutes[i-1]?.price || '';
                html += `
                    <div class="flex flex-col sm:flex-row space-y-2 sm:space-y-0 sm:space-x-2 items-start sm:items-center mb-2 bg-white p-2 rounded border border-blue-50">
                        <span class="text-xs font-bold text-blue-700 w-full sm:w-4 hidden sm:block">${i}.</span>
                        <div class="flex w-full space-x-2">
                            <input type="text" id="routeFrom_${i}" value="${fromVal}" placeholder="Từ" class="w-2/5 rounded-md border-blue-200 shadow-sm p-2 text-xs md:text-sm focus:border-blue-500">
                            <i class="fa-solid fa-arrow-right text-blue-400 text-xs mt-3"></i>
                            <input type="text" id="routeTo_${i}" value="${toVal}" placeholder="Đến" class="w-2/5 rounded-md border-blue-200 shadow-sm p-2 text-xs md:text-sm focus:border-blue-500">
                            <input type="number" id="routePrice_${i}" value="${priceVal}" oninput="window.calcTotalFromRoutes()" placeholder="Giá" class="w-1/5 rounded-md border-blue-200 shadow-sm p-2 text-xs md:text-sm focus:border-blue-500 font-bold text-blue-700 px-1">
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
            setTimeout(window.calcTotalFromRoutes, 50);
        };

        window.calcTotalFromRoutes = function() {
            if(document.getElementById('inpCatId').value != '3') return;
            const count = parseInt(document.getElementById('inpQty').value) || 0;
            let totalUnitStr = 0;
            for(let i=1; i<=count; i++) totalUnitStr += (parseFloat(document.getElementById(`routePrice_${i}`)?.value) || 0);
            const unitInput = document.getElementById('inpUnit');
            if(unitInput) { unitInput.value = totalUnitStr; window.calcTotal(); }
        };

        window.calcTotal = function() {
            const catId = document.getElementById('inpCatId').value;
            const u = parseFloat(document.getElementById('inpUnit').value) || 0;
            const curr = document.getElementById('inpCurrency').value;
            const rate = state.trip.exchangeRate || 18500;
            const vndUnit = curr === 'SGD' ? u * rate : u;
            let totalVnd = (catId == '3') ? vndUnit : vndUnit * (parseFloat(document.getElementById('inpQty').value) || 0);
            document.getElementById('inpTotal').value = window.formatMoney(totalVnd);
        };

        window.updatePlan = function(id) {
            const plan = state.plans.find(p => p.id == id);
            if(!plan) return;

            const desc = document.getElementById('inpDesc').value;
            const currency = document.getElementById('inpCurrency').value;
            const originalUnit = parseFloat(document.getElementById('inpUnit').value) || 0;
            const qty = parseFloat(document.getElementById('inpQty').value) || 0;
            const mapLocation = document.getElementById('inpMapLoc').value.trim();
            const notes = document.getElementById('inpPlanNotes').innerHTML;
            
            if(!desc || originalUnit <= 0) { window.showToast("Dữ liệu không hợp lệ!", "error"); return; }

            const rate = state.trip.exchangeRate || 18500;
            const unit = currency === 'SGD' ? originalUnit * rate : originalUnit;

            let routes = [];
            if (plan.catId == 3) {
                for(let i=1; i<=qty; i++) {
                    const from = document.getElementById(`routeFrom_${i}`)?.value || '';
                    const to = document.getElementById(`routeTo_${i}`)?.value || '';
                    const price = parseFloat(document.getElementById(`routePrice_${i}`)?.value) || 0;
                    if (from || to) routes.push({ from, to, price });
                }
            }
            
            plan.desc = desc; plan.currency = currency; plan.originalUnit = originalUnit;
            plan.unit = unit; plan.qty = qty; plan.routes = routes;
            plan.mapLocation = mapLocation; plan.notes = notes;
            plan.total = (plan.catId == 3) ? unit : unit * qty;

            window.showToast('Cập nhật thành công!'); 
            window.saveLocalState();
            window.renderTab(); 
            window.viewPlanDetails(id);
        }

        window.saveNewPlan = function() {
            const catId = parseInt(document.getElementById('inpCatId').value);
            const desc = document.getElementById('inpDesc').value;
            const currency = document.getElementById('inpCurrency').value;
            const originalUnit = parseFloat(document.getElementById('inpUnit').value) || 0;
            const qty = parseFloat(document.getElementById('inpQty').value) || 0;
            const mapLocation = document.getElementById('inpMapLoc').value.trim();
            const notes = document.getElementById('inpPlanNotes').innerHTML;
            
            if(!desc || originalUnit <= 0) { window.showToast("Dữ liệu không hợp lệ!", "error"); return; }

            const rate = state.trip.exchangeRate || 18500;
            const unit = currency === 'SGD' ? originalUnit * rate : originalUnit;

            let routes = [];
            if (catId === 3) {
                for(let i=1; i<=qty; i++) {
                    const from = document.getElementById(`routeFrom_${i}`)?.value || '';
                    const to = document.getElementById(`routeTo_${i}`)?.value || '';
                    const price = parseFloat(document.getElementById(`routePrice_${i}`)?.value) || 0;
                    if (from || to) routes.push({ from, to, price });
                }
            }
            
            const total = (catId === 3) ? unit : unit * qty;
            const isFirstInCategory = !state.plans.some(p => p.catId === catId);

            state.plans.push({
                id: Date.now(), catId, desc, unit, qty, total, mapLocation, notes,
                currency, originalUnit, routes, selected: isFirstInCategory
            });

            window.closeModal(); window.showToast('Đã thêm thành công'); 
            window.saveLocalState();
            window.renderTab();
        };

            if (selectedPlans.length === 0) { window.showToast("Vui lòng tích chọn ít nhất 1 phương án!", "error"); return; }
            const total = selectedPlans.reduce((sum, p) => sum + p.total, 0);

            const m = `

                    <div class="space-y-4">

                        <button type="button" onclick="window.savePlanList()" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 text-sm">Lưu</button>
                    </div>
                </div>`;
            window.openModal(m);

        window.savePlanList = function() {
            const name = document.getElementById('inpPlanListName').value.trim();
            if (!name) return;
            const selectedPlans = state.plans.filter(p => p.selected);
            const totalCost = selectedPlans.reduce((sum, p) => sum + p.total, 0);
            if (!state.planLists) state.planLists = [];
            state.planLists.push({ id: Date.now(), name: name, planIds: selectedPlans.map(p => p.id), totalCost: totalCost, dateCreated: new Date().toISOString() });
            window.closeModal(); window.showToast("Đã lưu thành Kịch bản mới!", "success"); 
            window.saveLocalState();
            window.renderTab();
        }

        window.deletePlanList = function(id) {
            if(!window.checkAuth()) return;
            window.showConfirm("Xóa kịch bản / danh sách phương án này?", () => { 
                state.planLists = state.planLists.filter(l => l.id != id); 
                window.showToast("Đã xóa", "success"); 
                window.saveLocalState();
                window.renderTab(); 
            });
        }

        window.applyPlanList = function(id) {
            if(!window.checkAuth()) return;
            const list = state.planLists.find(l => l.id == id);
            if (!list) return;
            state.plans.forEach(p => p.selected = false);
            state.plans.forEach(p => { if (list.planIds.includes(p.id)) p.selected = true; });
            window.showToast(`Đã áp dụng cấu hình: ${list.name}`, 'success'); 
            window.saveLocalState();
            window.renderTab();
        }

        // Tích hợp yêu cầu: Gom nhóm & Nút Xuất File cho Kịch bản tại Modal Chi tiết Kịch Bản

            const plansInList = state.plans.filter(p => list.planIds.includes(p.id));

                            <h3 class="text-indigo-700 font-bold">${list.name}</h3>
                        </div>
                        <table class="w-full text-left min-w-[400px]">
                            <thead class="text-xs text-gray-500 uppercase bg-gray-50"><tr><th class="py-2 px-3 w-1/4">Hạng mục</th><th class="py-2 px-3 w-1/2">Chi tiết</th><th class="py-2 px-3 text-right w-1/4">Chi phí</th></tr></thead>

        window.exportPlanListExcel = function(id) {
            const list = state.planLists.find(l => l.id == id);
            if (!list) return;
            const plansInList = state.plans.filter(p => list.planIds.includes(p.id));

            try {
                const wb = XLSX.utils.book_new();
                const appName = (state.trip.name || 'NTU BRIDGE 2026').toUpperCase();
                const data = [
                    [`KỊCH BẢN CHI PHÍ ${appName}`],
                    ['Tên kịch bản:', list.name],
                    ['Tổng chi phí:', list.totalCost],
                    [],
                    ['Hạng mục', 'Mô tả chi tiết', 'Đơn giá', 'Số lượng', 'Thành tiền']
                ];

                plansInList.forEach(p => {
                    const cat = CATEGORIES.find(c => c.id == p.catId);
                    data.push([
                        cat ? cat.name.substring(3) : '',
                        p.desc,
                        p.unit,
                        p.qty,
                        p.total
                    ]);
                });

                const ws = XLSX.utils.aoa_to_sheet(data);
                XLSX.utils.book_append_sheet(wb, ws, "Kịch bản");
                XLSX.writeFile(wb, `KichBan_${list.name}.xlsx`);
                window.showToast("Đã tải file Excel Kịch bản", "success");
            } catch(e) { window.showToast("Lỗi xuất Excel!", "error"); }
        }

        window.exportPlanListPDF = function(id) {
            const list = state.planLists.find(l => l.id == id);
            if (!list) return;
            
            const element = document.getElementById(`export-list-content-${id}`);
            const titleBlock = element.querySelector('.print-header');
            if(titleBlock) titleBlock.classList.remove('hidden');

            var opt = {
                margin:       10,
                filename:     `KichBan_${list.name}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            window.showToast("Đang tạo PDF Kịch bản...", "info");
            html2pdf().set(opt).from(element).save().then(() => {
                if(titleBlock) titleBlock.classList.add('hidden');
                window.showToast("Đã tải PDF", "success");
            });
        }

        window.exportPlanListImage = function(id) {
            const list = state.planLists.find(l => l.id == id);
            if (!list) return;
            const element = document.getElementById(`export-list-content-${id}`);
            
            const titleBlock = element.querySelector('.print-header');
            if(titleBlock) titleBlock.classList.remove('hidden');

            window.showToast("Đang tạo ảnh Kịch bản...", "info");
            html2canvas(element, { scale: 2, useCORS: true, backgroundColor: '#ffffff' }).then(canvas => {
                if(titleBlock) titleBlock.classList.add('hidden');
                const link = document.createElement('a');
                link.download = `KichBan_${list.name}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                window.showToast("Đã tải Ảnh Kịch bản", "success");
            });
        }

                        <table class="w-full text-left border-collapse min-w-[600px] md:min-w-full">
                            <thead class="sticky top-0 bg-gray-50 z-10 shadow-sm border-b border-gray-200">
                                <tr class="text-xs text-gray-500 uppercase tracking-wider">
                                    <th class="p-3 md:p-4 w-24 md:w-28 whitespace-nowrap">Ngày</th>
