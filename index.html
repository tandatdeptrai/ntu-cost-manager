        window.resizeImage = function(file, maxSize, callback) {
            const reader = new FileReader();
            reader.onload = function (e) {
                const img = new Image(); img.onload = function () {
                    const canvas = document.createElement('canvas'); let width = img.width; let height = img.height;
                    if (width > height) { if (width > maxSize) { height *= maxSize / width; width = maxSize; } } else { if (height > maxSize) { width *= maxSize / height; height = maxSize; } }
                    canvas.width = width; canvas.height = height; const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height); callback(canvas.toDataURL('image/jpeg', 0.8)); 
                }; img.src = e.target.result;
            }; reader.readAsDataURL(file);
        }

        window.setupPasteHandler = function(elementId) {

                for (let i = 0; i < items.length; i++) {
                    if (items[i].type.indexOf("image") !== -1) {
                        hasImage = true; const blob = items[i].getAsFile();

                            const sel = window.getSelection();
                            if (sel.getRangeAt && sel.rangeCount) { let range = sel.getRangeAt(0); if (div.contains(range.commonAncestorContainer)) { range.deleteContents(); range.insertNode(img); range.setStartAfter(img); range.setEndAfter(img); sel.removeAllRanges(); sel.addRange(range); } else { div.appendChild(img); } } else { div.appendChild(img); }

        window.translateAIToEnglish = async function(dataObj) {
            const apiKey = ""; 
            if (!apiKey || apiKey.trim() === "") { window.showToast("Môi trường Public không có API Key AI. Sẽ sử dụng bản gốc.", "info"); return dataObj; }
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const prompt = `Translate the following Vietnamese text/data to professional English. Return EXACTLY a JSON object with the identical keys. \nData:\n${JSON.stringify(dataObj)}`;
            const payload = { contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" } };
            let retries = 3; let delay = 1000;
            while(retries > 0) {
                try {
                    const response = await fetch(url, { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify(payload) });
                    if (response.ok) { const result = await response.json(); let text = result.candidates?.[0]?.content?.parts?.[0]?.text; if(text) { text = text.replace(/```json/g, '').replace(/```/g, '').trim(); return JSON.parse(text); } }
                } catch(e) {}
                retries--; await new Promise(r => setTimeout(r, delay)); delay *= 2;
            }
            return dataObj; 
        }

                    try {
                        const parsed = JSON.parse(e.target.result); if (!parsed.trip || !parsed.plans) throw new Error("File không đúng định dạng");
                        if (parsed.invoices) parsed.invoices = parsed.invoices.map(inv => { if(inv.dataUrl && inv.dataUrl.length > 100000) return { ...inv, dataUrl: null, filename: inv.filename + " (Ảnh ẩn)" }; return inv; });

        // ==========================================
        // 7. MODULE: DASHBOARD
        // ==========================================
        window.renderDashboard = function(container) {

xt-2xl font-bold ${overBudget ? 'text-red-600' : 'text-gray-800'} truncate" title="${window.formatMoney(remaining)}">${window.formatMoney(remaining)}</h3></div></div><div class="bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-100 mb-6"><h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center"><i class="fa-solid fa-robot text-indigo-500 mr-2"></i> Trợ lý phân tích chuyến đi</h3><div class="grid grid-cols-1 md:grid-cols-3 gap-4"><div class="bg-indigo-50 rounded-xl p-4 border border-indigo-100 shadow-inner"><h4 class="font-bold text-indigo-800 mb-2"><i class="fa-solid fa-money-bill-trend-up mr-1.5"></i> Tình hình Tài chính</h4><p class="text-sm text-gray-700 leading-relaxed">${finStatus}</p></div><div class="bg-green-50 rounded-xl p-4 border border-green-100 shadow-inner"><h4 class="font-bold text-green-800 mb-2"><i class="fa-solid fa-file-invoice mr-1.5"></i> Trạng thái Chứng từ</h4><p class="text-sm text-gray-700 leading-relaxed">${invStatus}</p></div><div class="bg-orange-50 rounded-xl p-4 border border-orange-100 shadow-inner"><h4 class="font-bold text-orange-800 mb-2"><i class="fa-solid fa-route mr-1.5"></i> Tiến độ Lịch trình</h4><p class="text-sm text-gray-700 leading-relaxed">${timelineStatus}</p></div></div></div><div class="grid grid-cols-1 lg:grid-cols-2 gap-6"><div class="bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-100 w-full overflow-hidden"><h3 class="text-lg font-semibold mb-4 text-gray-700">Phân bổ Dự toán</h3><div class="relative h-64 w-full flex justify-center"><canvas id="pieChart"></canvas></div></div><div class="bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-100 w-full overflow-hidden"><h3 class="text-lg font-semibold mb-4 text-gray-700">Dự toán vs Thực tế</h3><div class="relative h-64 w-full"><canvas id="barChart"></canvas></div></div></div>`;
            window.renderCharts();
        }

        window.renderCharts = function() {
            const labels = CATEGORIES.map(c => c.name.substring(3)); 
            const estData = CATEGORIES.map(c => state.plans.filter(p => p.catId === c.id && p.selected).reduce((sum, p) => sum + p.total, 0));
            const actData = CATEGORIES.map(c => state.actuals.filter(a => a.catId === c.id).reduce((sum, a) => sum + a.amount, 0));

        window.editTripInfo = function() {

        // ==========================================
        // 8. MODULE: TIMELINE
        // ==========================================
        window.switchTimelineTab = function(type) { window.currentTimelineTab = type; window.renderTab(); }
        window.renderTimeline = function(container) {
            if (!state.actualTimeline) state.actualTimeline = [];
            const isPlanned = window.currentTimelineTab === 'planned'; const activeData = isPlanned ? state.timeline : state.actualTimeline;

            let html = `<div class="flex flex-col md:flex-row md:justify-between items-start md:items-center mb-6 gap-4"><div><h2 class="text-xl md:text-2xl font-bold text-gray-800">Lịch trình chuyến đi</h2><p class="text-xs md:text-sm text-gray-500">So sánh kế hoạch dự kiến và thực tế diễn ra.</p></div><div class="flex flex-col sm:flex-row w-full md:w-auto gap-2"><div class="flex bg-gray-200 rounded-lg p-1"><button onclick="window.switchTimelineTab('planned')" class="flex-1 px-4 py-1.5 text-sm font-medium rounded-md transition ${isPlanned ? 'bg-white shadow text-indigo-700' : 'text-gray-600 hover:text-gray-800'}">Dự kiến</button><button onclick="window.switchTimelineTab('actual')" class="flex-1 px-4 py-1.5 text-sm font-medium rounded-md transition ${!isPlanned ? 'bg-white shadow text-indigo-700' : 'text-gray-600 hover:text-gray-800'}">Thực tế</button></div></div></div><div class="flex justify-between items-center mb-4"><button type="button" onclick="window.openTimelineModal()" class="bg-indigo-600 text-white px-3 py-1.5 rounded-lg text-sm font-medium hover:bg-indigo-700 transition shadow-sm ${state.role !== 'admin' ? 'hidden' : ''}"><i class="fa-solid fa-plus mr-1"></i>Thêm hoạt động</button><div class="flex space-x-2"><button type="button" onclick="window.exportTimelinePDF()" class="bg-red-50 text-red-700 border border-red-200 px-3 py-1.5 rounded-lg text-xs font-medium hover:bg-red-100 transition shadow-sm"><i class="fa-solid fa-file-pdf mr-1"></i>PDF</button><button type="button" onclick="window.exportTimelineExcel()" class="bg-green-50 text-green-700 border border-green-200 px-3 py-1.5 rounded-lg text-xs font-medium hover:bg-green-100 transition shadow-sm"><i class="fa-solid fa-file-excel mr-1"></i>Excel</button></div></div>`;

            if(activeData.length === 0) return container.innerHTML = html + `<div class="text-center py-10 bg-white rounded-xl border border-dashed border-gray-300 text-gray-500 text-sm mx-4">Chưa có lịch trình nào ở mục này.</div>`;

            const sortedEvents = [...activeData].sort((a,b) => new Date(a.date + 'T' + (a.time||'00:00')) - new Date(b.date + 'T' + (b.time||'00:00')));
            const groupedEvents = {}; sortedEvents.forEach(ev => { if(!groupedEvents[ev.date]) groupedEvents[ev.date] = []; groupedEvents[ev.date].push(ev); });

            html += `<div id="timeline-export-target" class="max-w-4xl mx-auto px-2 md:px-0 py-4 bg-white md:bg-transparent rounded-xl"><div class="relative border-l-2 ${isPlanned ? 'border-indigo-200' : 'border-orange-200'} ml-3 md:ml-4"><div class="hidden print-header text-center mb-8"><h2 class="text-2xl font-bold uppercase mb-2">NHẬT KÝ HÀNH TRÌNH</h2><h3 class="text-lg font-bold text-gray-600">(${isPlanned ? 'LỊCH TRÌNH DỰ KIẾN' : 'THỰC TẾ DIỄN RA'})</h3></div>`;

            for (const [date, events] of Object.entries(groupedEvents)) {

                });
                html += `</div></div>`;

            container.innerHTML = html + `</div></div>`;

        window.openTimelineModal = function(id = null) {

        window.saveTimelineEvent = function(id) {

            const date = document.getElementById('inpTlDate').value; const time = document.getElementById('inpTlTime').value; const title = document.getElementById('inpTlTitle').value.trim(); const location = document.getElementById('inpTlLoc').value.trim(); const notes = document.getElementById('inpTlNotes').value.trim();
            let planId = null; let image = ''; if (isPlanned) planId = document.getElementById('inpTlPlanId').value ? parseInt(document.getElementById('inpTlPlanId').value) : null; else image = document.getElementById('inpTlImage').innerHTML;
            if(!title || !date) return window.showToast("Vui lòng nhập Ngày và Tên!", "error");

            if (id) { const ev = activeData.find(t => t.id == id); if(ev) { ev.date = date; ev.time = time; ev.title = title; ev.location = location; ev.notes = notes; if (isPlanned) ev.planId = planId; else ev.image = image; } window.showToast("Đã cập nhật lịch trình"); }

        window.exportTimelineExcel = function() {
            const activeData = window.currentTimelineTab === 'planned' ? state.timeline : state.actualTimeline; if(activeData.length === 0) return window.showToast("Không có dữ liệu để xuất", "error");

                catPlans.forEach(plan => { html += `<tr class="${plan.selected ? 'bg-indigo-50/50' : 'hover:bg-gray-50'} transition"><td class="p-3 text-center"><input type="checkbox" ${plan.selected ? 'checked' : ''} onchange="window.togglePlanSelection(${plan.id})" class="w-4 h-4 text-indigo-600 focus:ring-indigo-500 rounded cursor-pointer" ${state.role !== 'admin' ? 'disabled' : ''}></td><td class="p-3 font-medium text-gray-800 break-words">${plan.desc}${plan.notes ? `<i class="fa-solid fa-sticky-note text-yellow-500 ml-1"></i>` : ''}</td><td class="p-3 text-right">${plan.currency === 'SGD' ? `<div class="font-bold text-gray-800">${window.formatSGD(plan.originalUnit)}</div><div class="text-[10px] text-gray-400 font-medium">~ ${window.formatMoney(plan.unit)}</div>` : `<div class="font-bold text-gray-800">${window.formatMoney(plan.unit)}</div>`}</td><td class="p-3 text-center text-gray-600">${plan.qty}</td><td class="p-3 text-right font-bold ${plan.selected ? 'text-indigo-700' : 'text-gray-800'}">${window.formatMoney(plan.total)}</td><td class="p-3 text-center flex justify-center space-x-2"><button type="button" onclick="window.viewPlanDetails(${plan.id})" class="text-blue-500 hover:text-blue-700 p-1" title="Chi tiết"><i class="fa-solid fa-map-location-dot pointer-events-none"></i></button><button type="button" onclick="window.deletePlan(${plan.id})" class="text-red-400 hover:text-red-600 p-1 ${state.role !== 'admin' ? 'hidden' : ''}" title="Xóa"><i class="fa-solid fa-trash pointer-events-none"></i></button></td></tr>`; });

xt-white flex justify-between items-center"><span class="text-sm">Tổng dự kiến:</span><span class="font-bold text-lg md:text-2xl">${window.formatMoney(plan.total)}</span></div></div>${routeHtml}${notesHtml}<h4 class="font-bold text-gray-800 mb-2 md:mb-3 text-sm md:text-base"><i class="fa-solid fa-location-dot text-red-500 mr-2"></i>Bản đồ: ${searchQuery}</h4><div class="w-full h-40 md:h-48 bg-gray-200 rounded-xl overflow-hidden relative shadow-inner border border-gray-300"><iframe width="100%" height="100%" frameborder="0" style="border:0" src="${embedUrl}" allowfullscreen></iframe></div></div></div>`);

            let catOptions = CATEGORIES.map(c => `<option value="${c.id}" ${c.id == plan.catId ? 'selected' : ''}>${c.name}</option>`).join('');
            let initialRoutesHtml = ''; if (plan.catId === 3 && plan.routes) { plan.routes.forEach((r, idx) => { let i = idx + 1; initialRoutesHtml += `<div class="flex flex-col sm:flex-row space-y-2 sm:space-y-0 sm:space-x-2 items-start sm:items-center mb-2 bg-white p-2 rounded border border-blue-50"><span class="text-xs font-bold text-blue-700 w-full sm:w-4 hidden sm:block">${i}.</span><div class="flex w-full space-x-2"><input type="text" id="routeFrom_${i}" value="${r.from || ''}" placeholder="Từ" class="w-2/5 rounded-md border-blue-200 shadow-sm p-2 text-xs md:text-sm focus:border-blue-500"><i class="fa-solid fa-arrow-right text-blue-400 text-xs mt-3"></i><input type="text" id="routeTo_${i}" value="${r.to || ''}" placeholder="Đến" class="w-2/5 rounded-md border-blue-200 shadow-sm p-2 text-xs md:text-sm focus:border-blue-500"><input type="number" id="routePrice_${i}" value="${r.price || 0}" oninput="window.calcTotalFromRoutes()" placeholder="Giá" class="w-1/5 rounded-md border-blue-200 shadow-sm p-2 text-xs md:text-sm focus:border-blue-500 font-bold text-blue-700 px-1"></div></div>`; }); }
            window.openModal(`<div class="p-4 md:p-6 max-h-[85vh] flex flex-col"><h3 class="text-lg md:text-xl font-bold mb-4 sticky top-0 bg-white z-10 pb-2 border-b">Sửa phương án</h3><div class="space-y-4 overflow-y-auto flex-1 pr-1"><div><label class="block text-xs md:text-sm font-medium text-gray-700 mb-1">Hạng mục</label><select id="inpCatId" class="block w-full rounded-md border-gray-300 shadow-sm p-2 md:p-3 border bg-gray-100 text-gray-500 font-bold text-sm md:text-base" disabled>${catOptions}</select></div><div><label class="block text-xs md:text-sm font-medium text-gray-700 mb-1">Mô tả phương án</label><input type="text" id="inpDesc" value="${plan.desc}" class="block w-full rounded-md border-gray-300 shadow-sm p-2 md:p-3 border focus:border-indigo-500 text-sm md:text-base"></div><div class="flex flex-col sm:flex-row gap-3"><div class="w-full sm:w-1/3"><label class="block text-xs md:text-sm font-medium text-gray-700 mb-1">Loại tiền</label><select id="inpCurrency" onchange="window.calcTotal()" class="block w-full rounded-md border-gray-300 shadow-sm p-2 md:p-3 border focus:border-indigo-500 text-sm md:text-base"><option value="VND" ${plan.currency === 'VND' ? 'selected' : ''}>VNĐ</option><option value="SGD" ${plan.currency === 'SGD' ? 'selected' : ''}>SGD (Đô Sing)</option></select></div><div class="w-full sm:w-1/3"><label class="block text-xs md:text-sm font-medium text-gray-700 mb-1">Đơn giá</label><input type="number" id="inpUnit" value="${plan.originalUnit}" oninput="window.calcTotal()" class="block w-full rounded-md border-gray-300 shadow-sm p-2 md:p-3 border focus:border-indigo-500 text-sm md:text-base" ${plan.catId === 3 ? 'readonly' : ''}></div><div class="w-full sm:w-1/3"><label class="block text-xs md:text-sm font-medium text-gray-700 mb-1">Số lượng</label><input type="number" id="inpQty" value="${plan.qty}" oninput="window.calcTotal(); window.renderRouteInputs();" class="block w-full rounded-md border-gray-300 shadow-sm p-2 md:p-3 border focus:border-indigo-500 text-sm md:text-base"></div></div><div id="routeSection" class="${plan.catId === 3 ? '' : 'hidden'} bg-blue-50 p-3 md:p-4 rounded-xl border border-blue-100"><label class="block text-xs md:text-sm font-bold text-blue-800 mb-2"><i class="fa-solid fa-map-location-dot mr-1"></i>Chi tiết lộ trình</label><div id="routeInputsContainer" class="space-y-2 max-h-[150px] md:max-h-40 overflow-y-auto pr-1 md:pr-2 table-scroll-container">${initialRoutesHtml}</div></div><div><label class="block text-xs md:text-sm font-medium text-gray-700 mb-1">Vị trí Map (Tùy chọn)</label><input type="text" id="inpMapLoc" value="${plan.mapLocation||''}" class="block w-full rounded-md border-gray-300 shadow-sm p-2 md:p-3 border focus:border-indigo-500 text-sm md:text-base"></div><div><label class="block text-xs md:text-sm font-medium text-gray-700 mb-1">Ghi chú & Hình ảnh <span class="text-indigo-600">(Ctrl+V dán ảnh)</span></label><div id="inpPlanNotes" contenteditable="true" class="block w-full min-h-[80px] max-h-[250px] overflow-y-auto rounded-md border border-gray-300 shadow-sm p-2 md:p-3 bg-white outline-none">${plan.notes||''}</div></div><div><label class="block text-xs md:text-sm font-medium text-gray-700 mb-1">Tổng cộng VNĐ</label><input type="text" id="inpTotal" value="${window.formatMoney(plan.total)}" readonly class="block w-full rounded-md bg-gray-50 border-gray-300 shadow-sm p-2 md:p-3 border text-gray-600 font-bold text-sm md:text-base"></div></div><div class="mt-4 md:mt-6 pt-4 border-t flex justify-end space-x-3 sticky bottom-0 bg-white z-10"><button type="button" onclick="window.viewPlanDetails(${plan.id})" class="px-4 py-2 border rounded-md text-gray-600 hover:bg-gray-50 text-sm md:text-base">Hủy</button><button type="button" onclick="window.updatePlan(${plan.id})" class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 text-sm md:text-base">Lưu</button></div></div>`);
            setTimeout(() => { window.setupPasteHandler('inpPlanNotes'); if (plan.catId === 3) window.renderRouteInputs(); }, 50);
        }

        window.toggleRouteSection = function() { const catId = document.getElementById('inpCatId').value; const routeSec = document.getElementById('routeSection'); if (catId == '3') { routeSec.classList.remove('hidden'); window.renderRouteInputs(); } else { routeSec.classList.add('hidden'); } };
        window.renderRouteInputs = function() { const catId = document.getElementById('inpCatId').value; if(catId != '3') return; const count = Math.max(1, parseInt(document.getElementById('inpQty').value) || 1); const container = document.getElementById('routeInputsContainer'); let existingRoutes = []; for(let i=1; i<=container.children.length; i++) { existingRoutes.push({ from: document.getElementById(`routeFrom_${i}`)?.value || '', to: document.getElementById(`routeTo_${i}`)?.value || '', price: parseFloat(document.getElementById(`routePrice_${i}`)?.value) || 0 }); } let html = ''; for(let i=1; i<=count; i++) { const fromVal = existingRoutes[i-1]?.from || ''; const toVal = existingRoutes[i-1]?.to || ''; const priceVal = existingRoutes[i-1]?.price || ''; html += `<div class="flex flex-col sm:flex-row space-y-2 sm:space-y-0 sm:space-x-2 items-start sm:items-center mb-2 bg-white p-2 rounded border border-blue-50"><span class="text-xs font-bold text-blue-700 w-full sm:w-4 hidden sm:block">${i}.</span><div class="flex w-full space-x-2"><input type="text" id="routeFrom_${i}" value="${fromVal}" placeholder="Từ" class="w-2/5 rounded-md border-blue-200 shadow-sm p-2 text-xs md:text-sm focus:border-blue-500"><i class="fa-solid fa-arrow-right text-blue-400 text-xs mt-3"></i><input type="text" id="routeTo_${i}" value="${toVal}" placeholder="Đến" class="w-2/5 rounded-md border-blue-200 shadow-sm p-2 text-xs md:text-sm focus:border-blue-500"><input type="number" id="routePrice_${i}" value="${priceVal}" oninput="window.calcTotalFromRoutes()" placeholder="Giá" class="w-1/5 rounded-md border-blue-200 shadow-sm p-2 text-xs md:text-sm focus:border-blue-500 font-bold text-blue-700 px-1"></div></div>`; } container.innerHTML = html; setTimeout(window.calcTotalFromRoutes, 50); };
        window.calcTotalFromRoutes = function() { if(document.getElementById('inpCatId').value != '3') return; const count = parseInt(document.getElementById('inpQty').value) || 0; let totalUnitStr = 0; for(let i=1; i<=count; i++) totalUnitStr += (parseFloat(document.getElementById(`routePrice_${i}`)?.value) || 0); const unitInput = document.getElementById('inpUnit'); if(unitInput) { unitInput.value = totalUnitStr; window.calcTotal(); } };
        window.calcTotal = function() { const catId = document.getElementById('inpCatId').value; const u = parseFloat(document.getElementById('inpUnit').value) || 0; const curr = document.getElementById('inpCurrency').value; const rate = state.trip.exchangeRate || 18500; const vndUnit = curr === 'SGD' ? u * rate : u; let totalVnd = (catId == '3') ? vndUnit : vndUnit * (parseFloat(document.getElementById('inpQty').value) || 0); document.getElementById('inpTotal').value = window.formatMoney(totalVnd); };

        window.updatePlan = function(id) {
            const plan = state.plans.find(p => p.id == id); if(!plan) return;
            const desc = document.getElementById('inpDesc').value; const currency = document.getElementById('inpCurrency').value; const originalUnit = parseFloat(document.getElementById('inpUnit').value) || 0; const qty = parseFloat(document.getElementById('inpQty').value) || 0; const mapLocation = document.getElementById('inpMapLoc').value.trim(); const notes = document.getElementById('inpPlanNotes').innerHTML;
            if(!desc || originalUnit <= 0) return window.showToast("Dữ liệu không hợp lệ!", "error");
            const rate = state.trip.exchangeRate || 18500; const unit = currency === 'SGD' ? originalUnit * rate : originalUnit;
            let routes = []; if (plan.catId == 3) { for(let i=1; i<=qty; i++) { const from = document.getElementById(`routeFrom_${i}`)?.value || ''; const to = document.getElementById(`routeTo_${i}`)?.value || ''; const price = parseFloat(document.getElementById(`routePrice_${i}`)?.value) || 0; if (from || to) routes.push({ from, to, price }); } }
            plan.desc = desc; plan.currency = currency; plan.originalUnit = originalUnit; plan.unit = unit; plan.qty = qty; plan.routes = routes; plan.mapLocation = mapLocation; plan.notes = notes; plan.total = (plan.catId == 3) ? unit : unit * qty;
            window.showToast('Cập nhật thành công!'); window.saveLocalState(); window.renderTab(); window.viewPlanDetails(id);
        }
        window.saveNewPlan = function() {
            const catId = parseInt(document.getElementById('inpCatId').value); const desc = document.getElementById('inpDesc').value; const currency = document.getElementById('inpCurrency').value; const originalUnit = parseFloat(document.getElementById('inpUnit').value) || 0; const qty = parseFloat(document.getElementById('inpQty').value) || 0; const mapLocation = document.getElementById('inpMapLoc').value.trim(); const notes = document.getElementById('inpPlanNotes').innerHTML;
            if(!desc || originalUnit <= 0) return window.showToast("Dữ liệu không hợp lệ!", "error");
            const rate = state.trip.exchangeRate || 18500; const unit = currency === 'SGD' ? originalUnit * rate : originalUnit;
            let routes = []; if (catId === 3) { for(let i=1; i<=qty; i++) { const from = document.getElementById(`routeFrom_${i}`)?.value || ''; const to = document.getElementById(`routeTo_${i}`)?.value || ''; const price = parseFloat(document.getElementById(`routePrice_${i}`)?.value) || 0; if (from || to) routes.push({ from, to, price }); } }
            state.plans.push({ id: Date.now(), catId, desc, unit, qty, total: (catId === 3) ? unit : unit * qty, mapLocation, notes, currency, originalUnit, routes, selected: !state.plans.some(p => p.catId === catId) });
            window.closeModal(); window.showToast('Đã thêm thành công'); window.saveLocalState(); window.renderTab();
        };

        window.promptSavePlanList = function() {
            if(!window.checkAuth()) return; const sel = state.plans.filter(p => p.selected); if (sel.length === 0) return window.showToast("Vui lòng chọn ít nhất 1 phương án!", "error");
            window.openModal(`<div class="p-4 md:p-6"><h3 class="text-lg md:text-xl font-bold mb-4 text-blue-800">Lưu thành Kịch bản</h3><p class="text-sm text-gray-600 mb-4">Bạn đang chọn <strong>${sel.length}</strong> phương án. Tổng chi phí: <strong class="text-indigo-700">${window.formatMoney(sel.reduce((s, p) => s + p.total, 0))}</strong>.</p><div class="space-y-4"><div><label class="block text-xs md:text-sm font-medium mb-1">Tên Kịch bản</label><input type="text" id="inpPlanListName" placeholder="VD: Phương án tiết kiệm" class="block w-full rounded-md border p-2 text-sm"></div></div><div class="mt-6 flex justify-end space-x-3"><button onclick="window.closeModal()" class="px-4 py-2 border rounded-md text-sm">Hủy</button><button onclick="window.savePlanList()" class="px-4 py-2 bg-blue-600 text-white rounded-md text-sm">Lưu</button></div></div>`);
        }
        window.savePlanList = function() { const n = document.getElementById('inpPlanListName').value.trim(); if (!n) return; const sel = state.plans.filter(p => p.selected); state.planLists.push({ id: Date.now(), name: n, planIds: sel.map(p => p.id), totalCost: sel.reduce((s, p) => s + p.total, 0), dateCreated: new Date().toISOString() }); window.closeModal(); window.showToast("Đã lưu Kịch bản!", "success"); window.saveLocalState(); window.renderTab(); }
        window.deletePlanList = function(id) { if(!window.checkAuth()) return; window.showConfirm("Xóa kịch bản này?", () => { state.planLists = state.planLists.filter(l => l.id != id); window.showToast("Đã xóa", "success"); window.saveLocalState(); window.renderTab(); }); }
        window.applyPlanList = function(id) { if(!window.checkAuth()) return; const l = state.planLists.find(x => x.id == id); if (!l) return; state.plans.forEach(p => p.selected = l.planIds.includes(p.id)); window.showToast(`Đã áp dụng: ${l.name}`, 'success'); window.saveLocalState(); window.renderTab(); }
        window.viewPlanList = function(id) {
            const list = state.planLists.find(l => l.id == id); if (!list) return; const plansInList = state.plans.filter(p => list.planIds.includes(p.id)); const grouped = {}; plansInList.forEach(p => { if(!grouped[p.catId]) grouped[p.catId] = []; grouped[p.catId].push(p); });
            let tbody = ''; CATEGORIES.forEach(cat => { if(grouped[cat.id]) { tbody += `<tr class="bg-indigo-50 border-b"><td colspan="2" class="py-2 px-3 text-xs md:text-sm font-bold text-indigo-800"><i class="fa-solid ${cat.icon} mr-2"></i>${cat.name.substring(3)}</td><td class="py-2 px-3 text-xs md:text-sm text-right font-bold text-indigo-800">${window.formatMoney(grouped[cat.id].reduce((s, p) => s + p.total, 0))}</td></tr>`; grouped[cat.id].forEach(p => { tbody += `<tr class="border-b hover:bg-gray-50"><td class="py-2 px-3 italic"></td><td class="py-2 px-3 text-xs md:text-sm text-gray-800"><i class="fa-solid fa-angle-right text-gray-300 mr-2"></i>${p.desc}</td><td class="py-2 px-3 text-xs md:text-sm text-right font-medium">${window.formatMoney(p.total)}</td></tr>`; }); } });
            window.openModal(`<div class="p-4 md:p-6 max-h-[85vh] flex flex-col"><div class="flex justify-between mb-4 sticky top-0 bg-white z-10 pb-2 border-b"><h3 class="text-base md:text-lg font-bold"><i class="fa-solid fa-list-check text-blue-600 mr-2"></i>${list.name}</h3><button onclick="window.closeModal()"><i class="fa-solid fa-xmark text-xl"></i></button></div><div id="export-list-content-${id}" class="overflow-y-auto flex-1 bg-white p-2"><div class="text-center mb-4 hidden print-header"><h2 class="text-xl font-bold uppercase">CHI TIẾT KỊCH BẢN CHI PHÍ</h2><h3 class="text-indigo-700 font-bold">${list.name}</h3></div><table class="w-full text-left min-w-[400px]"><thead class="text-xs text-gray-500 uppercase bg-gray-50"><tr><th class="py-2 px-3 w-1/4">Hạng mục</th><th class="py-2 px-3 w-1/2">Chi tiết</th><th class="py-2 px-3 text-right w-1/4">Chi phí</th></tr></thead><tbody>${tbody}</tbody></table><div class="mt-4 pt-4 border-t flex justify-between"><span class="font-medium">Tổng chi phí:</span><span class="text-xl font-bold text-indigo-700">${window.formatMoney(list.totalCost)}</span></div></div><div class="mt-4 pt-4 border-t flex flex-col sm:flex-row justify-between items-center sticky bottom-0 bg-white z-10 gap-2"><div class="flex space-x-2"><button onclick="window.exportPlanListImage(${id})" class="bg-emerald-50 text-emerald-700 px-3 py-1.5 rounded text-xs border"><i class="fa-solid fa-image"></i> Xuất Ảnh</button><button onclick="window.exportPlanListPDF(${id})" class="bg-red-50 text-red-700 px-3 py-1.5 rounded text-xs border"><i class="fa-solid fa-file-pdf"></i> Xuất PDF</button><button onclick="window.exportPlanListExcel(${id})" class="bg-green-50 text-green-700 px-3 py-1.5 rounded text-xs border"><i class="fa-solid fa-file-excel"></i> Xuất Excel</button></div></div></div>`);
        }
        window.exportPlanListExcel = function(id) { const list = state.planLists.find(l => l.id == id); if (!list) return; const plansInList = state.plans.filter(p => list.planIds.includes(p.id)); const wb = XLSX.utils.book_new(); const data = [[`KỊCH BẢN CHI PHÍ`],['Tên:', list.name],['Tổng:', list.totalCost],[],['Hạng mục', 'Chi tiết', 'Đơn giá', 'SL', 'Thành tiền']]; plansInList.forEach(p => { const cat = CATEGORIES.find(c => c.id == p.catId); data.push([cat ? cat.name.substring(3) : '', p.desc, p.unit, p.qty, p.total]); }); XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(data), "Kịch bản"); XLSX.writeFile(wb, `KichBan_${list.name}.xlsx`); }
        window.exportPlanListPDF = function(id) { const list = state.planLists.find(l => l.id == id); const el = document.getElementById(`export-list-content-${id}`); el.querySelector('.print-header').classList.remove('hidden'); html2pdf().set({margin:10, filename:`KichBan_${list.name}.pdf`, html2canvas:{scale:2}}).from(el).save().then(()=>{el.querySelector('.print-header').classList.add('hidden');}); }
        window.exportPlanListImage = function(id) { const list = state.planLists.find(l => l.id == id); const el = document.getElementById(`export-list-content-${id}`); el.querySelector('.print-header').classList.remove('hidden'); html2canvas(el, {scale:2, backgroundColor:'#fff'}).then(c=>{el.querySelector('.print-header').classList.add('hidden'); const l=document.createElement('a'); l.download=`KichBan_${list.name}.png`; l.href=c.toDataURL(); l.click();}); }

        // ==========================================
        // 10. MODULE: ACTUAL EXPENSES
        // ==========================================
        window.renderActual = function(container) {
            let totalActual = state.actuals.reduce((sum, a) => sum + a.amount, 0);
            let html = `<div class="flex flex-col sm:flex-row sm:justify-between mb-6 gap-4"><div><h2 class="text-xl md:text-2xl font-bold">Chi phí Thực tế</h2></div><button onclick="window.openActualModal()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg ${state.role!=='admin'?'hidden':''}"><i class="fa-solid fa-plus mr-2"></i>Ghi nhận chi phí</button></div><div class="bg-white rounded-xl shadow-sm border overflow-hidden w-full"><div class="table-scroll-container overflow-x-auto"><table class="w-full text-left border-collapse min-w-[600px]"><thead class="bg-gray-50 border-b"><tr class="text-xs text-gray-500 uppercase"><th class="p-4">Ngày</th><th class="p-4">Hạng mục</th><th class="p-4">Diễn giải</th><th class="p-4 text-right">Số tiền</th><th class="p-4 text-center">Hóa đơn</th><th class="p-4 text-center">Xóa</th></tr></thead><tbody class="divide-y divide-gray-100 text-sm">`;
            if(state.actuals.length === 0) html += `<tr><td colspan="6" class="p-8 text-center text-gray-400">Chưa có khoản chi nào.</td></tr>`;
            const sortedActuals = [...state.actuals].sort((a,b) => new Date(b.date) - new Date(a.date));
            sortedActuals.forEach(act => {
                const cat = CATEGORIES.find(c => c.id === act.catId); const invCount = state.invoices.filter(i => i.expenseId === act.id).length;
                const invoiceBtn = invCount > 0 ? `<button onclick="window.viewActualDetails(${act.id}); event.stopPropagation();" class="bg-green-50 text-green-700 py-1 px-2 rounded-lg text-xs border"><i class="fa-solid fa-check"></i> Đã có (${invCount})</button>` : `<button onclick="window.openUploadModal(${act.id}); event.stopPropagation();" class="bg-gray-50 border py-1 px-2 rounded-lg text-xs ${state.role!=='admin'?'hidden':''}"><i class="fa-solid fa-upload"></i> Up HĐ</button>`;
                html += `<tr class="hover:bg-gray-50 cursor-pointer" onclick="window.viewActualDetails(${act.id})"><td class="p-4">${window.formatDate(act.date)}</td><td class="p-4 font-medium"><i class="fa-solid ${cat.icon} text-gray-400 mr-2"></i>${cat.name.substring(3)}</td><td class="p-4">${act.desc}${act.notes?'<i class="fa-solid fa-file-lines text-blue-400 ml-1"></i>':''}</td><td class="p-4 text-right">${act.currency==='SGD'?`<div class="font-bold">${window.formatSGD(act.originalAmount)}</div><div class="text-[10px] text-gray-400">~ ${window.formatMoney(act.amount)}</div>`:`<div class="font-bold">${window.formatMoney(act.amount)}</div>`}</td><td class="p-4 text-center">${invoiceBtn}</td><td class="p-4 text-center"><button onclick="event.stopPropagation(); window.deleteActual(${act.id})" class="text-red-400 hover:text-red-600 ${state.role!=='admin'?'hidden':''}"><i class="fa-solid fa-trash pointer-events-none"></i></button></td></tr>`;
            });
            html += `</tbody><tfoot class="bg-gray-50 border-t"><tr><td colspan="3" class="p-4 text-right font-bold text-gray-600">Tổng chi thực tế:</td><td class="p-4 text-right font-bold text-indigo-700 text-lg">${window.formatMoney(totalActual)}</td><td colspan="2"></td></tr></tfoot></table></div></div>`;
            container.innerHTML = html;
        }

        window.openActualModal = function(id = null) {
            if(!window.checkAuth()) return;
            const cOpts = CATEGORIES.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            let act = { date: new Date().toISOString().split('T')[0], catId: 1, desc: '', currency: 'VND', originalAmount: '', notes: '' };

            window.openModal(`<div class="p-4 md:p-6 max-h-[85vh] flex flex-col"><h3 class="text-xl font-bold mb-4 border-b pb-2">${id ? 'Sửa khoản chi' : 'Ghi nhận chi phí'}</h3><div class="space-y-4 overflow-y-auto pr-1"><div class="flex gap-3"><input type="date" id="inpActDate" value="${act.date}" class="w-1/2 p-2 border rounded"><select id="inpActCatId" class="w-1/2 p-2 border rounded">${cOpts}</select></div><input type="text" id="inpActDesc" value="${act.desc}" placeholder="Diễn giải chi tiết" class="w-full p-2 border rounded"><div class="flex gap-3"><select id="inpActCurrency" class="w-1/3 p-2 border rounded"><option value="VND" ${act.currency==='VND'?'selected':''}>VNĐ</option><option value="SGD" ${act.currency==='SGD'?'selected':''}>SGD</option></select><input type="number" id="inpActAmount" value="${act.originalAmount}" placeholder="Số tiền" class="w-2/3 p-2 border rounded font-bold text-indigo-700"></div><div id="inpActNotes" contenteditable="true" class="w-full min-h-[80px] p-2 border rounded bg-white" placeholder="Ghi chú & Hình ảnh (Ctrl+V)">${act.notes||''}</div></div><div class="mt-4 border-t pt-4 text-right"><button onclick="window.closeModal()" class="px-4 py-2 border rounded mr-2">Hủy</button><button onclick="window.saveActual(${id||'null'})" class="px-4 py-2 bg-indigo-600 text-white rounded">Lưu</button></div></div>`);
            setTimeout(() => window.setupPasteHandler('inpActNotes'), 50);
        }

        window.saveActual = function(id) {
            const date=document.getElementById('inpActDate').value; const catId=parseInt(document.getElementById('inpActCatId').value); const desc=document.getElementById('inpActDesc').value.trim(); const currency=document.getElementById('inpActCurrency').value; const oAmt=parseFloat(document.getElementById('inpActAmount').value)||0; const notes=document.getElementById('inpActNotes').innerHTML;
            if(!desc||oAmt<=0) return window.showToast("Nhập thiếu!", "error");
            const amt = currency==='SGD'?oAmt*state.trip.exchangeRate:oAmt;
            if(id){ const ix=state.actuals.findIndex(a=>a.id==id); state.actuals[ix]={id,catId,desc,amount:amt,date,currency,originalAmount:oAmt,notes}; } else state.actuals.push({id:Date.now(),catId,desc,amount:amt,date,currency,originalAmount:oAmt,notes});
            window.saveLocalState(); window.closeModal(); window.renderTab();
        }

        window.deleteActual = function(id) {
            if(!window.checkAuth()) return; window.showConfirm('Xóa khoản chi?', () => { state.actuals=state.actuals.filter(a=>a.id!=id); state.invoices=state.invoices.filter(i=>i.expenseId!=id); window.saveLocalState(); window.renderTab(); });
        }

        window.viewActualDetails = function(id) {
            const act = state.actuals.find(a => a.id == id); if (!act) return; const cat = CATEGORIES.find(c => c.id == act.catId);
            const invs = state.invoices.filter(i => i.expenseId == id);
            let invHtml = invs.length>0 ? `<div class="flex flex-wrap gap-3">${invs.map(i=>`<div class="relative group border rounded w-24 h-24"><a href="${i.dataUrl}" target="_blank"><img src="${i.dataUrl}" class="w-full h-full object-cover"></a><button onclick="window.deleteInvoice(${i.id})" class="absolute top-1 right-1 bg-red-50 text-red-600 w-6 h-6 rounded-full opacity-0 group-hover:opacity-100 ${state.role!=='admin'?'hidden':''}"><i class="fa-solid fa-xmark"></i></button></div>`).join('')}</div>` : `<div class="bg-gray-50 border-dashed border p-4 text-center"><button onclick="window.openUploadModal(${act.id})" class="bg-white border px-3 py-1 rounded text-sm ${state.role!=='admin'?'hidden':''}"><i class="fa-solid fa-upload"></i> Tải Hóa đơn</button></div>`;
            window.openModal(`<div class="p-0 flex flex-col max-h-[85vh]"><div class="p-4 border-b bg-gray-50 flex justify-between"><h3 class="font-bold text-indigo-700"><i class="fa-solid ${cat.icon} mr-2"></i>Chi tiết khoản chi</h3><div class="flex gap-2"><button onclick="window.openActualModal(${act.id})" class="text-indigo-600 px-3 py-1 bg-indigo-100 rounded font-bold ${state.role!=='admin'?'hidden':''}">Sửa</button><button onclick="window.closeModal()"><i class="fa-solid fa-xmark text-xl"></i></button></div></div><div class="p-6 overflow-y-auto"><p class="text-xs text-gray-500">${window.formatDate(act.date)}</p><h4 class="text-lg font-bold">${act.desc}</h4><div class="bg-indigo-50 p-4 rounded-xl border my-4"><span class="font-bold text-xl text-indigo-700">${act.currency==='SGD'?`${window.formatSGD(act.originalAmount)} <span class="text-sm">(~${window.formatMoney(act.amount)})</span>`:window.formatMoney(act.amount)}</span></div>${act.notes?`<div class="bg-yellow-50 p-3 rounded border mb-4">${act.notes}</div>`:''}<h4 class="font-bold flex justify-between items-center mb-2"><span><i class="fa-solid fa-file-invoice text-blue-500 mr-2"></i>Chứng từ</span><button onclick="window.openUploadModal(${act.id})" class="text-xs text-blue-600 ${state.role!=='admin'||invs.length===0?'hidden':''}">+ Thêm</button></h4>${invHtml}</div></div>`);
        }

        // ==========================================
        // 11. MODULE: INVOICES
        // ==========================================
        window.renderInvoices = function(container) {
            let html = `<div class="flex justify-between items-center mb-6"><h2 class="text-2xl font-bold">Hóa đơn</h2><button onclick="window.openUploadModal()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm ${state.role!=='admin'?'hidden':''}"><i class="fa-solid fa-upload"></i> Upload</button></div><div class="grid grid-cols-2 md:grid-cols-4 gap-4">`;
            if(state.invoices.length === 0) html += `<div class="col-span-full text-center py-10 border-dashed border-2 rounded-xl text-gray-500">Chưa có hóa đơn</div>`;
            state.invoices.forEach(inv => { const exp = state.actuals.find(a=>a.id===inv.expenseId); const d = exp?exp.desc:'Đã xóa'; html += `<div class="bg-white rounded-xl shadow border overflow-hidden group"><div class="h-32 relative"><img src="${inv.dataUrl}" class="w-full h-full object-cover cursor-pointer" onclick="window.viewActualDetails(${inv.expenseId})"><div class="absolute top-2 right-2 flex gap-1 opacity-0 group-hover:opacity-100"><a href="${inv.dataUrl}" download="${inv.filename}" class="bg-white w-7 h-7 rounded-full flex items-center justify-center"><i class="fa-solid fa-download text-xs"></i></a><button onclick="window.deleteInvoice(${inv.id})" class="bg-red-50 text-red-600 w-7 h-7 rounded-full flex items-center justify-center ${state.role!=='admin'?'hidden':''}"><i class="fa-solid fa-trash text-xs"></i></button></div></div><div class="p-2 text-xs" onclick="window.viewActualDetails(${inv.expenseId})"><p class="text-[10px] text-gray-500">${window.formatDate(inv.date)}</p><h4 class="font-bold truncate">${d}</h4></div></div>`; });
            container.innerHTML = html + `</div>`;
        }

        window.openUploadModal = function(id = null) {
            if(!window.checkAuth()) return;
            if(state.actuals.length === 0) return window.showToast("Cần có khoản chi thực tế trước!", "error");
            const opts = state.actuals.map(a => `<option value="${a.id}" ${id==a.id?'selected':''}>${a.desc} - ${window.formatMoney(a.amount)}</option>`).join('');
            window.openModal(`<div class="p-6"><h3 class="text-xl font-bold mb-4">Tải lên hóa đơn</h3><div class="space-y-4"><select id="inpInvExpId" class="w-full border p-2 rounded text-sm">${opts}</select><input type="file" id="inpInvFile" accept="image/*" class="w-full border p-2 rounded text-sm bg-indigo-50 text-indigo-700"></div><div class="mt-6 text-right"><button onclick="${id?`window.viewActualDetails(${id})`:'window.closeModal()'}" class="px-4 py-2 border rounded mr-2">Hủy</button><button onclick="window.saveInvoice(${id||'null'})" class="bg-indigo-600 text-white px-4 py-2 rounded">Upload</button></div></div>`);
        }

        window.saveInvoice = function(id) {
            const expId = parseInt(document.getElementById('inpInvExpId').value); const file = document.getElementById('inpInvFile').files[0];
            if(!file) return window.showToast("Chọn 1 ảnh!", "error");
            window.resizeImage(file, 1200, (url) => { state.invoices.push({id:Date.now(), expenseId:expId, filename:file.name, dataUrl:url, date:new Date().toISOString().split('T')[0]}); window.saveLocalState(); window.showToast('Thành công!'); if(id) window.viewActualDetails(id); else { window.closeModal(); window.renderTab(); } });
        }

        window.deleteInvoice = function(id) {
            if(!window.checkAuth()) return;
            window.showConfirm('Xóa hóa đơn?', () => { const inv = state.invoices.find(i=>i.id==id); const aId = inv?inv.expenseId:null; state.invoices = state.invoices.filter(i=>i.id!=id); window.saveLocalState(); window.showToast('Đã xóa'); if(!document.getElementById('modal-overlay').classList.contains('hidden')) { window.closeModal(); setTimeout(()=>{if(aId)window.viewActualDetails(aId);else window.renderTab();},100); } else window.renderTab(); });
        }

        // ==========================================
        // 12. MODULE: EXPORT
        // ==========================================
        window.renderExport = function(container) {
            container.innerHTML = `<div class="mb-6"><h2 class="text-2xl font-bold">Báo cáo & Xuất file</h2></div><div class="grid grid-cols-1 sm:grid-cols-3 gap-6"><div class="bg-white p-6 rounded-xl shadow-sm border text-center flex flex-col"><i class="fa-solid fa-file-excel text-5xl text-green-600 mb-4"></i><h3 class="font-bold text-lg mb-2">Bảng tính Excel</h3><p class="text-sm text-gray-500 mb-4 flex-1">Chi tiết dự toán và thực tế.</p><button onclick="window.exportExcel()" class="w-full bg-green-600 text-white py-2 rounded-lg">Xuất Excel</button></div><div class="bg-white p-6 rounded-xl shadow-sm border text-center flex flex-col"><i class="fa-solid fa-file-pdf text-5xl text-red-600 mb-4"></i><h3 class="font-bold text-lg mb-2">Báo cáo PDF</h3><p class="text-sm text-gray-500 mb-4 flex-1">Thuyết minh tài chính & Hóa đơn.</p><button onclick="window.generateAndExportPDF()" class="w-full bg-red-600 text-white py-2 rounded-lg">Tạo PDF</button></div><div class="bg-white p-6 rounded-xl shadow-sm border text-center flex flex-col"><i class="fa-solid fa-file-word text-5xl text-blue-600 mb-4"></i><h3 class="font-bold text-lg mb-2">Báo cáo Word</h3><p class="text-sm text-gray-500 mb-4 flex-1">Bản nháp để tùy chỉnh chữ.</p><button onclick="window.exportWord()" class="w-full bg-blue-600 text-white py-2 rounded-lg">Xuất Word</button></div></div>`;
        }

        window.generateChartImagesForReport = function(cb) {
            const cbx = document.getElementById('hiddenReportChart'); const cctx = cbx.getContext('2d'); cctx.fillStyle='white'; cctx.fillRect(0,0,cbx.width,cbx.height);
            const pbx = document.getElementById('hiddenReportPieChart'); const pctx = pbx.getContext('2d'); pctx.fillStyle='white'; pctx.fillRect(0,0,pbx.width,pbx.height);
            const lbl = CATEGORIES.map(c=>c.name.substring(3)); const est = CATEGORIES.map(c=>state.plans.filter(p=>p.catId===c.id&&p.selected).reduce((s,p)=>s+p.total,0)); const act = CATEGORIES.map(c=>state.actuals.filter(a=>a.catId===c.id).reduce((s,a)=>s+a.amount,0));
            new Chart(cctx, {type:'bar', data:{labels:lbl, datasets:[{label:'Dự toán', data:est, backgroundColor:'#cbd5e1'}, {label:'Thực tế', data:act, backgroundColor:'#4f46e5'}]}, options:{responsive:false, animation:false, plugins:{title:{display:true, text:'SO SÁNH', font:{size:16}}}}});
            new Chart(pctx, {type:'doughnut', data:{labels:['Dự toán', 'Thực tế'], datasets:[{data:[est.reduce((a,b)=>a+b,0), act.reduce((a,b)=>a+b,0)], backgroundColor:['#cbd5e1', '#4f46e5']}]}, options:{responsive:false, animation:false}});
            setTimeout(()=>cb(cbx.toDataURL(), pbx.toDataURL()), 500);
        }

        window.buildReportHTML = function(bImg, pImg) {
            const eTot = state.plans.filter(p=>p.selected).reduce((s,p)=>s+p.total,0); const aTot = state.actuals.reduce((s,a)=>s+a.amount,0);
            let tRows = ''; CATEGORIES.forEach(c => { const cE = state.plans.filter(p=>p.catId===c.id&&p.selected).reduce((s,p)=>s+p.total,0); const cA = state.actuals.filter(a=>a.catId===c.id).reduce((s,a)=>s+a.amount,0); const diff = cE-cA; tRows += `<tr><td style="border:1px solid #000; padding:5px;">${c.name}</td><td style="border:1px solid #000; padding:5px; text-align:right;">${cE.toLocaleString()}</td><td style="border:1px solid #000; padding:5px; text-align:right;">${cA.toLocaleString()}</td><td style="border:1px solid #000; padding:5px; text-align:right; color:${diff<0?'red':'green'};">${diff.toLocaleString()}</td></tr>`; });
            let tlHtml = state.timeline.length>0 ? `<h3 style="border-bottom:1px solid #000;">2. Lịch trình</h3><table style="width:100%; border-collapse:collapse; margin-bottom:20px;"><tr><th style="border:1px solid #000;">Ngày</th><th style="border:1px solid #000;">Hoạt động</th></tr>${[...state.timeline].sort((a,b)=>new Date(a.date)-new Date(b.date)).map(t=>`<tr><td style="border:1px solid #000; padding:5px;">${window.formatDate(t.date)}</td><td style="border:1px solid #000; padding:5px;">${t.title}</td></tr>`).join('')}</table>` : '';
            let invHtml = state.invoices.length>0 ? `<div class="page-break"></div><h3>3. Hóa đơn</h3>${state.invoices.map(i=>`<div style="margin-bottom:20px; text-align:center;"><p>${(state.actuals.find(a=>a.id==i.expenseId)||{}).desc}</p><img src="${i.dataUrl}" style="max-height:400px; border:1px solid #000;"></div>`).join('')}` : '';
            return `<div style="font-family:Arial; font-size:12pt;"><h2 style="text-align:center;">BÁO CÁO TÀI CHÍNH - ${state.trip.name.toUpperCase()}</h2><p>Ngân sách: ${state.trip.budget.toLocaleString()} VNĐ</p><h3 style="border-bottom:1px solid #000;">1. Ngân sách</h3><table style="width:100%; border-collapse:collapse; margin-bottom:20px;"><tr><th style="border:1px solid #000;">Mục</th><th style="border:1px solid #000;">Dự toán</th><th style="border:1px solid #000;">Thực tế</th><th style="border:1px solid #000;">Chênh lệch</th></tr>${tRows}<tr><td style="border:1px solid #000; font-weight:bold;">TỔNG</td><td style="border:1px solid #000; text-align:right; font-weight:bold;">${eTot.toLocaleString()}</td><td style="border:1px solid #000; text-align:right; font-weight:bold;">${aTot.toLocaleString()}</td><td style="border:1px solid #000; text-align:right; font-weight:bold;">${(eTot-aTot).toLocaleString()}</td></tr></table>${tlHtml}<div class="page-break"></div><h3>Đánh giá & Biểu đồ</h3><div style="text-align:center;"><img src="${bImg}" style="width:100%; max-width:600px;"><br><img src="${pImg}" style="width:50%; max-width:300px; margin-top:20px;"></div>${invHtml}</div>`;
        }

        window.exportExcel = function() {
            try {
                const wb = XLSX.utils.book_new(); const appName = (state.trip.name || 'NTU').toUpperCase();
                const eData = [[`DỰ TOÁN - ${appName}`], ['Hành trình:', state.trip.origin+' - '+state.trip.destination], [], ['Hạng mục', 'Mô tả', 'Đơn giá', 'SL', 'Thành tiền']];
                state.plans.filter(p=>p.selected).forEach(p=>eData.push([CATEGORIES.find(c=>c.id===p.catId).name.substring(3), p.desc, p.unit, p.qty, p.total]));
                XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(eData), "Dự toán");
                const aData = [[`THỰC TẾ - ${appName}`], [], ['Ngày', 'Hạng mục', 'Diễn giải', 'Số tiền']];
                state.actuals.forEach(a=>aData.push([a.date, CATEGORIES.find(c=>c.id===a.catId).name.substring(3), a.desc, a.amount]));
                XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(aData), "Thực tế");
                XLSX.writeFile(wb, `BaoCao_${appName}.xlsx`); window.showToast("Đã tải Excel", "success");
            } catch(e) { window.showToast("Lỗi xuất Excel", "error"); }
        }

        window.generateAndExportPDF = function() {
            window.showToast("Đang tạo biểu đồ...", "info");
            window.generateChartImagesForReport((b, p) => {
                const a = document.getElementById('report-render-area'); a.innerHTML = window.buildReportHTML(b, p); a.style.display = 'block';
                html2pdf().set({margin:10, filename:`BaoCao.pdf`, image:{type:'jpeg', quality:0.98}, html2canvas:{scale:2}, jsPDF:{unit:'mm', format:'a4', orientation:'portrait'}}).from(a).save().then(()=>{ a.style.display='none'; window.showToast("Tải PDF thành công!"); });
            });
        }

        window.exportWord = function() {
            window.generateChartImagesForReport((b, p) => {
                const h = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word'><head><meta charset='utf-8'><style>body{font-family:Arial;} .page-break{mso-special-character:line-break; page-break-before:always;}</style></head><body>${window.buildReportHTML(b, p)}</body></html>`;
                const link = document.createElement('a'); link.href = URL.createObjectURL(new Blob(['\ufeff', h], {type:'application/msword'})); link.download = `BaoCao.doc`; document.body.appendChild(link); link.click(); document.body.removeChild(link); window.showToast("Tải Word thành công");
            });
        }

        // ==========================================
        // 13. MODULE: SETTINGS
        // ==========================================
        window.renderSettings = function(container) {
            container.innerHTML = `
                <div class="mb-6"><h2 class="text-2xl font-bold">Quản lý Dữ liệu</h2></div>
                <div class="bg-white p-6 rounded-xl shadow border mb-4">
                    <h3 class="font-bold text-blue-700 mb-2">Cloud Firebase (Làm việc nhóm)</h3>
                    <p class="text-sm text-gray-600 mb-4">Sửa xong -> Bấm <strong>Lưu lên Cloud</strong>. Máy khác mở -> Bấm <strong>Tải từ Cloud</strong> để lấy bản mới nhất.</p>
                    <div class="flex flex-wrap gap-2"><button onclick="window.saveToCloudCache()" class="bg-blue-600 text-white px-4 py-2 rounded text-sm"><i class="fa-solid fa-cloud-arrow-up"></i> Lưu lên Cloud</button><button onclick="window.loadFromCloudCache()" class="bg-indigo-50 border px-4 py-2 rounded text-sm text-indigo-700"><i class="fa-solid fa-cloud-arrow-down"></i> Tải từ Cloud</button><button onclick="window.openShareModal()" class="bg-gray-100 border px-4 py-2 rounded text-sm"><i class="fa-solid fa-share-nodes"></i> Link Chia Sẻ (Khách)</button></div>
                </div>
                <div class="bg-white p-6 rounded-xl shadow border">
                    <h3 class="font-bold text-indigo-700 mb-2">Backup Offline (.json)</h3>
                    <div class="flex flex-wrap items-center gap-4"><button onclick="window.backupData()" class="bg-gray-800 text-white px-4 py-2 rounded text-sm"><i class="fa-solid fa-download"></i> Tải file JSON</button><input type="file" id="inpRestore" accept=".json" class="border p-1.5 rounded text-sm w-full max-w-xs"><button onclick="window.restoreData()" class="bg-orange-500 text-white px-4 py-2 rounded text-sm"><i class="fa-solid fa-upload"></i> Khôi phục JSON</button></div>
                </div>
            `;
        }

        window.backupData = function() {
            const node = document.createElement('a'); node.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state)); node.download = `NtuCostManager_Backup.json`; document.body.appendChild(node); node.click(); node.remove(); window.showToast("Tải Backup thành công");
        }

        window.restoreData = function() {
            if(!window.checkAuth()) return;
            const file = document.getElementById('inpRestore').files[0]; if(!file) return window.showToast("Chọn file .json", "error");
            window.showConfirm("Ghi đè toàn bộ dữ liệu?", () => {
                const reader = new FileReader();
                reader.onload = function(e) { try { state = JSON.parse(e.target.result); window.saveLocalState(); window.showToast("Khôi phục thành công"); window.switchTab('dashboard'); } catch(err) { window.showToast("File lỗi", "error"); } };
                reader.readAsText(file);
            });
        }

        // ==========================================
        // 14. INITIALIZATION
        // ==========================================
        window.addEventListener('DOMContentLoaded', () => {
            if (typeof window.checkSharedLink === 'function') {
                const urlParams = new URLSearchParams(window.location.search);
                if (urlParams.get('sharedId')) { window.checkSharedLink(); } 
                else { window.loadLocalState(); window.renderTab(); }
            } else { window.loadLocalState(); window.renderTab(); }
        });
    </script>
</body>
</html>
